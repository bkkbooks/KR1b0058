  - {type: page-break, offset: 0, content: '', id: KR1b0058_WYG_000-1a, image: WYG0068/WYG0068-0249a.png}
body:
  text: 禹貢㑹箋書類提要臣等謹案禹貢㑹箋十二卷國朝徐文靖撰文靖字位山當塗人雍正癸卯舉人乾隆元年薦舉博學鴻詞試不入格十七年又薦舉經學特授翰林院檢討是書首列禹貢山水總目以水經所載為主附論於下次為圖十有八各係以說書中皆先引蔡傳而續為之箋博據諸書斷以己意如汾水西入河非東入河徒駭即河之經流非别有一經流三江既入終以南江北江中江為正九江在潯陽非洞庭皆不為蔡傳所囿至於蔡山則闕其所疑不主寰宇記周公山即蔡山之說於惇物則取金史地理志謂在乾州武亭縣今武功縣之東南二百里三危山引西河舊事為升雨山謂史記注作卑雨山蓋字之誤併辨胡渭之訛皆具有考證蓋說禹貢者宋以來棼如亂絲至胡渭錐指出而摧陷廓除始有條理可按文靖生渭之後因渭所己言而更推尋所未至故較之渭書益為精密蓋繼事者易有功也惟信山海經竹書紀年太過是則僻於好古不究真僞之失耳乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀禹貢㑹箋原序周公職録曰黃帝受命風后授圖割地布九州是九州本依圖而立也水經注曰禹理水觀于河見白面長人魚身授禹河圖而還于淵是禹之治水亦依圖而治也自是而後夏少康使商侯冥治河帝杼十三年冥死于河殷祖乙避河遷耿二年圯于耿復遷于庇求如禹貢之治水難矣鄭樵通志曰桀焚黃圖夏圖所繇盡亡也爾雅九州說者皆以為商制圖無聞焉周圖書大備大司徒掌天下土地之圖周知九州之地域司險掌九州之圖知山林川澤之阻漢入關收秦圖書得具知天下厄塞武帝時齊人延年上書言河出昆侖經中國注渤海是其地勢西北髙而東南下可按圖書觀地形令水工凖髙下開大河上領出之胡中明帝永平中議治汴渠上引樂浪人王景問水形便因賜景山海經河渠書禹貢圖禹貢之有圖尚已後世圖事闕略晉司空裴秀惜之乃殫思著禹貢地域圖十有八篇其制圖之體有六一曰分率二曰準望三曰道里四曰髙下五曰方邪六曰迂直悉因地制形王隱晉書曰裴秀為司空作禹貢地域圖事成奏上藏於祕府為時名公誠有所慕而云也唐大衍山河兩戒取禹貢三條四列之說而不及圖程大昌撰禹貢論繪圖三十有一鄭東卿著尚書圖禹貢山澤圖二十有五然皆未有見余家藏有六經圖禹貢圖一二而已又所藏宋大觀中地理指掌圖其中有帝嚳及堯九州圖舜十二州圖禹迹圖然臚列當時郡縣於禹貢山澤六十餘地不能備載少嘗見艾千子禹貢圖簡而能該苐從前訛誤尚未駁正章氏本清圖書編名山大澤皆有圖不專為禹貢設故雖有圖而不精近見王太史蒻林刻乃祖禹貢圖胡氏朏明禹貢山澤間有圖而圖之前後左右少有脈絡可尋此圖禹貢者所以難也陸氏文裕曰余嘗欲取今之州縣推而上之㑹于禹貢之命名以著古今之離合遷改為一書志誠偉哉余竊有志而未逮顧已為禹貢㑹箋一書又何能已于圖也爰列圖若干于前并以圖說附注之稍訂其訛誤如此後之君子按圖而興感思大禹明德之逺而不為小智之鑿則又㑹箋繪圖者之私願夫凡例一冀州舊圖依蔡傳淶水出覃懷西今按周職方并州其川淶易非冀州浸也山海經沁水注河入懷東南因改從沁舊以洞庭為九江今据經九江孔殷在江漢朝宗之下仍依漢志九江在尋陽餘放此一禹貢圖古未嘗有聞漢明帝議治汴渠賜樂浪人王景禹貢圖當猶是收秦圖書所得晉司空裴秀著禹貢圖十八篇序載于晉史而圖不傳今為圖多參取艾千子間採之六經圖指掌圖而至於駁正訛誤不敢附㑹前人一㑹箋取四海㑹同之義蓋雜採經傳子史九流百家支分泒别悉㑹于一猶百川岐流汊港悉㑹于海使有所歸也一仰觀俯察皆學者窮理之事然仰觀易俯察難周天三百六十五度試登髙望之皆可一覽而至於地理不然數十里之外目力所不及足跡所不周即或親厯其境東西易位髙下頓殊而欲確指其山澤所在以求無舛于經則將指延安之洛以為禹貢之漆沮据安豐之石以為禹貢之大别說非無本其實疏也一是編主于駁正疑誤故列蔡傳于前是者可之不是者否之要皆各有所證發寧可得罪於先賢不敢貽誤於後學漸至白日塵昏聖經蕪穢也一㑹箋於近纂禹貢者略加考訂如山海經漢水出鮒鰅之山漢乃濮訛而郭注妄引嶓冢導漾東流為漢近遂以鮒鰅為嶓冢之别名西河舊事三危山俗亦謂升雨山夏本紀注訛作卑羽山今仍因之訛以傳訛伊于胡底故于是編中約略正之一胡氏禹貢錐指考訂漢唐注疏最為詳密謂釋禹貢者莫先於安國之書傳安國武帝時人孔穎達所謂身為博士具見圖籍者也今觀其注禹貢山水地名並顢頇鶻宇不甚分明菏澤在定陶而云在湖陵伊水出盧氏而云出陸渾澗水出新安而云出澠池橫尾山北去淮二百餘里而云淮水經陪尾江水南去衡山五六百里而云衡山江所經又若榖城為瀍水所出魏始省榖城入河南而傳云瀍出河南北山金城郡乃昭帝置而傳云積石山在金城西南孟津在河陽之孟地東漢始移其名于河南而傳云在洛北明非西漢人手筆此等考證真發前人所未發㑹箋中不敢勦襲雷同而又不忍為割愛故列于此一漢劉秀上山海經奏曰禹别九州任土作貢而益等類物善惡著山海經皆聖賢之遺事古文之著明者也按禹貢與山海經猶春秋內外傳也禹貢之山水多具見于山海經以禹之經解禹之書其不致有訛誤也明矣故㑹箋于山海經所引為多一宋易氏祓字彥祥别號山齊所著禹貢疆里記胡朏明謂其書亡余於徐常吉禹貢解中備録原文冀藉以廣其傳云至以澧水為醴陵九江為洞庭蓋浸淫宋人之說亦小疵也一趙君文冕以明經考授縣佐好古嗜學蓄書甚多一時名下士無不延引講習賞析奇疑家淳溪距余舍丹陽湖沚僅二十餘里且素有親道因得以文字往來余年近九旬閒居無事檢舊簏得禹貢㑹箋十二卷郵請是正承雅誼捐資命工立加剞劂余垂老而不能藏拙者趙君意也謂是編可與問世藉以為後學司南則余何敢欽定四庫全書禹貢㑹箋卷首翰林院檢討徐文靖撰山水總余讀蔡西山書傳於禹貢一書大抵據水經以立言耳世所傳水經不著名氏或以為郭璞或以為桑欽酈注亦未嘗明言今閲孟堅地理志中山國北新成縣桑欽言易水出西北東入􅋤張掖刪丹縣桑欽以為導弱水西至酒泉合黎丹陽陵陽縣桑欽言淮水出東南北入江平原髙唐縣桑欽言漯水所出上黨屯留縣桑欽言絳水出西南東入海則水經為欽作無疑矣水經四十卷末自志云禹貢山水澤地所在凡六十其所載郡縣多西漢後則又似非欽作者前書儒林傳孔氏有古文尚書安國授都尉朝而司馬遷亦從安國問故遷書載堯典禹貢洪範諸篇多古文說數傳至平陵塗惲授河南桑欽君長欽蓋漢成帝元帝時人經稱九江地在長沙下雋縣西北下雋前志屬長沙國後漢郡國志同則此所載禹貢山水澤地所在凡六十大抵皆酈氏之注𫐠欽言也因列其總目於前所有訛誤者并注於下泰山為東嶽在泰山博縣西按竹書紀年堯七十四年虞舜初巡四嶽舜典嵗二月東巡狩至于岱宗柴風俗通云泰山山之尊為五嶽長王者受命恆封禪之霍山為南嶽在霍山灊縣西北酈注云天柱也又郭璞注爾雅云霍山在潛縣别名天柱山漢武以衡山遼逺讖緯以霍山為嶽故祭之今按爾雅云江南衡又云霍山為南嶽蓋衡山本名霍山尚書大傳曰舜元年巡狩四嶽元祀代泰山中祀大交霍山貢兩伯之樂焉則霍山之名起於虞前何云從漢武始也漢特移祀於天柱名霍山耳漢志廬江灊縣注天柱山在南不言霍山華山為西嶽在𢎞農華隂縣西南酈注云古文之惇物也今按地理志扶風武功縣垂山古文以為惇物初未嘗言華山也又漢志𢎞農十一縣無華隂縣華隂縣屬京兆尹太華山在南注並誤也雷首山在扶風蒲坂縣東南按竹書紀年帝堯五十年遊于首山乘素車𤣥駒即是山也後世因名為堯山故漢志云河東蒲坂有堯山雷首山在南砥柱山在河東太陽縣河中按師古注漢書云砥柱在陜縣東北山在河中形若柱也漢武帝時河東守番係言漕從山東西嵗百餘萬石更砥柱之艱敗亡甚多即是山也王屋山在河東垣曲縣東北孔安國曰王屋山在冀州之南河之北太行山在河內野王縣西北按前志河內山陽縣東太行山在西北後志在河內野王恆山為北嶽在中山上曲陽縣西北按前志常山上曲陽恆山北谷在西北禹貢恆水所出東入􅋤後志中山上曲陽碣石山在遼西臨渝縣水中按前志右北平驪成縣大揭石山在縣西南遼西臨渝縣有渝水絫縣有碣石水南入官後志遼西臨渝縣注引山海經揭石之山編水出焉此注從後志也析城山在河東濩澤縣西南漢志同應劭曰有濩澤在西北括地志析城山在澤州西南七十里太嶽山在河東永安縣按漢志河東彘縣霍太山在東應劭曰順帝改曰永安壺口山在河東北屈縣東南漢志同按括地志壺口山在慈州吉昌縣西南五十里冀州境也龍門山在河東皮氏縣西按史記始皇本紀禹鑿龍門通大夏决河亭水放之海後漢志云馮翊夏陽縣有龍門山是也初未嘗有言皮氏西者據左傳杜預注云平陽皮氏縣東南有耿鄉括地志故耿城在龍門東南十二里是龍門在皮氏縣西也梁山在馮翊夏陽縣西北河上按漢志夏陽故少梁秦惠王十一年更名禹貢梁山在西北公羊傳梁山河上山也荆山在馮翊褱德縣南按孔安國書傳曰漆沮二水名亦曰洛水出馮翊北漢志馮翊褱德縣禹貢北條荆山在南洛水東南入渭傳蓋誤以延安之洛水為即禹貢之漆沮水也漢志因之亦誤岐山在扶風美陽縣西北漢志美陽縣禹貢岐山在西北中水鄉括地志云山在岐州岐山縣東北十里關山在扶風汧縣之西按漢志扶風汧縣吳山在西古文以為汧山北有蒲谷鄉弦谷中汧水出西北入渭又吳山一名吳嶽周禮正西曰雍州其山鎮曰嶽即吳山也禹貢無關山注云汧縣之西蓋吳山耳隴山按漢志隴西有隴坻師古曰即今之隴山也禹貢無隴山不審何以列此据史記始皇本紀曰十七年巡隴西北地出雞頭山正義曰括地志云雞頭山在成州上祿縣東北二十里酈元云蓋大隴山異名也後漢書隗囂𫝊云王孟塞雞頭山即此也本𫝊注雞或作笄蓋汧山西接隴岡通謂之隴山也汧音牽終南山惇物山在扶風武功縣西南按漢志扶風武功縣有太一山古文以為終南武功縣垂山古文以為惇物是二山皆在武功西南須山在隴西臨洮縣西南按禹貢無須山須當是頃之訛漢志隴西臨洮縣禹貢西頃山在縣西南部都尉治也南部二字屬下不得以西南為句疑誤逗也嶓冢山在隴西氐道縣之南按漢志隴西氐道縣禹貢漾水所出不云嶓冢惟隴西西縣下云禹貢嶓冢山西漢水所出南入廣漢白水至江州入江後漢郡國志漢陽西縣故屬隴西有嶓冢山西漢水鄭𤣥曰西在隴西西今謂之八充山据五帝紀注作兑山今本後志作八充殆誤分兑字為八充也鳥鼠同穴山在隴西首陽縣西南按後漢郡國志隴西首陽縣有鳥鼠同穴山穴地入三四尺鼠在內鳥在外地道記曰有三危三苗所處蓋當日分北三苗析為三處一在此一在燉煌縣南一在零陵東南所謂分北三苗也北古别字積石山在隴西河關縣西南按漢志金城河關縣積石山在西南羌中此注云隴西誤都野澤在武威縣東北禹貢豬野史記作都野漢志武威郡武威縣休都澤在東北古文以為猪壄澤合黎山在酒泉曾水縣東北按曾水當作㑹水漢志酒泉郡有㑹水縣無曾水也亦不言有合黎山惟張掖刪丹縣注桑欽以為導弱水西至酒泉合黎故水經云北至酒泉㑹水縣入合黎山腹流沙地在張掖居延縣東北按漢志張掖居延縣居延澤古文以為流沙然經言西被不應於東北求之後漢燉煌郡注引耆舊傳曰水有懸泉之神山有鳴沙之異則流沙言燉煌之西為是矣三危山在燉煌縣南按漢志武帝後元年分酒泉置燉煌郡山海經黑水出張掖雞山南流至燉煌過三危入于南海師古曰至燉煌過三危也朱圉山在天水北冀縣南按漢志天水冀縣朱圉山在縣南梧中聚岷山在蜀郡湔氐道西漢志湔氐道禹貢崏山在西徼外江水所出南至江都入海嶓冢山在𢎞農盧氏縣南按漢志有熊耳山在𢎞農盧氏縣無嶓冢山也此乃注誤荆山在南郡臨沮縣東北按漢志南郡臨沮縣禹貢南條荆山在東北漳水所出東至江陵入楊水酈注曰今漳水於當陽縣之東南一百里餘而右㑹沮水志云入楊水非矣內方山在江夏竟陵縣東北按漢志竟陵縣章山在東北古文以為內方山後志作立章山大别山在廬江安豐縣西南按漢志六安國安豐縣禹貢大别山在西南杜預曰左傳吳與楚夾漢自小别至于大别然則二别近漢之山無緣得在安豐也外方山嵩髙山也按爾雅山大而髙曰嵩時猶無中嶽之名故以為外方也桐柏山在南陽平氏縣東南按前志南陽平氏縣禹貢桐柏大復山在東南後志平氏縣桐柏大復山淮水出經但言桐柏何也荆州記曰桐柏淮源涌發其中潛流三十里出大復山南經但言桐柏宜矣陪尾山在江夏安陸縣東北按漢志江夏安陸縣橫尾山在東北古文以為陪尾山程大昌日記以為泗水縣有陪尾山乃禹貢陪尾也衡山在長沙湘南縣南按後志長沙湘南縣衡山在東南郭璞曰山别名岣嶁岣音茍九江地在長沙下雋縣西北按前志有下雋後志長沙有下雋史皆不注酈注以九江在下雋縣西北此非水經之言也桑欽乃西漢成帝時人班志何不引乎蔡傳乃據之謂洞庭為九江范致明撰嶽陽風土記以下雋地在蒲圻即以洞庭為九江亦在下雋之西南何從在西北乎況經文九江孔殷在江漢朝宗之下若使洞庭為九江則經文當云九江孔殷江漢朝宗于海矣且安知下雋西北不為東北之訛而以為確據乎雲夢澤在南郡華容縣之東按爾雅楚有雲夢郭璞注今南郡華容縣巴丘湖也東陵地在廬江金蘭縣西北按前志廬江金蘭西北有東陵鄉淮水出屬揚州廬江出陵陽東南北入江又丹陽陵陽縣注桑欽言淮水出東南北入大江前言廬江出東南入江今此又言淮水出東南入江疑有一誤金蘭縣不見兩志惟此注云金蘭縣又決水注云決水又西北灌水注之其水導源廬江金蘭縣西北東陵鄉大蘇山即灌水也此二處皆有縣字兩漢志皆不載存此以補其缺敷淺原地在豫章歷陵縣西南按漢志豫章歷陵縣傅昜山傅昜川在南古文以為敷淺原傅讀曰敷昜古陽字今皆訛傅陽為博陽矣彭蠡澤在豫章彭澤縣北按漢志豫章彭澤禹貢彭蠡澤在西此云北誤中江在丹陽蕪湖東至㑹稽陽羡入于海按漢志丹陽蕪湖縣中江出西南東至陽羡入海應劭曰范蠡乘扁舟出三江入五湖今廬江臨丹陽蕪湖縣是也震澤在吳縣南五十里按漢志㑹稽吳縣具區澤在西古文以為震澤南江在南東入海南江在吳縣南震澤在吳縣之西此云震澤在縣南誤也陶丘在濟隂定陶縣之西南按漢志禹貢陶丘在西南陶丘亭郭璞曰今濟隂定陶城中有陶丘蓋西南有陶丘亭乃謂舜陶於河濱設耳菏澤在定陶縣東按漢志禹貢菏澤在定陶東菏音柯雷澤在濟隂成陽縣西北按漢志濟隂成陽縣禹貢雷澤在西北括地志濮州雷澤縣本漢郕陽縣在州東九十一里菏水在山陽湖陸縣南按上言菏澤此不當又言菏水据漢志山陽湖陸縣禹貢浮于淮泗達于河水在南則此菏水當作河水也禹貢豫州浮洛入河師古注曰因洛入河也故特志之䝉山在太山䝉隂縣西南按漢志䝉隂縣禹貢䝉山在西南顓臾國在䝉山下大野澤在山陽巨野縣東北按爾雅魯有大野郭注髙平巨野縣東北大澤漢時屬山陽晉屬髙平大邳山在河南成臯縣北按大邳漢志不載括地志云大邳山今名黎陽東山又曰青壇山在黎縣南七里今此注云在成臯非也明都澤在梁郡睢陽縣東北按孟豬史記作明都周職方青州其澤藪曰望諸鄭注望諸明都也在睢陽益州沱水在蜀郡汶江縣西南其一在郫縣西南皆還入江按漢武帝元朔二年改梁州曰益益即梁也前漢志蜀郡汶江縣江沱在西南東入江又郫縣江沱在西東入大江荆州沱水在南郡枝江縣三澨地之南在卭縣之北按漢志南郡枝江縣江沱出西東入江三澨在竟陵卭當作邔邔縣名也此云卭誤欽定四庫全書禹貢㑹箋圖目冀州圖冀州考兖州圖兖州考青州圖青州考徐州圖徐州考揚州圖揚州考荆州圖荆州考豫州圖豫州考梁州圖梁州考雍州圖雍州考導山圖導山說導水圖導水說導水先後圖導水先後說里數附任土作貢圖任土作貢說三江圖三江考九江圖九江考九河圖九河說九州總圖九州針附九州同異考五服圖五服圖說冀州考禹貢冀州既載舜以冀州南北濶大分衛水以北為并州燕以北為幽州並置牧周禮職方河內曰冀州山曰霍藪曰楊紆川曰漳浸曰汾潞其在天官昴畢則趙之分野尾箕則燕之分野兼得秦魏衛之交秦一天下置郡為巨鹿邯鄲上谷漁陽右北平遼西河東上黨太原代郡鴈門雲中及三川之北境漢武置十三州此為冀州幽州并州後漢並因前代為冀州幽州并州魏晉並因之唐分置十五部此為河北道河東道兼分入都畿關內道宋承唐制冀州之境為河北河東兩路又分河北為東西二路兖州考禹貢濟河惟兖州舜置十二牧兖州其一也周禮職方河東曰兖州山曰岱藪曰大野川曰河泲浸曰盧濰其在天文營室東壁則衛之分野兼得魏宋齊趙之交秦一天下置郡此為東郡碭郡之東北境齊郡之北境巨鹿上谷二郡之東境漢武置十三州此為兖州後漢並因前代魏晉亦置兖州永嘉之後陷于石勒宋武平河南又得其地置兖州宋末其地入後魏唐分置十五部此為河南道宋以魏博貝滄德棣為河北東路濮鄆濟為京東西路滑為京西北路青州考禹貢海岱惟青州舜分青州為營州皆置牧周以徐州合青州其土益大周禮職方正東曰青州山曰沂藪曰孟諸川曰淮泗浸曰沂沭其在天官虛危則齊之分野秦平天下置郡此為齊郡琅琊之東境遼東秦亂項羽宰割天下以其地為國曰膠東齊濟北漢武置十三州此亦為青州後漢因之晉魏亦因之宋分為青冀二州後入後魏唐分置十五部此為河南道河北道宋為京東東路京東西路黃子鴻曰青州鎮曰沂山鄭康成謂沂水所出今沂水實出雕崖山北去東泰山尚五十餘里則古沂山當即指此隋唐時始移沂山之名于東泰山而祀之其實二山不可混也徐州考禹貢海岱及淮惟徐州亦舜十二牧之一周并徐州入青州今分入兖州之域在天文奎婁則魯之分野兼得宋齊吳之交秦平天下置郡此為泗水琅琊之西境薛郡漢又加置東海郡漢武帝置十三州還以其地為徐州後漢並因前代魏晉亦曰徐州自晉元帝渡江徐州所得惟半而已宋初因之明帝初地入後魏唐分置十五部此為河南道唐末海泗二州為楊行密所據其後為南唐宋分為京東路京西路揚州考禹貢淮海惟揚州舜置十二牧揚州其一周禮職方東南曰揚州山曰㑹稽藪曰具區川曰三江浸曰五湖在天官斗則吳之分野兼得楚及南越之交秦兼天下置郡此為九江鄣㑹稽閩中南海郡之東境武帝置十三州此為揚州後漢因之三國時淮南屬魏而江南屬吳魏晉亦置揚州元帝渡江揚州遂為王畿領江東浙江地宋孝武分浙東為東揚州後罷揚州以其地為王畿而東揚州直云揚州尋復舊唐分置十五部此為淮南道江南道江南西道宋為淮南東西路浙東西路江東西路福建路荆州考禹貢荆及衡陽惟荆州舜置十二牧荆州其一周禮職方正南曰荆州山曰衡藪曰雲夢川曰江漢浸曰潁湛春秋至戰國時並為楚地其在天文翼軫則楚之分野兼得韓秦之交秦兼天下置郡此為南郡黔中長沙南陽之東境漢武置十三州此為荆州後漢及晉並因之宋分置荆州司州郢州雍州湘州齊亦因之唐分置十五部此為山南東道江南西道黔中道兼分入淮南及嶺南道宋乾德元年平荆湖三年平蜀始盡得古荆州之地後為荆湖北路荆湖南路及夔州之施黔思播等州云豫州考禹貢荆河惟豫州舜為十二牧之一周禮職方河南曰豫州山曰華川曰滎洛藪曰圃田浸曰波溠其在天官栁七星張則周之分野房心則宋之分野觜觹參則魏之分野角亢氐則韓之分野兼得秦楚之交秦分天下置郡為三川碭潁川南陽郡之東境北境南郡之北境漢武置十三州此為豫州後漢為司𨽻豫州魏亦同晉分置司州及豫永嘉之亂豫州沒於劉石苻姚宋初有其南境置豫州唐分置十五部此為都畿道河南道兼分入山南東道及河東道五代並都汴宋因之豫州之境為京師輔郡置京東京西二路梁州考禹貢華陽黑水惟梁州自漢川已下諸郡皆其封域舜置十二牧梁州其一周禮以梁州并雍州於天文兼參之宿亦秦之分野又得楚之交秦分天下置郡為漢中巴蜀隴西郡之南境漢武置十三州改梁為益獻帝末劉備據其地魏末得之分置梁益二州晉初因之後又分益州南境置寧州宋梁益寧三州並因前代更置秦州齊及梁初多因之後魏得漢中亦曰梁州唐分置十五部此為山南西道山南東道劍南道兼分屬京畿隴右道及黔中道宋平孟蜀分為益州利州梓州夔州四路云雍州考禹貢黑水西河惟雍州舜置十二牧雍其一也周禮職方正西曰雍州山曰嶽藪曰弦蒲川曰涇汭浸曰渭洛兼得禹貢梁州之地周自武王都于豐鎬則雍州為王畿及平王東遷洛邑以岐酆之地賜秦其在天文東井輿鬼則秦之分野兼得魏趙之交始皇置四十郡此為內史上郡北地九原隴西及雲中之西南境漢武置十三州以其西偏為凉州又置司𨽻領三輔後漢並如前代晉置雍州秦州凉州後魏置北秦雍南秦三州唐置十五部此為京畿關內道隴右道宋為陜西路及河東路導山山海經禹曰天下名山經五千三百七十六萬四千五十六里其餘小山甚衆不足記管子曰凡天下名山五千三百七十出銅之山四百六十有七出鐵之山三千六百有九山海經華山削成而四方髙五千仞其廣千里博物志泰山一曰天孫漢官儀泰山東上七十里至天門五嶽圖云恆山髙三千九百丈七尺上方三十里周回三千里戴延之西征記嵩山東謂太室西謂少室相去十七里嵩其總名也少室髙八百六十丈與太室相等徐靈期南嶽記禹刻石書名山之髙南嶽文云髙四千一十丈導山說蔡傳曰王鄭有三條四列之名皆為未當余按三條馬融以岍為北條西傾為中條嶓冢為南條不自王肅始也班志有南條荆山北條荆山漢張旭華嶽碑序布五方則處其西列三條則居其中三條之說自古有之四列鄭𤣥以岍為隂列西傾次隂列嶓冢次陽列岷山正陽列蓋岍岐之列河泲所經西傾之列伊淮渭所經皆在北條為隂嶓冢之列漢水所經岷山之列江水所經皆在南條為陽蔡傳以三條四列皆為未當據導字分之為南北二條蓋本唐天文志云天下山河之象存乎兩戒也其實一而已導水唐天文志河源自北紀之首循雍州北徼達華隂而與地絡相㑹並行而東至太行之曲分而東流與涇渭濟瀆相為表裏謂之北河江源自南紀之首循梁州南徼達華陽而與地絡相㑹並行而東及荆山之陽分而東流與漢水淮瀆相為表裏謂之南河是天下之水莫大於江河也援神契曰河者水之伯上應天漢風后曰河凡有五皆始開於昆侖之墟山海經岷三江首大江出㞶山北江出曼山南江出髙山入海在長州南是江之發源已有三江之名補齊記云晏子曰吾聞江深五里海深十里其餘蓋不勝記云導水說河圖曰河導昆侖山名地首上為權執星執古勢字東流千里至規期山名地契上為距樓星北流千里至積石山名地肩上為别符星邠南千里入龍首山間抵龍門首名地根上為營室星龍門上為王良星良一作梁為天橋神馬出河躍南流千里抵龍首上為龍門之北首下為南首至卷重山名地咽上為卷舌星東流貫砥柱觸閼流山名地喉上為樞星以運七政西距卷重山千里東至雒㑹名地神上為紀星東流至大伾山名地肱上為輔星東流過洚水至大陸名地腹幹上為虛星楊泉物理論河百里小曲千里一曲一直是也元時尚文曰長河萬里西來其勢遄猛至盟津而下地土平疏移徙不常前漢溝洫志曰治土而防其川猶止兒啼而塞其口豈不遽止然其死可立而待也文子曰汾水濛濁而宜麻濟水通和而宜麥河水中濁而宜菽雒水輕利而宜禾渭水多力而宜黍漢水安重而宜竹江水肥仁而宜稻淮南子曰禹鑿龍門平水土民乃得而陸處晉地理志曰昔大禹觀于濁河而受緑字然後寰瀛之內可得而言也殷湯江誥曰古禹臯陶久勞于外民乃安東為江北為河南為淮西為濟四瀆已侯萬民乃居四瀆已侯禮云四瀆視諸侯是也導水里數漢志河入海行九千四百里江入海行二千二百六十里漢入江行二千七百六十里淮入海行二千二百四十里洛入河行千七十里伊入洛行四百五十里沇入河又東入海行千八百四十里汾入河行千三百四十里漳入河行千六百八十里漯入海行千二十里沮入泗行千三百六十里泗入淮行千一百一十里沂入泗行六百里沭入泗行七百一十里濰入海行五百二十里渭入河行千八百七十里涇入渭行千六十里夏水入沔行五百里夷水入江行五百四十里羌谷水行羌中東北至居延入海行二千一百里居延澤古文以為流沙山海經陽華之山門水出焉而東北流注于河門水至于河七百九十里入洛水爾雅水自洛出為波水經注門水即洛水之枝流者是也此可以補漢志之闕任土作貢說王氏炎曰有賦有貢賦諸侯以供其國用貢諸侯以獻於天子挈貢以名篇有大一統之義存焉許氏曰禹貢専為紀治水之成功而併及貢賦之數故九州紀水道土色田賦之等貢物貢道為詳胡氏朏明曰禹貢之所謂賦鄭注孔疏皆主榖稅而軍賦不與焉蘇氏始云賦田所出粟米兵車之類而蔡傳取之蓋以周時軍旅之征亦謂之賦周禮大司馬注曰賦給軍用者也小司徒注曰賦謂出車徒給徭役也左傳悉索敝賦又曰韓賦七邑又曰魯賦八百乘邾賦六百乘又曰鄫無賦于司馬其所謂賦皆軍賦故蔡以蘇說為長而其實不然按周以前無謂兵為賦者左傳云少康有田一成有衆一旅此即司馬法一成之賦也而稱衆不稱賦則唐虞更可知王耕野云九州田賦止是米榖非必兵車此言得之觀甸服之賦惟納總銍秸粟米則經文自有明徴不煩後人之聚訟矣劉氏維曰禹貢以尊京師為主故首冀州兖最下故次兖雍最髙故終雍昆侖最逺故以織皮與三國終之而無他賦兖青徐雍荆五州賦皆無錯冀賦上上錯豫賦錯上中揚賦下上上錯梁賦下中三錯日記曰無錯者其等已定有錯者其等難定時進退以通節之也書因曰大抵髙田利水下田利旱柔土水旱為災皆輕剛土水旱為災皆重中土無大獲亦無盡傷是則水旱雖同而各方受病實異其無大增減者可定以為常而消息不恆者難執以為例此錯法所由立也三江考三江之說由來不一班孟堅謂南江至吳縣入海中江至陽羡入海北江至毗陵入海孔安國謂自彭蠡江分為三入震澤遂為北江而入海虞氏林謂江自大湖入于海郭璞謂岷江浙江淞江韋昭謂淞江浙江浦陽江胡氏朏明曰類皆承訛襲舛惟蘇傳據經文之中江北江而謂岷山之江為中江嶓冢之江為北江既有中北二江則豫章之江為南江可知蔡傳駁之及閲徐堅初學記引鄭康成書注以證三江曰左合漢為北江右合彭蠡為南江岷江居其中則為中江始知蘇氏所說東漢時固已有之馬中錫云斯言也百世以俟聖人可也余竊謂不然江漢為四瀆之二所謂瀆者以其獨能赴海也何當沒漢之名竟以漢為三江之一乎今案海內東經曰廬江出天子都入江彭澤西郭注彭澤今彭蠡在尋陽彭澤縣史記貨殖傳吳東有海鹽之饒三江五湖之利道元注水經謂廬江之名禹時已有則廬江自大江之北而入江其為三江之北江何疑經又曰贑水出聶都東山東北注江入彭澤西漢志豫章郡湖漢九水東北至彭澤入江其為南江何疑經言東匯澤為彭蠡者南也東迤北㑹為匯者北也南北二江夾匯于彭澤而岷江介乎其間三江相觸江水盤渦旋轉為螺紋朔傳以蠡測海蠡古螺字也經以彭澤為彭蠡義或然矣自是而三江合流大江至蕪湖始名中江前此漢雖入江而大江猶不得為中也周職方荆州其川江漢揚州其川三江則三江並在揚州而漢水不與其數明矣中江南江北江分流而入海水經注曰廬江出三天子都北過彭澤西北入于海漢志中江至陽羡入海南江至吳縣南東入海經云三江既入者是也顧乃以鄭氐班氏之說可證漢志之謬余未之敢信九江考蔡傳据水經九江地在長沙下雋縣西北專指洞庭為九江按漢志廬江郡金蘭西北有東陵鄉水經江水過下雉縣北利水從東陵西南注之又東左得青林口酈道元注曰水出廬江郡之東陵鄉江夏有西陵縣故是言東矣唐書李靖傳輔公祏遣馮惠亮以舟師三萬屯當塗陳正通步騎一萬屯青林自梁山連鎖以斷江道則青林與東陵距當塗不甚逺其在廬江無疑矣傳以九江在下雋西北以巴陵為漢下雋晉范致明嶽陽風土記以漢下雋在蒲圻縣界則傳舛矣况傳所據者水經同一水經也九江在下雋西北可信而東陵在廬江西北獨不可信乎且安知下雋西北不為東北之訛乎竹書紀年曰周康王十六年王南巡狩至九江廬山太史公曰余南登廬山觀禹疏九江周景式廬山記曰登廬山望九江以觀禹之迹其兹峯乎則九江與廬山為近矣安得以洞庭為九江乎向使洞庭即九江禹作禹貢名九江作山海經名洞庭無是理矣李氏瓚曰按九河今在河間府滄州南皮東光慶雲獻縣久已湮塞而故跡尚存傳引酈道元程氏之說謂九河俱淪于海夫其淪其塞同于非舊不必深求但黃河故道原在寧津縣屬景州而府以河間得名則九河之疏昔在其地可無疑者孟子禹疏九河注之海則九河自為注海無復有同為一河然後注海之說宋趙稱奏曰河自孟津初行于地必須全流乃成河道禹之治水自冀抵滄景始播為九河以其近海無患也据此則九河皆近海矣禹又何不愛民力開通二百里為一大河以入海耶附揚雄九州針冀州針洋洋冀州鴻原大陸嶽陽是都島夷被服潺湲河流表以碣石兖州針悠悠濟河兖州之㝢九河既道雷夏攸處草繇木條漆枲絲紵濟漯既通降丘宅土青州針茫茫青州海岱是極鹽鐵之地鉛松怪石羣水攸歸萊夷作牧徐州針海岱伊淮東海是渚徐州之土邑于蕃宇大野既瀦有羽有䝉孤桐蠙珠泗沂攸同揚州針夭矯揚州江漢之滸彭蠡既瀦陽鳥攸處橘柚羽貝瑶琨篠簜閩越北垠沅湘攸往荆州針杳杳巫山在荆之陽江漢朝宗其流湯湯雲夢塗泥包匭菁茅金玉砥礪象貝元龜貢篚百物世世以饒豫州針郁郁荆河伊洛是經滎波枲漆惟用攸成梁州針原作益州巖巖岷山古為梁州華陽西極黑水南流雍州針黑水西河橫截昆侖邪指閶闔畫為雍垠上侵積石下礙龍門按夏書維彼陶唐有此冀方堯雖都冀乃在平陽非嶽陽也冀針嶽陽是都因嶽陽在冀故借以成文耳漢武帝元朔二年改梁為益益即梁也九州同異考嘗按楊泉曰九州變易交錯不同禹貢有梁州無并州周官有并州無梁州爾雅有幽營無青梁周職方河內曰冀州今山西地漢河內今懷慶府劉宋冀州領郡九理厯城今山東濟南府在禹跡為青州廣陵在二漢時為吳國江都廣陵國廣陵郡劉宋為南兖州北齊為東廣州其為揚州自隋始也齊北兖州理淮隂晉元帝僑置兖州寄居京口明帝以郗鑒為刺史寄居廣陵置濮陽濟隂髙平泰山等郡後改為南兖州襄陽故屬荆州孝武於襄陽僑立雍州晉元於廣陵僑置青州鎮東陽城以僑立州為南青州唐初置南兖州又改䢴州又改廣陵郡今揚州府圖書編曰古徐州在今泗州臨淮縣之徐城鎮去徐州垂五百里通考曰魯郡在禹跡為徐州而漢則屬豫州所領陳留郡在禹跡為豫州而晉則屬兖州所領劉宋南徐州今鎮江府東揚州今紹興府沈約宋書義熙七年始分淮北為北徐州文帝元嘉八年更以江北為南兖州江南為南徐州治京口通典壽春郡後漢揚州刺史領郡六治此魏曰淮南後魏曰揚州梁武普通七年置南豫州後降魏陳大建復得壽陽為豫州隋改壽州齊豫州亦理壽春皆在禹跡為揚州唐置南豫古丹陽郡在禹跡為揚州魏太和中蠻帥田益宗納土于魏魏為立東豫州治廣陵城五代史志汝南新息縣魏置東豫州則此廣陵乃新息非揚州也後魏豫州今汝寧北徐州今兖州府之沂州職方河南曰豫州李唐河南則指一道而言包古青徐兖豫四州之境奄黃河以南皆是北史獨孤信都督三荆州今汝州伊陽縣東荆州後改曰懷州今唐縣西荆州今鄧州在禹跡為豫州隋志曰普安郡梁置南梁州眉山郡後周曰青州淮南郡後魏曰揚州梁曰南豫州東魏曰揚州陳又曰豫州後周曰揚州廬江郡梁置南豫州琅邪郡舊置北徐州劉聰以洛陽為荆州魏梁州今陜西漢中東魏梁州今河南開封漢中亦唐梁州漢武帝改梁州為益州魏分置梁州益州雍州之地漢時為凉州晉置雍州又分其地為凉州秦州後魏置雍州亦分其地為南秦州北秦州劉宋雍州理襄陽其統領郡縣在禹跡為荆州東晉雍州今襄陽府在禹跡為荆豫二州之界以今之地理考之冀州古為幽燕三晉今則太行以西即山西太原等處太行以東即京師奉天等處兖州古為鄒魯即今之山東兖州東昌等處西至河東距濟南接徐豫之境其地當河之下流平衍無髙山青州古為齊即今之山東濟南青州登萊等處地雖近海然不當衆流之衝故禹治之比他州用力為省徐州古為魯為彭城即今之徐州豐沛𨽻江南為南北咽喉揚州古為吳越今之江南及兩淮江浙等處古時江淮不通今一自儀徴至揚子橋一自瓜州至揚子橋二河合而北行自髙郵寶應至清江浦入淮為今糧道咽喉重地其江以南濱海為廣東福建荆州古為楚即今之湖廣荆襄等處其荆梁之界則為貴州其衡山之南則為廣西豫州古為鄭衛東周大梁今之河南開封洛陽等處其地北距河南抵荆山東抵徐西抵雍梁居天下之中梁州古為西蜀益州今之四川成都等處其西南夷壤為今之雲南雍州古為周秦關隴即今之陜西西安左傳芒芒禹迹畫為九州蕭子顯南齊書郡國志讚郡國既建因州而剖離過十三合不踰九九州之變易遷改斯數語者足以盡之矣五服圖說易氏彥祥曰禹五服帝畿在內帝畿千里而兩面各五百里數其一面故曰五百里甸服自甸至荒皆數一靣每靣各五百里總為二千五百里靣相距凡五千里職方氏所載則王畿不在九服之內自方五百里之侯服至方五百里之藩服其名凡九九服每靣各二百五十里通為二千二百五十里兩靣相距通為四千五百里并王畿千里通為五千五百里增於禹者五百里之藩服耳然禹九州之外咸建五長東漸西被即成周藩服之域其名雖增而實未嘗增也
