body:
  text: 禹貢㑹箋卷一翰林院檢討徐文靖撰夏書蔡傳曰夏禹有天下之號也禹貢作於虞時而繫之夏書者禹之王以是功也箋按王充論衡曰堯以唐侯得位舜以虞地得達禹由夏而起皆本興昌之地為號重本不忘始也周書武王克商至周曰吾其有夏之居乎遂營洛邑徐廣曰陽翟夏地也帝王世紀曰禹受封為夏伯在豫州外方之南今開封禹州禹貢既作於虞時禹時為夏伯故曰夏書不當謂有天下之號唐孔氏堯典疏曰左傳莊八年引夏書臯陶邁種德僖二十七年引夏書賦納以言襄二十六年引夏書與其殺不辜寧失不經皆在夏禹謨臯陶謨當云虞書而云夏書者以事關禹故此類是也禹貢上蔡傳曰上之所取謂之賦下之所供謂之貢是篇有貢有賦而獨以貢名篇者貢又夏后氏田賦之總名箋按孔傳曰禹制九州貢法五帝本紀曰惟禹之功為大披九山通九澤决九河定九州各以其職來貢不失厥宜方五千里至于荒服禹之以貢名篇是也又夏后五十而貢在有天下之後禹貢既作於虞時不應以是名篇禹敷土大戴禮史記作傅土蔡傳曰敷分也分别土地以為九州也箋按竹書紀年帝堯七十五年司空禹治河山海經禹鯀是始布土均定九州郭璞曰布猶敷也隨山刋木史記作行山表木漢書作刊木蔡益稷傳曰隨循刋除也左傳曰井堙木刋刋除木之義也循山伐木通蔽障開道路而後水工可興也箋按益稷篇禹曰豫乘四載隨山刋木孔傳曰隨行九州之山林刋槎其木開通道路以治水也服䖍左傳注刋削也周禮柞氏刋陽木義同奠髙山大川奠史記作定蔡傳曰奠定也定髙山大川以别州境也若兖之濟河青之海岱揚之淮海雍之黑水西河荆之荆衡徐之海岱淮豫之荆河梁之華陽黑水是也箋按孔傳曰髙山大川定其差秩祀禮所視也周禮職幣辨其物而奠其録鄭注曰奠定也是矣鄭樵曰州國之設有時而更山川之形千古不易禹貢分州必以山川定疆界使兖州可移而濟河之兖州不可移梁州可遷而華陽黑水之梁州不可遷冀州蔡舜典傳曰舜既分十有二州而至商時又但言九圍九有周禮職方氏亦止列為九州則是為十二州蓋不甚久不知其自何時復合為九也箋按竹書紀年帝堯八十七年初建十有二州九十七年司空巡十二州帝舜元年己未帝即位居冀三十三年春正月夏后受命於神宗遂復九州則是為十二州者約四十九年也堯舜禹皆居冀夏書曰惟彼陶唐有此冀方以言堯始都冀爾蔡傳曰冀州三面距河兖河之西雍河之東豫河之北箋按爾雅兩河間曰冀州蓋言南河東河也此言三面距河者東河之西南河之東南河之北其實一也徐士彰曰其在今日河流徐邳而九河故地乃為漳衛入海之道則冀之東北無復河水之繞而所謂三面濱河者蓋舊跡也蔡傳又曰周禮職方河內曰冀州是也箋按周初時改禹九州以徐梁合於青雍分冀為幽并故冀州止有河內之地史記正義曰河從龍門南至華隂東至衛州即東北入海曲繞冀州故言河內也若禹貢冀州甚廣當兼并幽之地謂三面距河則可謂即周職方河內曰冀州不可既載壺口水經注作壺中誤蔡傳曰經始治之謂之載壺口山名漢地志在河東北屈縣東南晉志平陽郡北屈縣壺口山在東南有南故稱北箋按周禮載師注載之言事也禹貢既載壺口是也後漢郡國志北屈縣有壺口山注引禹貢曰壺口治梁及岐蓋鄭氏已前皆作冀州既載鄭始讀為既載壺口也山海經平山平水出于其上即禹貢壺口山也水經注平陽水出晉陽縣西壺口山東徑狐谷亭括地志壺口蓋受河之口河南入之道迎而受之故曰口今在慈州吉鄉縣西南五十里傳言有南故稱北据竹書紀年翟章救鄭次于南屈是屈有南北也蔡傳曰冀州帝都之地禹受命治水所始故曰既載然禹治水施功之序則皆自下流始故次兖次青次徐次揚次荆次豫次梁次雍兖最下故所先雍最髙故獨後箋按唐孔氏曰九州之次以治為先後以水性下流當從下而泄故治水皆從下為始冀州帝都於九州近北故首從冀起而東南次兖而東南次青而南次徐而南次揚從揚而西次荆從荆而北次豫從豫而西次梁從梁而北次雍雍地最髙故在後也自兖以下皆準地之形勢從下向髙從東向西青徐揚三州並為東偏雍髙于豫豫髙于青徐雍豫之水從青徐入海梁髙于荆荆髙于揚梁州之水從揚入海兖在冀東南冀兖之水各自東北入海也治梁及岐蔡傳曰梁山吕梁山也在今石州離石縣東北爾雅梁山晉望即冀州吕梁也又春秋梁山崩左氏榖梁皆以為晉山則亦指吕梁矣箋按詩奕奕梁山維禹甸之毛傳曰禹治梁山除水災是也春秋成公五年梁山崩左傳晉侯以傳召伯宗問絳事焉榖梁傳梁山崩遏河水三日不流公羊傳梁山河上山魏土地記曰山在夏陽縣西臨於河上即禹貢之吕梁也漢孔氏謂岐梁在雍州非是蔡傳曰岐山在今汾州介休縣狐岐之山勝水所出東北流注於汾箋按山海經狐岐之山勝水出焉水經注勝水出西狐岐之山東徑六壁城南後魏書太武討胡賊于六壁城有六面故名又東徑中陽故城南今孝義縣又東合文水今岐山在介休縣東南二十五里一名薛頡山一名洪山孔氏傳謂在雍州非也雍州岐山在鳳翔府岐山縣既修太原蔡傳曰修因鯀之功而修之也廣平曰原今河東路太原府也箋按魯語曰禹能以德修鯀之功注曰鯀功雖不成禹亦有所因故曰修鯀之功是也孔傳曰太原今為郡名水經注太原郡治晉陽城秦昭襄三年立尚書所謂既修太原者也至于嶽陽蔡傳曰嶽太嶽也地志謂霍太山即太嶽在河東郡彘縣東今晉州霍邑也箋按孔傳曰太嶽在太原西南今在平陽府霍州上有一峯名太嶽地理志河東彘縣霍太山在東北水經注汾水又東與彘水合水出東北太嶽山禹貢所謂嶽陽也蔡傳曰山南曰陽即今嶽陽縣地也堯之所都揚子雲冀州針曰嶽陽是都是也箋按正義曰嶽陽言從太原至嶽山之南如荆之衡陽梁之華陽皆舉其境地所至非專指一地也朱長孺曰嶽陽謂霍山之南其地所包者廣蔡傳專指嶽陽縣言非又按堯都平陽乃平山之陽非霍山也揚雄冀州針洋洋冀州鴻原大陸嶽陽是都島夷被服因禹貢言嶽陽在冀州故云其實嶽陽非堯都也蔡傳曰汾水出於太原經於太嶽東入於河此則導汾水也箋按山海經管涔之山汾水出焉山在今靜樂縣北一百三十里而西流注于河郭璞注曰至汾隂縣北西入河漢志太原汾陽北山汾水所出西南至汾隂入河行千三百四十里水經汾水出汾陽縣北管涔山又西至汾隂縣北西注于河酈道元曰水南有長阜背汾帶河汾水歷其隂西入河今汾州府汾河東黃河西是汾水西入河矣蔡傳云東入誤覃懷砥績史記作致功左傳明砥其情杜預曰砥致也音㫖蔡傳曰覃懷地名地志河內郡有懷縣今懷州也箋按韓詩外傳曰武王伐紂到邢丘更名邢丘曰懷孔傳曰覃懷近河地名唐孔氏曰蓋覃懷二字共為一地故云近河地名据爾雅釋言流覃也覃延也邢昺曰水之流必相延及則是覃懷者乃覃及于懷也今懷慶府河內縣有覃懷驛蓋因禹貢以立名也蔡傳又引曾氏曰覃懷平地也當在孟津之東太行之西淶水出乎其西淇水出乎其東方洪水懷山襄陵之時而平地致功為難故曰砥績箋按史記韓世家秦擊我于太行正義曰太行在懷州河內縣北二十五里又按山海經沁水出井陘山東東南注河入懷東南今沁水正在懷慶之西蔡傳淶水疑當作沁若淶水出直𨽻保安州礬山經淶水縣定興縣合易水去覃懷絶逺何云出乎其西淇水出衛州共城北山至黎陽入河疑義曰覃懷今懷慶府也府城有堯河自太行山谷而出灌田甚為民利故曰砥績非平地致功為難之謂至于衡漳漢書作衡章蔡傳曰衡漳水名衡古橫字地志漳水二一出上黨沾縣大黽谷今平定軍樂平縣少山也名為清漳宋志太平興國二年以鎮州廣陽寨建平定軍山在今太原府平定州樂平縣西南二十里一出上黨長子縣鹿谷山今潞州長子縣發鳩山也山在長子縣西五十里名為濁漳酈道元謂之衡水又謂之橫水東至鄴合清漳東北至阜城入河鄴今潞州涉縣也阜城今定逺軍東光縣也箋按孔傳曰漳水橫流入河鄭氏曰衡漳漳水橫流釋文曰衡如字橫也馬云水名宋景德元年改唐之景州為永靜軍有東光縣阜城縣傳以永靜軍為定逺軍誤矣水經注漳水徑武隧縣故城南今真定府武强縣白馬河注之上承呼沱東南徑武邑郡北而東入衡水隋於此置衡水縣今真定府深州衡水縣是也是衡漳不得為一水矣注又曰斯洨水又東徑樂信縣故城南地理志巨鹿屬縣也又東入衡水衡水又北徑塢縣故城南是衡水不得為橫水矣王肅以為衡漳二水名是也唐志冀州有衡水縣滄州清池縣西五十里有衡漳隄二西北六十里有衡漳東隄循吏傳薛大鼎為滄州刺史疏長蘆衡漳三渠泄汙潦水不為害九域志衡水縣長蘆河即禹貢衡漳故瀆金史景州阜城有衡水又有漳水是也李氏瓚曰冀州原有衡水故瀆在南宫縣注以為橫水非也蔡傳曰桑欽云二漳異源而下流相合同歸于海唐人亦言漳水能獨達于海請以為瀆而不云入河者漢初漳猶入河其後河徙日東而距漳水益逺至欽時儒林傳桑欽君長漢成帝時人河自大伾而下已非故道而漳自入海矣故欽與唐人所言者如此箋按正義曰懷在河之北漳在懷北五百餘里從覃懷致功而北至衡漳也則漳之不應入河明矣蔡傳謂漢初入河不知何据一統志漳水二源俱入彰德府境合流入衛河厥土惟白壤蔡傳曰漢孔氏曰無塊曰壤顔氏曰柔土曰壤箋按管子地員篇上土有五壤中土有五壚下土有五埴鄭康成曰以萬物生焉則言土以人所耕而樹藝焉則言壤唐孔氏曰土堅而壤濡九章算術穿地四為壤五壤為息土則壤是土和緩之名蔡傳曰辨土之宜有二白以辨其色壤以辨其性蓋草人糞壤之法各因色性而辨其所當用也箋按援神契曰五土出利以給天下黃白宜種禾黑墳宜種麥蒼赤宜種菽泍泉宜種稻又管子地員篇有赤壚黃唐黑埴青商白壤之名皆祖述禹貢之遺意也孔傳曰水去土復其性色白而壤美馬曰天性和美也厥賦惟上上錯厥田惟中中孔傳曰賦謂土地所生以供天子上上第一雜出第二之賦田之髙下肥瘠九州之中為第五箋按唐孔氏曰多者為正少者為雜此州言上上錯者少在正下豫州言錯上中者少在正上蔡傳曰賦髙于田四等者地廣而人稠也箋按地志曰河東土地平易有鹽鐵之饒本唐堯所居後唐李琪曰自堯堙洪水禹作司空於是辨九等之田收什一之稅其時戶口一千三百餘萬定墾田約九百二十萬頃為太平之盛冀為帝都其地廣人稠可知埤傳曰朱子以平陽蒲坂其地磽瘠朴陋非堯舜不能都此據後世而論耳冀賦第一田第五其非磽瘠可知周職方曰其榖宜黍稷本非磽瘠明矣蔡傳曰林氏曰冀州先賦後田者冀王畿之地天子所自治併與場圃園田漆林之類而征之如周官載師所載賦非盡出于田也故以賦屬于厥土下餘州皆田之賦也故先田而後賦箋按周禮小司徒職經土地而井牧其田野任地事而令貢賦田有不易一易再易之不同賦亦上中中下三錯之各異至載師任土則以宅田士田賈田任近郊之地以官田牛田賞田牧田任逺郊之地以公邑之田任甸地以家邑之田任稍地田不耕者出屋粟時征其賦故必先品田之髙下而後可以制賦若禹時京師之田舊所熟悉豈待至禹而始核唯校之八州不知其賦為何等至是而頒行列州乃知冀賦為上上錯故先言賦而後言田也餘八州之賦則照京師之例而行之若徐田第五則賦第二揚田第九則賦第七而又雜出第六者是也傳以為冀賦併園㕓漆林而征之賦不盡出于田故先賦後田何當日兖之漆絲豫之漆枲載為定制而冀賦了不相及觀甸服止納總秸粟米别無他賦可知何得以周初時制例之於禹貢時也恆衛既從史記作常衛以諱恆也蔡傳曰恆水地志出常山郡上曲陽縣恆山北谷東入􅋤水朝氏曰今之恆水西南流至真定府行唐縣東流入于滋水又南流入于衡水非古徑矣箋按水經注􅋤水東徑左人城南又東恆水從西來注之自下􅋤水兼納恆川之通稱焉即禹貢所謂恆衛既從也孔傳曰二水已治從其故道蔡傳曰衛水地志出常山郡靈壽縣東北東入滹沱河薛氏曰東北合滹沱河過信安軍入易水箋按宋信安軍在今順天府霸州一統志衛河在靈壽縣東北十里俗呼雷溝河又棗强有索盧水即衛水之支流也石瑤乃以為衛輝府之衛水源自府城北東達內黃濬縣與淇漳滹沱諸水合流至直沽入海非是大陸既作蔡傳曰大陸孫炎曰巨鹿北廣阿澤河所經也程氏曰巨鹿去古河絶逺河未嘗徑邢以行巨鹿之廣阿非是按爾雅髙平曰陸大陸云者四無山阜曠然平地蓋禹河自澶相以北澶今開州相今彰德府皆行西山之麓故班馬王橫皆謂載之髙地則古河之在貝冀貝今廣平府清河縣冀今真定府冀州以及枯洚之南皆穿西山踵趾以行及其已過信洚之北則西山勢斷曠然四平蓋以此地謂之大陸乃與下文北至大陸者合故隋改趙之昭慶以為大陸縣唐又割鹿城置陸渾縣皆疑巨鹿之大陸不與河應而亦求之向北之地杜佑李吉甫以為邢趙深三州為大陸者得之箋按山海經敦與之山溹水出于其陽而東流注于泰陸之水郭璞曰泰陸水也名勝志敦與山在趙州臨城縣南七十里金史志沃州臨城縣有敦與山吕氏春秋九藪趙之巨鹿髙誘注廣阿澤也河渠書注大陸澤在邢州及趙州界則巨鹿即為大陸明矣大陸自水名孫炎以為河所經非也又按魏收地形志殷州治廣阿劉昫曰北齊改為趙州隋改廣阿為大陸唐武德四年改為象城天寶元年改為昭慶以縣西南有建初啓運二陵故名宋開寶二年改昭慶為隆平據此則是唐改大陸為昭慶蔡傳乃謂隋改昭慶為大陸謬矣唐志深州束鹿縣本鹿城先天二年析鹿城置陸澤蔡傳作陸渾澤之訛也蓋大陸水名禹治水而恆衛既從則大陸水退地可耕作若荆州雲夢之澤雲土夢作乂是也爾雅髙平曰陸疑大陸亦必髙地不得為水然洪水懷山襄陵况平陸乎當是時洪水方割冀州為京師根本之地重農力作秎穫豐收君相以農為本務堯授人時平秩東作舜耕歷山田事其所素諳也禹曰濬畎澮距川暨稷播奏庶艱食蒸民乃粒萬邦作乂則冀土為諸州之倡導夏小正初嵗祭耒始用暢農率均田農及雪澤初服于公田夏時已有公田二月往耰黍三月祈麥實五月種黍菽穈蓋其遺制也吕刑曰稷降播種農殖嘉榖三后成功惟殷于民則當日大陸既作所可想見者也島夷皮服史記漢書作鳥夷蔡傳曰海島之夷以皮服來貢也箋按東漢挹婁傳好養豕食肉衣皮逺夷慕德歌阻蘇邪犂注曰食肉衣皮唐書回鶻列傳白霫居鮮卑故地直京師東北五千里業射獵以赤皮緣衣爾雅東北方之美者斥山之文皮故冀東北邊之夷多皮服也孔傳曰海曲謂之島居島之夷還服其皮明水害除鄭𤣥王肅本皆作鳥夷夾右碣石入于河史記漢書河作海蔡傳曰碣石地志在北平郡驪城縣西南河口之地今平州之南也冀州北方貢賦之來自北海入河南向西轉而碣石在其右轉屈之間故曰夾右也箋按山海經碣石之山繩水出焉東流注于河郭璞曰或曰在右北平驪城縣海邊山也則碣石在河之右而近海矣蓋海水瀰漫稽天混茫無際遼東西貢賦入河之道微茫難認屹然有碣石髙峙其右穹窿如柱舟楫入河望之儼在其右掖則南向入河西轉以此為識唐陸德明釋文曰夾音協帶也宋楊伯嵒九經韻補曰夾音協以其居河之右如人之右脅然也孔氏傳曰碣石海上山禹夾行此山之右而入河逆上夾字以本音讀之失其㫖矣杜佑曰碣石山在漢樂浪郡遂城縣秦長城起此為左碣石禹貢碣石在平州南三十餘里為右碣石蔡傳曰程氏曰冀為帝都東西南三面距河他州貢賦皆以達河為至故此三方亦不必書而其北境則漢遼東西右北平漁陽上谷之地其水如遼濡滹易皆中髙不與河通故必自北海然後能達河也箋按袁坤儀曰謂遼濡滹易之水皆中髙不與河通者誤濡易滹沱諸水去帝都近漢書注易水出故安至苑陽入濡又濡水有二一出涿郡合易水一出遼西肥如縣南入海陽縱使入河亦不由行遼水又在塞外安得中之郡國志注引郭璞山海經注潦水出塞外御白平山水經作衛白平今本山海經作衛臯山當是誤合白平為臯志又誤衛為御也蔡傳曰韋昭以為碣石其山皆在河口海濱故以志其入貢河道歷世既久為水所漸淪入于海已去岸五百餘里矣箋按漢地志右北平驪成大揭石在縣西南王莽改縣曰碣石史記蘇秦列傳燕地方二千里南有碣石鴈門之饒封禪書北至碣石巡自遼西若果淪入于海去岸五百里所謂在縣西南者何山南有北至者又何石也蓋遼東為古幽營二州之域舜分冀東北為幽即今廣寧以西之地青東北為營即今廣寧以東之地東至鴨緑江西至山海關南至旅順口北至開元城三面瀕邊一面阻海特碣石一線之河可通貢道自島夷入貢而外不使習知其內地夷險聖人制貢之意微矣哉禹貢㑹箋卷一
