body:
  text: 禹貢㑹箋卷二翰林院檢討徐文靖撰濟河惟兗州漢書濟作泲史記兗作沇蔡𫝊曰兗州之域東南據濟西北距河蘇氏曰河濟之間相去不逺兗州之境東南跨濟非止於濟也箋按正義曰濟河之間相去路近兗州之境跨濟而過東南越濟水西北至東河也羅平曰九州之界濟河兗淮岱徐相去不能千里荆河豫千里而贏海岱青千里而縮荆山衡陽荆二千里而遙東海西河冀二千里而近壽春之淮潮陽之海揚相去五六千里龍門之河燉煌之黑雍相去且四千里華陽黑水梁窮數千里猶未知其所終荆河淮濟之間斷長補短不能淮海一州之半則知所制各有當矣九河既道蔡𫝊曰九河爾雅一曰徒駭二曰太史三曰馬頰四曰覆釜五曰胡蘇六曰簡潔七曰鈎盤八曰鬲津其一則河之經流也先儒不知河之經流遂分簡潔為二既道既順其道也箋按爾雅簡潔郭璞曰簡水道簡易潔水多約潔朱子注孟亦分簡潔為二又吳氏程曰南皮縣明有簡河何嘗合潔為一蔡𫝊乃合簡潔而一之非也邢昺曰九河所在徒駭最北鬲津最南蓋徒駭是河之本道東出分為八枝也然則徒駭即河之經流蔡𫝊謂徒駭而外别有一經流非𫝊又曰按徒駭河地志云滹沱河寰宇記云在滄州清池南許商云在成平箋按唐地志滄州清池縣有徒駭河九域志在故滄州廢清池縣西北二十里寰宇記在清池縣西五十里𫝊云南誤邢昺爾雅疏九河所在徒駭最北鬲津最南蓋徒駭是河之本道東北分為八枝也然則徒駭即河之經流𫝊云徒駭而外别有所為經流者以簡潔誤合而為一也𫝊又曰馬頰河元和志云在德州安德平原東南寰宇記云在棣州商河北輿地記云即篤馬河也箋按溝洫志孫禁以為可開通大河今入故篤馬河先儒以為即馬頰唐地志德州平昌縣有馬頰河金史志棣州商河縣有馬頰河一統志馬頰河在東光縣界經堂邑清平二縣界東達樂陵入海又髙唐州西有馬頰河故道𫝊又曰覆釜河通典云在德州安德箋按一統志覆釜枯河自慶雲經海豐縣南入海𫝊又曰胡蘇河寰宇記云在滄之饒安無棣臨津三縣許商云在東光箋按許商謂古說九河之名有徒駭胡蘇鬲津今現在成平東光鬲縣界中郡國志勃海東光縣有胡蘇亭胡蘇河水經注清河又東至東光縣西南徑胡蘇亭又東北右㑹大河故瀆元史云胡蘇在慶雲西南廣雲故無棣𫝊又曰簡潔河輿地記云在臨津箋按方輿紀要潔與簡相近輿地記云在臨津孔氏謂在貝州厯亭縣誤也金史南皮縣有潔河元志簡潔在南皮城外十餘步𫝊又曰鉤盤河寰宇記云在樂陵東南從德州平昌來今德平縣輿地記云在樂陵箋按水經注般縣般河蓋亦九河之一也漢書稱公孫瓚破黃巾於般河即此瀆也元志獻縣東南八十里有鉤盤河𫝊曰鬲津河寰宇記云在樂陵東西北流入饒安許商云在鬲縣輿地記云在無棣箋按溝洫志許商以為古說九河之名有徒駭胡蘇鬲津今見在成平東光鬲界中自鬲以北至徒駭間相去二百餘里今河雖數移徙不離此域方輿紀要鬲津在鉤盤之北漢志注平原鬲縣平當以為鬲津通典在獻縣之廢饒安縣元志在慶雲縣又在樂陵縣西三十里一統志云至海豐入海𫝊曰太史河不知所在箋按通典曰九河四在景成二在平原其太史簡潔未詳處所方輿紀要太史河在徒駭之東元志太史河在南皮縣治北𫝊又曰九河水道變遷難於推考而碣石通頂趾皆石不應仆沒今兗冀之地既無此石而平州正南有山而名碣石者尚在海中去岸五百餘里卓立可見則是古河自今以為海處向北斜行始分為九其河已淪於海明矣漢王橫言昔天常連雨東北風海水溢西南出浸數百里九河之地已為海水所漸酈道元亦言九河碣石苞淪於海後世儒者知求九河於平地而不知求碣石有無以為之證故前後異說究無歸宿箋按封禪書北至碣石巡自遼西地理志碣石在驪成西南今永平昌黎縣北相去二十里現有碣石何得云去岸五百里也自石晉以幽薊十六州賂契丹厯宋數百年足跡未至其地近自滄州望平州約五百餘里何得以碣石逺在海中去平州五百里也縱使去平州五百餘里又何得有卓立可見者水經注曰禹貢兗州九河既道矣謂徒駭太史馬頰覆釜胡蘇簡潔鈎盤鬲津也同為逆河蓋所潤下之𫝑以通河海及齊桓霸世塞廣田居同為一河故自堰以北館陶廮陶唐志趙州寧晉本廮陶丘貝丘鬲般廣光信都東光河間樂成城地並存川瀆多亡漢世河决金隄南北離其害議者欲求九河故迹而川之未知其所夫欲求九河故迹則必有故迹之處可求豈謂求之於海乎孫禁謂開通大河令入故篤馬河至海五百里豈謂至碣石五百里乎至王橫言天常連雨東北風海水溢西南浸數百里如春秋所書宋大水類豈風息雨霽之後宋遂淪為海乎雷夏既澤蔡𫝊曰澤水之鍾也雷夏地志在濟隂郡成陽縣西北今濮州雷澤縣西北也山海經云澤中有雷神龍身而人頭鼓其腹則雷然則本夏澤也因其神名之曰雷夏也箋按山海經雷澤有雷神龍身而人頭鼓其腹在吳西漢地志㑹稽吳縣具區在西古文以為震澤郡國志吳郡吳縣震澤在西劉昭注曰越絶書云湖周三萬六千頃有大雷山小雷山水經注太湖有大雷小雷三山亦謂之三山湖此雷澤即震澤與禹貢雷夏無涉蔡𫝊之誤因史遷舜紀舜漁雷澤正義曰雷澤有雷神鼓其腹則雷改經文在吳西字為則雷字而不知其非禹貢之雷澤也据漢地志曰濟隂定陶詩風曹國也堯作游成陽舜漁雷澤故其民猶有先王之遺風括地志曰雷夏在濮州雷澤縣郭外西北元和志曰雷澤縣西北至濮州九十里此則禹貢之雷澤矣近志云雷澤東西二十里南北十五里李之藻云澤底有巉石深壑冬至前水吸而入如巨雷鳴故名雷澤意洪水懷襄之世雷澤未陂泛濫彌廣史稱舜漁於雷澤就時於負夏鄭𤣥曰負夏衛地孫奭孟子疏曰今之東郡是也意是時雷澤負夏或皆其澤所瀰漫故總名雷夏未可知也正義曰洪水之時高原亦水澤不為澤雷夏既澤高地水盡此復為澤也周禮稻人職曰凡稼澤夏以水殄草而芟夷之澤草所生種之芒種是也灉沮㑹同蔡傳曰灉水曾氏曰爾雅水自河出為灉許氏曰河灉水在宋水經汳水出隂溝東至蒙為狙獾灉水即汳水也箋按元和志曰灉水沮水二源俱出雷澤縣西北平地去縣十四里許氏曰灉水東入泗下流入沮韓氏謂此乃河之别流在豫州者東厯徐州境入泗水經汳水出隂溝於浚儀縣北東至梁郡蒙縣為濉水獲水出汳水於梁郡蒙縣北又東至彭城縣北東入於泗蔡傳狙獾乃沮獲二字之訛蔡傳曰朝氏曰爾雅自河出為灉濟出為濋求之於韻沮有楚音箋按僖十九年左𫝊注杜預曰沮水受汴東經陳留梁譙沛彭城縣入泗水經瓠子河出東郡濮陽縣北河注曰禹貢灉沮㑹同許慎曰河灉水也九域志曰濮州有沮溝即禹貢灉沮㑹同者京相璠曰今濮陽城西南十五里有沮丘城六國時沮楚同以為楚丘非也桑土既蠶蔡𫝊曰蠶性惡濕故水退而後可蠶然九州皆賴其利而獨於兗言之者兗地宜桑後世之濮上桑間猶可驗也箋按祭義曰古者天子諸侯必有公桑蠶室大昕之朝桑於公桑風戾以食之鄭氏曰風戾之使露氣燥乃以食蠶蠶性惡濕是也秦少游蠶書序略曰考之禹貢揚梁冀雍不貢繭物兗篚織文徐篚𤣥纖縞荆篚𤣥纁璣組豫篚纖縞青篚檿絲皆繭物也而桑土既蠶獨言於兗然則九州蠶事兗為最乎夏小正三月攝桑𫝊曰桑攝而記之急桑也貨殖𫝊齊魯千𣗳桑與千户侯等詩邶鄘衛譜東及兗州桑土之野正義曰今濮水之上地有桑間者是有桑土明矣是降丘宅土史記作下一居土蔡𫝊曰兗地多在卑下水害尤甚民皆依丘陵以居至是始得下居平地也箋按鄭氏曰此州寡於山而夾川兩大流之間遭洪水其民尤困水害既除於是下丘居土以其免於厄尤喜故記之周官大司徒以土宜之法辨十有二土之名物以相民宅而知其利害注曰相視其地以奠民居使知趨利避害各得其所也當日禹作司空掌邦土居四民時地利正其事也是降丘宅土非止為下居平地故於蠶桑既興後記之厥土黑墳蔡𫝊曰土脉墳起也箋按孔𫝊曰色黑而墳起陸氏釋文曰馬云有肥澤也周禮草人職墳壤用麋援神契曰黑墳宜種麥說卦𫝊坤於地為黑兗土乃黑而墳也厥草惟繇厥木惟條蔡𫝊曰林氏曰兗徐揚三州最居東南下流其地卑濕沮洳洪水為患草木不得其生至是或繇或條或夭或喬而或漸包故於三州特言之箋按論衡曰地性生草山性生木故草木於山為宜兗州寡於山而夾以河濟之間水盛而草木不生今既長茂故特書之孔𫝊曰繇茂條長馬云繇抽也坤文言曰天地變化草木蕃其謂是乎厥田惟中下厥賦貞蔡𫝊曰貞正也兗賦最薄言君天下者以薄賦為正也箋按隋書食志云采制九等而康歌興九州以土色定田皆有定賦惟冀豫梁揚錯出冀豫荆青徐雍兗揚梁為次然雍兗皆六六而無九今兗田第六賦亦第六無復下上之别故曰貞鄭氏曰貞正也其賦中上則是田正與賦相當故以為貞也周書無逸所謂惟正之供蔡𫝊云以薄賦為正其餘八州之賦將遂不得為正乎作十有三載乃同蔡𫝊曰兗當河下流之衝今水患雖平而卑濕沮洳未必盡去土曠人稀生理鮮少必治作十有三載然後賦法同於他州箋按鄭氏曰治此州正作不休十三年乃有賦與八州同言功難也夫以為治此州者正作不休則貞作連讀可乎且十三年中八州有賦而兗獨無其果然乎意以作當為耕作如冀州大陸既作之類蓋兗田第六賦亦第六必耕作十有三載貞問其田之收穫賦之正供無復有上下豐歉之異故曰貞也若以為同於他州則兗賦第六他州亦第六乎然必十有三載者周禮天府職云季冬陳玉以貞來嵗之媺惡鄭氏曰問事之正曰貞問嵗之媺惡謂問於龜太卜職太貞之屬史記太隂在子旱明嵗美至卯穰明歲衰惡至午旱明歲美至酉穰明歲衰惡故必十三載乃可以同周職方曰兗州其榖宜四種厥貢漆絲蔡𫝊曰兗地宜漆宜桑故貢漆絲也箋按禇遂良曰舜造漆器禹雕其俎是漆為當時器用之所需也貨殖𫝊山東多魚鹽漆絲故兗貢之考工記㡛人湅絲以涗水漚其絲鄭氏曰涗水謂以灰所泲水也楚人曰漚齊人曰涹厥篚織文漢書篚作棐蔡𫝊曰篚竹器筐屬也古者幣帛之屬則盛之以筐篚而貢焉織文者織而有文錦綺之屬也箋按三禮圖曰篚以竹為之長三尺廣一尺深三寸足高三寸上有蓋孔𫝊曰地宜漆林又宜桑蠶織文錦綺之屬盛之筐篚而貢焉据禮記深衣士不衣織鄭注曰織染絲織之士衣染繒也是織文乃染絲織之而有文非必為錦綺也詩六月織文鳥章又周禮玉府掌王之獻文織良貨賄之屬注曰文織謂織之有文出於織成者其非為錦綺可知浮於濟漯達于河史記漢書濟作泲蔡𫝊曰舟行水曰浮漯者河之枝流也兗之貢賦浮濟浮漯以達於河也箋按水經曰濟水又東北過甲下邑入於河酈注曰山海經濟水入巨野注渤海入濟琅槐東北者也又東北河水枝津注之水經以為入河非也斯乃河水注濟非濟入河杜佑曰濟水因王莽末渠涸不復截河過今東平濟南淄川北海界中有水流入海謂之清河實菏澤汶水合流亦曰濟河蓋因舊名非濟水也郭景純曰濟自滎陽至樂安博昌入海今河竭濟水仍流不絶然河水於濟漯之北别流注海今所輟流者惟漯水耳郭或以為濟注之事實非也孔𫝊曰順流曰浮因水入水曰達蔡𫝊曰地志漯水出東郡東武陽至千乘入海程氏以為此乃漢河與漯殊異然亦不能明言漯河所在未詳其地也箋按水經注曰桑欽地理志漯水出髙唐余按穆天子𫝊丁卯天子自五鹿東征釣於漯水以祭淑人己巳天子東征食馬於漯水之上尋其沿歷徑趣不得近出高唐也据穆𫝊郭注漯水今濟隂漯隂縣是漯隂在濟水之隂也水經漯水徑高唐縣故城東又東北徑漯隂故城北故兗州貢賦浮濟浮漯以入河也金史志博州博平縣有漯河今在章丘縣東北七里源出縣之長白山西北流入小清河唐志濟南章丘縣有長白山是也薛氏謂古漯自東昌府朝城縣受河而東入海故浮漯可以達河西漢末河并行漯川其後河徙而漯亦不復存矣章丘縣志縣東北七里有漯水出長山縣之長白山西北流入小清河非古漯也禹貢㑹箋卷二
