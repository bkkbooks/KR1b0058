body:
  text: 禹貢會箋卷六翰林院檢討徐文靖撰荆及衡陽惟荆州蔡傳曰北距南條荆山南盡衡山之陽箋按山海經荆山之首曰景山東北百里曰荆山荆州記曰臨沮縣西北三十里有清溪溪北即荆山卞和抱璞之處釋名荆州取荆山之名唐地志襄州南漳縣本荆山縣有荆山荆山之南為荆州北為豫州是荆州亦在荆山之陽故曰荆及衡陽今荆山在襄陽府南漳縣西北八十里張揖廣雅曰衡山南嶽有岣嶁峰上有神禹碑周職方正南曰荆州其山鎮曰衡山寰宇記曰星當翼軫度應璣衡故曰衡山今衡山在衡州府衡山縣西三十里江漢朝宗于海蔡傳曰江漢合流于荆去海尚逺然水道已安而無有壅塞橫決之患雖未至海而其勢奔趨于海猶諸侯之朝宗于王也箋按周職方荆州其川曰江漢楚昭王曰望不過江漢以漢至大别入江故統言江漢也江漢為四瀆之二禮曰四瀆視諸侯老子曰滄海所以能為百谷王者以其下之水之赴海猶諸侯朝王假人事以言之也孔傳曰百川以海為宗宗尊也詩沔彼流水朝宗于海意亦本禹貢也九江孔殷孔殷史記作甚中蔡傳曰九江即今之洞庭也水經言九江在長沙下雋西北楚地記巴陵瀟湘之淵在九江之間今嶽州巴陵縣即漢之下雋洞庭正在其西北則洞庭之為九江審矣箋按山海經沅水入下雋西合洞庭中又洞庭之山帝之二女居之是在九江之間蔡以九江為洞庭本此果如是則禹貢荆州當先九江孔殷而後江漢朝宗矣况山海經臣秀校即劉歆也太康地記曰九江劉歆以為湖漢九江入彭蠡澤也歆豈不知山海經有洞庭之山是在九江之間洞庭在九江之間不得以洞庭為九江可知矣范致明嶽陽風土記曰按澧鼎沅湘合諸蠻黔南之水匯為洞庭至巴陵與荆江合而東川據其上水經云江水右會水靑口資水也世謂之益陽江右則沅水注之謂之橫房口東到微湖世謂之靡湖西流注為江謂之靡湖口左則澧水謂之武陵江凡此五水注為洞庭北會為大江名曰五渚戰國策曰秦與荆戰大破之取洞庭五渚楚辭帝子降兮北渚皆其地也是洞庭在戰國尚謂之五渚豈禹時已謂之九江乎若使洞庭即九江何又曰東陵地在廬江蘭陵西北敷淺原地在豫章歷陵西是明知其為水經之誤且下雋西北安知其非東北之訛乎蔡傳曰今沅水漸水元水辰水敘水酉水澧水資水湘水皆合於洞庭意以是名九江也箋按元水無考元水疑無水之訛周易無皆作無或以此誤也經言東至于澧過九江澧不當在九江之列史記六國表秦始皇分天下為三十六郡析楚郡為九江鄣會稽三郡九江名郡始此水經秦九江治夀春兼以廬江豫章之地漢志豫章雩都縣湖漢水東至彭澤入江行千九百八十里鄱陽鄱水西入湖漢餘干餘水東北至鄡陽入湖漢艾縣修水東北至彭澤入湖漢新淦淦水西入湖漢南城旴水西北至南昌入湖漢建成蜀水東至南昌入湖漢宜春南水東至新淦入湖漢南野彭水東入湖漢以是為九江正在於江漢朝宗之下與經文合無疑也蔡傳曰漢志九江在廬江郡尋陽縣尋陽記張僧鑒撰九江之名有烏江蚌江烏白江嘉靡江畎江沙江廩江隄江箘江今詳漢九江郡之尋陽乃禹貢揚州之境而唐孔氏又以為九江之名起於近代未足為據箋按沈約宋書云尋陽漢屬廬江吳立蘄春郡尋陽屬焉水經江水又東過蘄春縣南此即西陽尋陽二郡界是也漢西陽屬江夏郡西陽故城在今黃州府黃岡縣史記淮南王傳伍被曰南收衡山以擊廬江有尋陽之船守下雉之城結九江之浦絶豫章之口正義曰即彭蠡湖口北流出大江者應劭注地理志曰江自尋陽分為九道郭璞江賦曰源二分於崌崍流九泒乎尋陽湖漢九水北至彭澤入江聿有明徵而乃據尋陽記之臆造真屬無稽之言也既明知起於近代又何引以為據蔡傳曰九江泒别取之耶亦必首尾短長大略均布然後可目之為九然其一水之間當有一洲九江之間沙水相間乃為十有七道尋陽之地將無所容設使泒别為九則當曰九江孔道不當曰孔殷於導江當曰播九江不應曰過九江孔甚也殷正也九江水道甚得其正也箋按太史公自序窺九疑浮于沅湘乃曰余南登廬山觀禹疏九江則不以洞庭為九江也竹書紀年曰周康王十六年南巡狩至九江廬山穆王二十七年大起九師東至于九江遂伐越是九江與廬山為近也洞庭在鎬京西南若使洞庭為九江又何當言東至也漢志九江在尋陽南豈謂止在尋陽一縣耶通典曰舒州宿松縣有江水自鄂陵分為九泒會於此縣界洲上二百餘里合流謂之九江口東得武林洲即桑落洲之下尾鄂在武昌桑落洲在安慶府宿松縣宋史林栗傳江州上至鄂渚七百里下至池陽五百里九江沙水相間蔡傳疑尋陽之地將無所容何耶至以泒别為九導江當曰播九江不應曰過九江不知此過九江者乃江水過之猶漢水過三澨也若江水不過九江何由朝宗于海耶孔殷史記作甚中孔傳九江在尋陽甚得地勢之中是也蔡云殷正也九江水道甚得其正也向使殷當訓正堯典以殷仲春以殷仲秋何必别之曰以正仲夏以正仲冬也由此推之殷與正宜不同也沱潛既道史記作沱涔已道蔡傳曰爾雅水自江出為沱自漢出為潛此則荆州江漢之出者也今按南郡枝江縣有沱水然其流入江而非出于江也華容縣有夏水首出于江尾入于沔亦謂之沱潛水則未有見箋按孔傳曰沱潛發源梁州入荆州漢志南郡枝江縣有江沱出西東入江胡身之注通鑑曰枝江縣自漢以來屬南郡江水自縣西别出為沱而東復合于江故曰枝江則是出江而又入江也王氏炎曰沱水在江陵府枝江縣土人謂枝江為百里洲其與江分處謂之上沱與江合處謂之下沱蔡傳謂非出江者誤矣漢志武都東漢水受氐道水一名沔武都今鞏昌府階州也過江夏謂之夏水入江應劭曰沔水入江别至南郡華容為夏水過郡入江故曰江夏則是漢水入江而又出江者也蔡傳依鄭氏以為沱水非矣王氏炎曰隋志南郡松滋縣有涔水今松滋分為潛江矣承天府志今安陸府漢水自鍾祥縣北分為蘆洑湖經潛江東南復入漢此為古潛水甚明徐退山曰沱水自江出潛水自漢出二水合為一流以出瞿塘至荆猶存舊名者所以紀江漢之源委也雲土夢作乂史記雲夢土為治蔡傳曰雲夢澤名周官職方荆州其澤藪曰雲夢方八九百里跨江南北華容枝江江夏皆其地也左傳楚子濟江入于雲中又楚子以鄭伯田于江南之夢合而言之則為一别而言之則為二也箋按沈括筆談曰禹貢雲夢土作乂太宗皇帝得古本尚書作雲土夢作乂詔改禹貢從古本左傳昭三年鄭伯如楚既享子産備田具王以田江南之夢以者謂以田具耳豈謂以鄭伯乎爾雅楚有雲夢邢昺疏引杜預曰南郡枝江有雲夢城江夏安陸縣亦有夢城或曰華容縣東南有巴丘湖江南之夢也相如子虛賦雲夢者方八九百里亦得單稱雲單稱夢也蔡傳曰雲土者雲之地土見而已夢作乂者夢之地已可耕治也蓋雲夢之澤地勢有髙卑故水落有先後人工有早晚也箋按大雅綿之詩自土漆沮齊詩作自杜言公劉避狄而來居杜漆沮之地是雲土即雲杜史記索隱曰雲土夢本二澤名韋昭曰雲土今為縣水經曰沔水徑江夏雲杜縣東今安陸府京山縣夏水從西來注之道元曰即堵口也禹貢所謂雲土夢作乂故縣取名焉雲土地可為縣不卑于夢傳謂雲但土見而以作乂專屬夢非也若以洪水方割土見必記九州之大其可勝記哉厥土惟塗泥蔡傳曰荆州之土與揚州同箋按素問注曰中原地形西北髙東南下故荆揚土多泥塗馬融曰泥塗漸洳也蓋荆揚澤國農夫多霑體塗足詩如塗塗附是則塗泥之謂也厥田惟下中厥賦上下孔傳曰田第八賦第三箋按周職方曰荆州土宜稻與揚同但荆地廣沃一歲再穫故菽粟饒足田比揚只加一等賦乃第三等也厥貢羽毛齒革惟金三品蔡傳曰荆之貢與揚大抵多同然經先言羽毛者漢孔氏此見唐孔氏書疏云漢孔氏誤所謂善者為先也箋按夏小正十有一月王狩陳筋革戴傳曰陳筋革者省兵也明堂位曰夏后氏之綏鄭氏曰綏當為緌緌為注旄牛尾于干首所為大麾賈疏曰案鍾氏染鳥羽為王后之車飾亦為旌旗之緌是羽毛皆當時所需可知也伊尹四方獻令曰正南以珠璣象齒文犀翠羽為獻周職方曰正南曰荆州左傳僖二十三年重耳對楚子曰羽毛齒革則君地生焉楚語王孫圉曰楚之所寶齒角皮革羽毛所以備賦用是羽毛齒革荆産為善故列于惟金三品之先蔡傳曰揚州其利金錫荆州其利丹銀齒革則荆揚所産不無優劣矣箋按考工記曰吳粵之金錫神異經曰丹陽銅似金可煅以作錯塗之器越絶書曰赤堇之山破而出錫若耶之谷涸而出銅山海經曰荆山之陽多赤金杻陽之山其陽多赤金其隂多白金貨殖傳豫章出黃金郭璞曰赤金銅也白金銀也書吕刑其罰百鍰孔安國曰鍰黃鐵也是古者銀銅鐵皆謂之金荆州其利丹銀所産雖同于揚而不若羽毛齒革較善于揚故列于羽毛齒革下也杶幹栝柏蔡傳曰杶栝柏三木名也杶木似樗而可為弓幹栝柏葉松身箋按孔傳曰杶似樗幹柘也鄭氏曰四木名也左傳襄十八年孟莊子斬其橁以為公琴杜預曰橁杶也不聞杶可為弓幹也考工記曰荆之幹又曰凡取幹之道七柘為上是謂柘為幹也周官太宰九貢有材貢鄭注曰材貢櫄幹栝柏篠簜也杶幹栝柏為四木傳云三木非也礪砥砮丹蔡傳曰礪砥皆磨石砥以細密為名礪以粗糲為稱砮者中矢鏃之用肅愼氏貢石砮者是也丹丹砂也箋按山海經隂山多礪石發視之山師每之山多砥礪鼓鍾之山其上多礪其下多砥是礪砥為虞夏時所需物也司馬相如傳雲夢者方八九百里其石則鹼劯玄厲張揖曰玄厲黑石可用磨也是礪砥亦荆産也竹書紀年周武王十五年肅愼氏來賓國語仲尼曰昔武王克商肅愼氏貢楛矢石砮其長尺有咫正是年事也石砮一名水花石堅利入鐵可銼矢鏃荆與梁皆産砮故貢焉丹丹砂唐志黔州錦州貢光明丹砂辰州麻陽縣有丹穴周職方其利丹銀皆荆州地也又古以丹為彩色之名山海經有沃之野爰有白丹靑丹孝經援神契王者德至山林則黑丹出周官職金入其丹靑于守府之藏丹亦不專指丹砂也惟箘簵楛三邦砥貢厥名徐廣曰一作箭足杆杆即楛也蔡傳曰箘簵竹名皆可以為矢董安于之治晉陽也公宫之垣皆以荻蒿苫楚廪之其髙丈餘趙襄子發而試之其堅則箘簵不能過也蓋竹之堅者其材中矢之笴楛肅愼氏貢楛矢者是也三邦未詳其地砥致也致貢箘簵楛之有名者也箋按鄭氏曰箘簵䉁風也竹有二名山海經暴山多篃箘戴凱之竹記箘簵載籍貢名荆鄙篃亦箘徒概節而短江淮之間謂之䈛竹䈛音快是箘簵蓋荆産也又按考工記燕之角荆之幹妢胡之笴此材之美者也注曰荆荆州也幹柘也妢胡地名也正義曰妢胡在楚旁三邦致貢厥名其物特有美名天下稱善也包匭菁茅蔡傳曰匭匣也菁茅有刺而三脊所以供祭祀縮酒之用既包而又匣之所以示敬也齊桓公責楚貢包茅不入王祭不供無以縮酒又管子云江淮之間一茅而三脊名曰菁茅一物也孔氏謂菁以為葅者非是箋按鄭氏曰包結也茅有刺曰菁茅吳都賦貢納其包匭注曰包裹也匭結也孔傳曰匭匣也正義曰匱之小者唐武后置四匭于明堂命名以此封禪書江淮之間一茅三脊孟康曰所謂靈茅也後漢書公孫瓚伐荆楚以致菁茅括地志辰州盧溪縣西南三百五十里有包茅山本菁茅也以禹貢包而匭之故曰包茅厥篚玄纁璣組史記厥皆作其蔡傳曰周人染夏纁玄纁絳色幣也璣珠不圓者組綬類箋按儀禮曰聘禮賓朝服釋幣制玄纁束鄭注玄纁之束玄居三纁居二朝貢禮云制丈八尺周禮辨師綖冕上覆玄表纁裏韋昭少牢禮注祭服玄衣纁裳士冠禮注曰凡染黑五入為緅七入為緇玄則六入與玄纁蓋二色也爾雅三染謂之纁詩正義曰考工記鍾氏則染纁術也説文璣珠不圓者字書璣小珠也伊尹四方獻令曰正南甌鄧桂國以珠璣玳瑁為獻郭璞江賦赬蟞胏躍而吐璣周禮斿貢注羽毛璣組之屬組綬類也詩采蘋注組線也周禮典絲凡祭祀供黼畫組就之事天子諸侯以組為冕旒之就曰組就詩素絲組之鄭箋曰以素絲縷縫組於旌旗以為之飾左傳尉之以玄纁加組帶焉則組不但為綬也故曰綬類九江納錫大龜史記作入賜大龜蔡傳曰大龜尺有二寸所謂國之守龜非可常得故不為常貢若偶得之則使之納錫于上謂之納錫者下與上之辭重其事也箋按大禹謨帝曰禹官占惟先蔽志昆命于元龜是古者大事則卜以龜為寶也魯頌元龜象齒毛傳龜尺二寸孔氏書傳曰大龜出于九江水中正義曰龜不常用賜命乃納之山海經曰岷山江水出焉東北流注于海其中多良龜史記龜策傳神龜出于江水中廬江郡常歲時生龜長尺二寸者二十枚輸太卜官羅泌路史曰蘄春江中有蔡山在廣濟縣大龜納錫故曰蔡按蘄水蓋尋陽舊治也九江在尋陽可知周書諡法解錫與也故與錫謂之納錫浮于江沱潛漢潛漢作灊史記作涔于漢蔡傳曰江沱潛漢其水道之出入不可詳而大勢則自江沱而入潛漢也箋按正義曰浮此四水乃得至洛四水者沱自枝江縣出江而又入江潛自鍾祥縣出漢而又入漢潛入于沔沔入于江江出為沱江沱潛漢往復徑通矣逾于洛至于南河蔡傳曰逾越也漢與洛不通故舍舟而陸以達于洛自洛而至于南河也箋按孔傳曰河在冀州南東流故越洛而後至南河蓋荆州貢道從襄陽北渡漢江登陸至南陽城南浮洛故曰逾于洛也自洛至鞏縣入河謂之南河者豫在冀南荆又在豫南也蔡傳曰程氏曰不徑浮江漢兼用沱潛者隨其貢物所出之便或由經流或循枝派期便事而已箋按江漢合流于荆本自相通是經流也由沱入江由潛入漢是枝派也禹貢會箋卷六
