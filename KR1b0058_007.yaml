front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1b0058_WYG_007-1a, image: WYG0068/WYG0068-0326a.png}
body:
  text: 禹貢會箋卷七翰林院檢討徐文靖撰荆河惟豫州蔡傳曰西南至南條荆山北距大河箋按孔傳西南至荆山蔡傳以為南條荆山也山在今襄陽府南漳縣西北河至華隂折而東流豫州在大河之南故曰北距大河也金史地理志豫州南陽縣有豫山或豫州取名以此伊洛瀍澗既入于河蔡傳曰山海經曰熊耳之山伊水出焉東北至洛陽縣南北入于洛郭璞曰熊耳在上洛縣南今商州上洛縣也箋按中山經蔓渠之山伊水出焉而東流注于洛郭璞曰今伊水出上洛盧氏縣熊耳山東北至河南洛陽縣入洛中次山經熊耳之山浮豪之水出焉而西流注于洛郭曰今在上洛縣南則是經言伊出蔓渠郭言出熊耳非經言也蔡傳曰地志言伊水出𢎞農盧氏之熊耳非是箋按晉志盧氏本屬上洛故景純曰伊水出上洛盧氏熊耳漢志上洛盧氏並屬𢎞農故後漢郡國志京兆上雒侯國故屬𢎞農熊耳以一山綿亘二縣傳謂非盧氏熊耳何也伊水出陸渾山亦誤據唐志陸渾山一名方山在伊闕水經注兩山相對望之若闕今謂之龍門易緯乾鑿度曰禹鑿龍門闢伊闕即此非伊水出陸渾也一統志云伊水出盧氏縣悶頓嶺流經嵩縣漢陸渾縣也洛陽偃師縣界入於洛蔡傳曰洛水地志出𢎞農郡上洛縣冢領山水經謂之歡舉山今商州洛南縣冢領山也至鞏縣入河箋按山海經歡舉之山洛水出焉水經因之一統志洛水出陜西洛南縣今縣屬華州冢領山東流經盧氏永寧宜陽洛陽偃師鞏縣入河蔡傳曰瀍水地志出河南郡穀城縣替亭山今河南府河南縣西北有古穀城縣其北山實瀍水所出也至偃師縣入洛箋按山海經平逢之山南望伊洛東望穀城之山一統志穀城山在河南府西北五十里連孟津界舊名替亭山瀍水出此水經注瀍水出替亭北梓澤中梓澤地名也入洛在偃師縣東唐志河南有瀍水避武宗諱名曰吉水蔡傳曰澗水地志出𢎞農郡新安縣東南入於洛今澠池縣東二十三里新安城是也城東北有白石山即澗水所出酈道元云世謂之廣陽山然則澗水出今之澠池至新安入洛也箋按尚書洛誥周公曰我乃卜澗水西瀍水東惟洛食即是水也水經注曰安國云澗水出澠池山今新安縣西北有一水北出澠池界東南流徑新安縣而東流入于穀水安國所言當斯水也然穀水出澠池下合澗水得其通稱或亦指之為澗水也山海經白石之山澗水出於其隂西北流注於穀其非為入洛可知一統志白石山在澠池縣東北二十三里蔡傳曰伊瀍澗水入於洛而洛水入於河此言伊洛瀍澗入於河四水不相合而各入河者蓋四水並流小大相敵故也箋按埤傳曰鄒季友云伊水在洛南之東瀍澗在洛南之西洛為大伊次之瀍澗水小經言伊洛瀍澗蓋自東南而西北非小大相敵之謂滎波既豬史記作滎播蔡傳曰滎波二水名孔氏以滎波為一水者非也箋按水經注晉地道記曰濟自大伾入河與河水鬬南泆為滎尚書曰滎波既豬闞駰曰滎波嶓澤名也嶓音波故吕忱云嶓水在滎陽謂是水也又按濟自敖山北溢而為滎注而後泄遂為汴水蔡傳曰酈道元曰禹塞淫水於滎陽下引河東南以通淮泗濟為河所淫故曰淫水濟水分河東南流漢明帝使王景即滎水故瀆東注浚儀謂之浚儀渠漢志謂滎陽縣有狼蕩渠首受濟者是也南曰狼蕩北曰浚儀其實一也箋按水經濟水又東徑敖山北又東合滎澤注曰澤水受河水有石門謂之滎口石門也而地形殊卑蓋故滎播所道自此始也曾南豐曰昔禹於滎澤下分大河為隂溝出之淮泗至浚儀西北復分二渠其後或曰鴻溝始皇疏之以灌魏郡者是也或曰浪宕渠自滎陽五池口注鴻溝者是也或曰浚儀渠漢明帝循河流故瀆作渠永平中謁者王吳所作渠成注浚儀者是也或曰石門渠靈帝時建寧四年於敖城西北纍石為門以遏渠口者是也將作謁者王吳修汴渠見明帝紀云景誤蔡傳曰波水周職方豫州其川滎雒其浸波溠爾雅云水自洛水為波山海經婁涿之山波水出於其隂波水本作陂北流注於穀二說不同未知孰是箋按水經洛水出上洛縣歡舉山又東門水出焉注曰爾雅所謂洛别為波也又曰洛水自上洛縣東北至拒城之西北分為二水枝渠東北出為門水也門水又東北歷陽華之山山海經曰陽華之山門水出焉而東北流至於河七百九十里入洛水鄭樵通志門水在靈寶縣西南北流為𢎞農澗即禹貢之波水矣至婁涿之波經本作陂郭注曰世謂之百答水金史志河南新安縣有陂水字亦作陂非自洛出之波也周職方浸波溠波水出魯山縣歇馬嶺流入汝水亦非禹貢洛出之波也正義曰洪水之時此澤水大動成波浪既豬言壅遏而為豬蓄水而成澤不濫溢也導菏澤蔡傳曰菏澤地志在濟隂定陶縣東今興仁府濟隂縣南三里其地有菏山故名其澤為菏澤也蓋濟水所經箋按括地志菏澤在曹州濟隂縣東北九十里定陶城東水經注菏水上承濟水於濟陽縣東世謂之五丈溝又曰菏水即泲水之所苞注以成湖澤也而東與泗水合於湖陵縣西六十里穀庭城下俗謂之黃水口黃水西北通巨野澤宋河渠志云導菏水自開封歷陳留曹濟鄆其廣五丈乾德三年京師引五丈河造西水磑即此也被孟豬左傳爾雅作孟諸周禮作望諸史記作明都漢書盟諸蔡傳曰被及也孟豬爾雅作孟諸地志在梁國睢陽東北今南京虞城縣西北孟諸澤是也箋按孟豬職方作望諸左傳作孟諸今在歸德府虞城縣西北十里水經注孟豬在睢陽縣之東北孔氏曰宋都睢陽在明豬西南是也闞駰曰不言入而言被者明不常入也水盛方乃覆被矣金仁山曰自菏澤至孟豬凡百四十里厥土惟壤下土墳壚蔡傳曰土不言色者其色雜也壚疏也箋按周官大司徒辨十有二壤之物注曰壤穀土也豫州土宜五穀職方氏曰豫州其穀宜五種以土壤皆可種穀故但言壤不言色非以色雜之謂也又周官草人職曰墳壤用麋勃壤用狐埴壤用豕壤不一而於壤之中别以墳壚者謂下土也下土者水澤之土猶下地也周官稻人掌稼下土作田凡稼澤是也吕氏春秋曰凡耕之道必始於壚謂其寡澤而後枯厥田惟中上厥賦錯上中孔傳曰田第四賦第二又雜出第一箋按吳氏曰冀賦第一或時數少於豫則降為第二而升豫為上上也豫賦第二或時數多於冀則升為第一而降冀為上中也是則錯出之義也厥貢漆枲絺紵蔡傳曰周官載師漆林之征二十而五周以為征而此乃貢者蓋豫州在周為畿內故載師掌其征而不制貢禹時豫在畿外故有貢也箋按貨殖傳陳夏千畝漆陳謂陳國夏謂陽夏正禹貢豫州之地故豫有漆貢非冀比也蔡傳曰顔師古曰織紵以為布及練然經但言貢枲與紵成布與未成布不可詳也箋按太宰九職嬪婦化治絲枲注曰化因形移易也則枲非布可知詩可以漚紵注曰紵麻屬則紵非布可知襄公二十九年傳子産獻紵衣乃以紵為衣也周禮葛人職以時徵絺綌之材於山農墨子曰古者聖王夏服絺綌故貢絺也又為布及練傅氏集解引顔注作綀說文綀布屬厥篚纖纊史記作其篚纖絮蔡傳曰纊細綿也箋按小爾雅纊綿也絮之細者曰纊徐州之纎縞鄭康成曰纎細也豫州之纎纊孔傳曰細綿也蔡氏徐州傳曰纎縞皆繒也至是乃以纎纊為細綿則仍以纎為細矣錫貢磬錯蔡傳曰磬錯治磬之錯也箋按周官太宰九貢有器貢鄭注器貢銀鐵石磬丹漆也考工記曰磬氏為磬倨句一矩有半其博為一股為二鼓為三假令磬鼓廣四寸半者股長九寸鼓廣三寸長尺三寸半厚一寸太厚則聲石而摩其旁太薄則聲播而摩其端故必有錯以治之小雅他山之石可以為錯集傳曰錯礪石也孔疏曰治玉石曰錯以不常用故必錫命而後貢也浮于洛達于河浮於洛史漢作雒蔡傳曰豫州去帝都最近豫之東境徑自入河豫之西境則浮於洛而後至河也箋按山海經曰洛水成臯西入河水經洛水東北過鞏縣東又北入於河是洛水東西皆可入河由洛陽城南經偃師宜陽永寧至鞏縣東以達河此豫之西境浮洛而後至河者也魚豢典略云漢火行忌水故洛去水而加佳然周書有作雒篇周禮其川滎雒皆作雒大河自潼關流入閿鄉達靈寶陜州澠池新安洛陽孟津鞏縣此豫之東境徑自入河不事浮洛者也然浮洛達河而後豫州之貢道始全禹貢㑹箋卷七
