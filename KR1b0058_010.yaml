body:
  text: 禹貢會箋卷十翰林院檢討徐文靖撰禹貢下導岍及岐至于荆山岍史漢作汧蔡傳曰岍山地志扶風汧縣西吳山古文以為汧山今隴州吳山縣吳嶽山也箋按郡國志扶風汧縣有吳嶽山本名汧汧水出郭璞曰别名吳山周禮所謂嶽山者周職方雍州其山鎭曰嶽山注吳嶽也前漢食貨志嶽山岐山吳山師古曰吳岳非一山之名今隴州有岍山汧水出其西而東入渭又有吳岳不得以岍即吳山也水經汧水出汧縣弦蒲谷鄉弦中谷為弦蒲藪水有二源一水出縣西山世謂之小隴山一水𤼵南山西側俗以此為吳山則是非一山也蔡傳荆岐見雍州箋按孔氏曰荆在岐東非荆州之荆也地理志扶風美陽縣禹貢岐山在西北中水鄉馮翊懷徳縣禹貢北條荆山在南元和志荆山在富平縣西南二十里逾于河蔡傳曰逾者禹自荆山而過于河也孔氏以為荆山之脈逾河而為壺口雷首者非是箋按括地志荆山在雍州富平縣其山東距河二百餘里何相去二百餘里而豫書之曰禹于此逾于河也且逾河必書八年于外可勝書哉史記天官書中國山川東北流其維首在隴蜀考工記曰凡天下之地勢兩山之間必有川焉凡溝逆地阞謂之不行鄭氏曰地阞地脈也管子曰水者地之血氣筋脈之流通者吕氏春秋曰禹周行㝢内脈地理名金石蘇氏曰地之有山猶人之有脈有近而不相屬者有逺而相連者雖江河不能絶也孔氏地脈之説正未可廢也壺口雷首至于太岳雷首即首陽山蔡傳曰壺口太岳見冀州雷首地志在河東郡蒲坂縣南今河中府河東縣也箋按隋圖經曰平山在平陽一名壺口山今名姑射山考平山在平陽府城西南二十五里姑射山在府西五十里非一山也太岳即霍山今在平陽府霍州上有一峯名太岳雷首水經注曰山臨大河去蒲坂三十里俗亦謂之堯山竹書帝堯五十年遊于首山即是山也其陽有雷水出焉故曰雷首厎柱析城至于王屋厎柱史記作砥柱蔡傳曰厎柱析城王屋皆冀州山厎柱石在大河中流其形如柱今陜州陜縣三門山是也箋按水經注厎柱在大陽縣東山有三門故亦謂之三門山南曰鬼門中曰神門北曰人門禹所鑿以通河也自厎柱以下五户已上五户灘名也其間一百二十里合有一十九灘水流迅急勢同三峽蔡傳曰析城地志在河東郡濩澤縣西今澤州陽城縣也晁氏曰山峯四面如城箋按括地志析城山在濩澤縣西南七十里山有二水東西流故名析城也析城在王屋北下有神池其深莫測世傳與濟瀆相通蔡傳曰王屋地志在河東郡垣縣東北今絳州垣曲縣也晁氏曰山狀如屋箋按山海經王屋之山㶌水出焉即沇水也古今地名云王屋山方七百里本冀州之河陽山元和志山在王屋縣北五里週一百三十里髙三十里孔傳曰三山在冀州之南河之北太行恒山至于碣石入于海蔡傳曰太行恒山皆冀州山太行地志在河内郡山陽縣西北今懷州河内也箋按河圖括地志象太行天下之脊管子曰其山北臨代南俯趙東接河海之間山海經太行之山其首曰歸山列子作太形山郭緣生述征記太行首始河内自河内至幽州凡有八陘蔡傳以覃懐屬冀故以懐州河内之山為冀州山也蔡傳曰恒山地志在常山郡上曲陽西北今定州曲陽縣也箋按隋地志恒陽縣有恒山本漢曲陽縣隋改恒陽恒山在縣北百四十里恒水所出孔安國曰此二山連延東北接碣石而入于滄海一統志碣石山在今永平府昌黎縣西北離海三十里蔡傳曰王鄭有三條四列之名皆為未當今據導字分之以為南北二條而江河以為之紀於二之中又分為二焉箋按馬融以岍為北條西傾為中條嶓冢為南條班史地志有南條荆山北條荆山張昶華嶽碑序布五方則處其西列三條則居其中三條之説自古有之非王肅始也鄭𤣥以岍為隂列西傾次隂列嶓冢次陽列岷山正陽列蓋岍岐之列河濟所經西傾之列伊淮渭所經皆在北條為隂嶓冢之列漢水所經岷山之列江水所經皆在南條為陽日記曰蔡傳本導字分之為南北二條本唐天文志天下山河之象存乎兩戒按唐志云北戒自三危積石負終南地絡之隂南戒自岷山嶓冢負地絡之陽是即陽列隂列之謂也史記朝鮮之拔星茀于河戒韓楊天文要集曰兩戒間為天闗門荆州占作界音義同也西傾朱圉鳥鼠至于太華圉一作圄蔡傳曰雍州山也西傾見梁州朱圉地志在天水郡冀縣南今秦州大潭縣也俗呼為白巖山箋按括地志西傾今嵹臺山沙州記曰洮水出郡國志漢陽郡冀縣有朱圉山史記秦穆公伐冀戎即此蔡傳謂雍州山而西傾見梁州者徐士彰曰西傾在雍之西南近西夷之地是西傾之南際梁州也水經注午谷氷南入渭水南有長塹谷水次東有安蒲溪水次東有衣谷水並南出朱圉山山在梧中聚開山圖曰朱圉山謂之天鼓山今伏羌縣西南有朱圉山又有石鼓山殆非一山蔡傳以冀縣即大潭縣按大潭故城在今西和縣之西南三百里本漢隴西西縣地不得為天水之冀縣也蔡傳曰鳥鼠見雍州太華地志在京兆華隂縣南今華州華隂縣二十里也箋按地説曰鳥鼠山同穴之枝幹也鄭氏曰鳥鼠之山有鳥焉與鼠飛行而處之又止於同穴之山焉以導渭言鳥鼠同穴導山但言鳥鼠分為二山其實只一山而但言鳥鼠者省文也史記封禪書西岳華山正義曰山在華隂縣南八里古文以為敦物据漢志垂山本敦物正義誤垂為華水經注曰華山古文之敦物則誤已始於道元矣唐天文志曰河源自北紀之首循雍州北徼達華隂而與地絡相會江源自南紀之首循梁州南徼達華陽而與地絡相㑹皆謂此山也熊耳外方桐柏至于陪尾陪尾史記作負尾从力从貝音陪今皆讀為負尾誤蔡傳曰豫州山也熊耳在商州上洛縣詳見豫州箋按一統志熊耳山在西安府商縣西五十里伊水所出亦雍州山蔡以為豫州熊耳則在今河南陜州盧氏縣也熊耳一山界兩省綿亘二百餘里首尾界雍豫二境以商州之熊耳為豫州非矣蔡傳以陪尾即安陸之横尾在今徳安府安陸城東亦荆州境以為豫州亦非矣蔡傳曰外方地志潁川郡崈髙縣有崈髙山古文以為外方在今西京登封縣也箋按詩陳風譜云其封域在禹貢豫州之東西望外方檜羔裘傳去其封域在古豫州外方之北滎波之南孔氏曰案地理志外方即崈髙山也後世以外方髙大謂之嵩髙升為中嶽詩大雅崧髙維嶽爾雅嵩髙為中嶽郭璞曰太室山也中嶽名始見此堯典咨四岳尚書大傳舜巡狩四岳元祀岱泰山中祀大交霍山秋祀柳穀華山冬祀幽都𢎞山昭四年左傳司馬侯謂晉侯曰四嶽三塗陽城太室荆山中南九州之險也言四嶽而太室不與無所謂中嶽也然則禹貢時以嵩髙為外方無可疑也金氏曰舊以嵩髙為外方非是嵩髙世名中嶽安得與江夏内方相為内外據唐志陸渾山一名方山云在伊闕今案水經注焦澗水西出鹿髆山東流逕孤山南其山介立豐上單秀孤峙世謂之方山東歴伏睹嶺南東流注于伊伊水又東北涓水注之水出陸渾西山即陸渾都也然則是孤山一名方山非陸渾也蔡傳曰桐柏地志在南陽郡平氏縣東南今唐州桐柏也箋按水經注灃水源出桐柏山與淮同源而别流西注故亦謂水為泒水山海經淮出餘山在朝陽東義鄉西元和志云唐州桐柏縣本漢平氏縣東界梁置義鄉縣蓋本山海經以立名也蔡傳曰陪尾地志江夏郡安陸縣東北有横尾山古文以為陪尾今安州安陸也箋按陪尾有三水經洛水注曰地記云洛水東北過五零陪尾北與澗瀍合此陪尾蓋水名也唐志武徳三年以宻縣置宻州并置零水縣是五零在宻也一在今徳安府城東北六十里俗謂之横尾溳水所出傳謂安陸縣東北山也一在今兖州府泗水縣東十五里泗水所出唐志泗水縣有陪尾山泗水出焉禹貢導淮自桐柏東㑹于泗沂則當是泗州之陪尾也陪尾史記索隱謂即地志之横尾蔡傳據之而誤導嶓冢至于荆山蔡傳曰嶓冢即梁之嶓也山形如冢故謂之嶓冢箋按唐六典山南道名山曰嶓冢嶓冢縣故城在今漢中府沔縣西南四十里西南接寧羌州界州北九十里有嶓冢山正義曰後魏地形志華陽郡嶓冢縣有嶓冢山漢水出焉經言嶓冢既藝在梁州故傳曰即梁州之嶓也嶓冢縣故城在今漢中府沔縣西南故傳曰始出為漾東南流為沔蔡傳曰荆山南條荆山在南郡臨沮縣北今襄陽府南漳縣也箋按山海經荆山漳水出焉而東南流注于睢郭注曰地理志南條荆山在臨沮縣之東北漳水所出東至江陵入楊水非也今漳水於當陽縣之東一百餘里而右會沮水括地志沮水即漢水也孫叔敖激沮水為雲夢澤即此也按臨沮荆山即卞和抱璞處也内方至于大别蔡傳曰内方地志章山古文以為内方山在江夏郡竟陵縣東北今荆門軍長林縣也箋按郡國志江夏竟陵有立章山本内方山劉昭引荆州記曰山髙三十丈周迴百餘里然漢竟陵縣即今沔陽州景陵縣也疑義曰景陵原無此山据水經沔水自荆城東南流逕當陽縣之章山東注曰禹貢所謂内方至于大别者也唐志江陵府有長林縣武徳四年于東境置基州并置章山縣蓋以此也一統志内方山在荆門州南一百八十里漢江之上蔡傳曰左傳吳與楚戰濟漢而陳自小别至于大别蓋近漢之山今漢陽軍漢陽縣北大别山是也水經云在安豐者非是箋按地理志六安國安豐縣禹貢大别山在西南杜預解春秋云大别闕不知何處或曰大别在安豐西南左傳吳既與楚夾漢自小别至于大别然則二别近漢之名無緣得在安豐也海内東經大江出岷山郭璞注曰今江出岷山郡東南經江夏安豐至廬江南界是又以大别在安豐而誤也今大别在漢陽府城東北百步西有小别山又名甑山元和志大别山一名魯山水經江水東逕魯山南注曰右翼際山也地説曰漢與江合于衡北翼際山傍者也山左即沔水口矣南史齊張沖傳東昏勅房僧寄守魯山沖結盟分部拒守援魯山岸立城壘即大别山也岷山之陽至于衡山岷史記作汶漢書作㟭蔡傳曰岷山見梁州衡山南嶽也地志在長沙國湘南縣今潭州衡山縣也箋按四川志岷山在茂州之列鵞村一名鴻濛為隴山之南首江水所出也唐地志曰岷山直上六十里日記曰岷山一帶南出為大渡之源又包青衣以東馬湖江黔江諸源東出一支為衡山張揖廣雅曰衡山南岳有岣嶁峯上有神禹碑王制曰自江至于衡山千里而遙孔傳衡山江所經其誤甚矣過九江至于敷淺原蔡傳曰九江見荆州箋按禹貢九江秦因之立九江郡漢改豫章尋陽縣屬焉郡國志尋陽縣南有九江是也縣本在江北晉以江北之尋陽并柴桑而立郡温嶠又徙治江南故江南得有尋陽之名至梁又改為江州以尋陽本九江之舊地故也蔡傳曰敷淺原地志豫章郡歴陵縣南有傅陽山古文以為敷淺原今江州徳安縣博陽山也晁氏以為在鄱陽非是箋按孔傳曰敷淺原一名博陽山在揚州豫章界杜佑通典曰蒲塘驛漢歴陵縣有敷淺原今縣南三十里有陽居山舊經依班固以敷淺名博陽山黄子鴻曰漢志豫章郡領歴陵縣晉志歴陵縣與餘汗鄡陽俱割屬鄱陽郡而柴桑則屬武昌郡不應歴陵出柴桑之西也因謂晁氏在鄱陽者為是且云吳志有石印山即今饒州府之鄱陽山亦歴陵在鄱陽之證也一統志以崇陽縣西雲溪山為敷淺原非是蔡傳曰晁氏以鄱陽有博陽山又有歴陵山為應地志歴陵縣之名然鄱陽漢舊縣地不應又為歴陵縣山名偶同未足據也江州徳安雖為近之然所謂敷淺原者其山甚小而卑亦未見其為在所表見者惟廬阜在大江彭蠡之交最髙且大宜所當紀志者而皆無考據恐山川之名古今或異而傳者未必得其眞也箋按郡國志鄱陽有鄱水歴陵有傅陽山二縣並屬豫章則歴陵山之在豫章者即漢以歴陵名縣者也後以鄱陽屬饒州歴陵屬江州始覺分耳又爾雅髙平曰原惟其甚小而卑故以敷淺原目之水經敷淺原地在豫章歴陵縣西言地不言山者即敷陽山之原也原又在廬山西南故孫放廬山賦曰尋陽郡南有廬山九江之鎭也臨彭蠡之澤接平敞之原原蓋即敷淺矣若廬山甚髙且大山圖曰四方周四百餘里疊鄣之巖萬仭其與廣平曰原者詎有當乎程氏日記曰廬山雖髙而其中原田連亘人民奠居故有敷淺原之名後世匡谷結廬居之遂名廬阜水經注曰山海創志大禹海内東經曰廬江出三天子都入江彭澤西是則廬江之名明不自匡俗始日記作匡谷豫章志及道逺廬山記皆作匡俗正是好事君子强引此類耳然則夏禹時已有廬江自應有廬山之名何禹貢别名敷淺原也蔡傳曰過經過也與導汧逾于河之義同孔氏以為衡山之脈連延而為敷淺原者非是蓋岷山之脈其北一支為衡山而盡于洞庭之西其南一支度桂嶺北經袁筠之地至徳安所謂敷淺原者二支之間湘水間斷衡山在湘水西南敷淺原在湘水東北其非衡山之脈連延過九江而為敷淺原者明甚箋按朱子曰岷山夾江兩岸而行其東出一支為衡山蓋岷山在西蜀故也蔡傳以為北誤矣又按水經注湘水又北逕衡山縣東山在西南丹水湧其左醴泉流其右衡山東南二面臨映湘川又南岳記及荆州記云衡山周旋數百里東南臨映湘川據此則衡山東南二面並臨湘川是衡山在湘水西北矣酈注山在西南者乃謂衡山縣之西南耳傳以衡山在湘水西南誤矣且所謂南北二支又何嘗非地脈之説也禹貢會箋卷十
