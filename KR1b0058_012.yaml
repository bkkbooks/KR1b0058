body:
  text: 禹貢㑹箋卷十二翰林院檢討徐文靖撰九州攸同林氏曰九州辨之悉矣至此又言其所以同序言别此言同先别而後同也箋按孝經援神契曰計較九州之别土壤山林之大川澤所注萊沛所生鳥獸所聚凡九百一十萬八千二十四頃磽埆不墾者千五百萬三千頃帝王世紀曰其時九州之地民口千三百五十五萬三千九百二十三人同軌同文同倫之盛具見于此矣太史公匈奴傳讚堯雖賢興事業不成得禹而九州寧何承天地讚九州攸同時惟禹跡爰及後代疆分里析貢則屢遷名猶不易四隩既宅史記隩作奥宅作居蔡傳曰隩隈也李氏曰涯内近水為隩四海之隩水涯之地已可奠居箋按堯典宅嵎夷宅南交宅西宅朔方以命官言禹貢四隩既宅以萬姓言也國語曰禹宅居九隩合通四海湯作江誥曰古禹臯陶久勞於外民乃安東為江北為河南為淮西為濟四瀆已侯四瀆視諸侯故云萬民乃居是也九山刋旅史記刊作栞蔡𫝊曰九州名山已槎木道通而旅祭也箋按山海經禹曰天下名山經五千三百七十山六萬四千五十六里居地也言其五臧臧與藏同東西南北中為五臧漢志曰山海天地之藏蓋其餘小山甚衆不足記云天地之東西二萬八千里南北二萬六千里出水之山者八千里受水者八千里此天地之所分壤樹榖也禹貢九山當合九州之山而言之史記索隱以為汧壺口厎柱太行西傾熊耳嶓冢内方岐是九山也不應於導山之後又複言之况禹貢導山自岍至於敷淺原凡二十有七何獨有取於九山雍州荆岐既旅同一旅也又何取岐而舍荆周禮典瑞職云兩圭有邸以祀地旅四望是九山為九州之望山至此而旅祭也九川滌源蔡𫝊曰九州之川已滌除無壅塞也箋按益稷篇禹曰予决九川距四海管子曰水出於地溝流於大水及於海者命曰川水也水經曰禹貢山水澤地所在凡六十上官氏曰天下山水見於禹貢者四十有五不應於導水之後専於九水複言之當以九州之大水為九川也周禮川衡掌大川中川小川注曰川流水也禹貢曰九川滌源孔𫝊曰九州之川滌除泉源無壅塞矣史記索隱専指所導之九水非也九澤既陂孔𫝊曰九州之澤皆已陂障無决溢也箋按周職方揚州具區荆州雲夢豫州圃田青州望者者古諸字兖州大野雍州弦蒲幽州貕養今山東萊陽縣有貕養津冀州楊紆并州昭餘祁是為九澤陂障也詩彼澤之陂毛𫝊曰澤陂障也吕氏春秋曰禹乃决流疏河為彭蠡之障則九澤亦指九州之澤周禮有澤虞掌大澤中澤小澤注曰澤水所鍾也禹貢曰九澤既陂是也漢溝洫志曰禹時九川既疏九澤既陂諸夏乂安功施乎三代蓋謂此也四海會同蔡𫝊曰㑹同與灉沮㑹同同義箋按河圖括地象曰夏禹所治四海内地東西二萬八千里南北二萬六千里益稷篇外薄四海咸建五長古皆以東夷西戎南蠻北狄謂之四海四海㑹同即周書所謂四方民大和㑹者也漢徐州刺史荀文若問鄭𤣥周禮父之讐辟之海外謂以海水為四海辨之据禹貢四海並多以水言如黒水入於南海東漸於海皆海水也其言㑹同者如導江東為北江入於海東為中江入於海導河同為逆河入於海導淮東㑹泗沂入於海皆海水也何用取辟之海外以致辨也又如呉都賦百川沠别歸海而㑹亦是義矣若灉沮㑹同雖大小逺近不一而㑹同則一也六府孔修蔡禹謨傳曰水火金木土穀惟修者水克火火克金金克木木克土而生五穀或相制以洩其過或相助以補其不及而六者無不修矣箋按六府者春為生物之府盛徳在木夏為長物之府盛徳在火秋為成物之府盛徳在金冬為藏物之府盛徳在水土旺夏季而居中為鎭物之府穀以稼穡作甘為養物之府木仁火禮金義水智而土信五行之官各修厥職政在養民農殖嘉穀可不謂六府之孔修哉蔡傳以禹謨水火金木土穀以為相克於洪範水火木金土又以為相生吾未知其必然也庻土交正蔡傳曰土者財之自生謂之庶土則非特穀土也庶土有等當以肥瘠髙下名物交相正焉以任土事箋按庶土謂若冀土白壤兖土黑墳靑土白墳徐土赤埴墳揚荆土塗泥豫土惟壤下土墳壚梁土青黎雍土惟黄壤是也傳謂庶土有等當以肥瘠髙下名物交正者鄭注孝經曰分别五土别其髙下若髙田宜黍稷下土宜稻麥丘陵阪險宜種棗栗是也孔傳曰交俱也庶土俱得其正厎愼財賦史記作致愼蔡傳厎致也因庶土所出之財而致謹其財賦之入箋按周官太宰以九賦斂財賄注曰此九者取于任地與餘財非取于民者也太府掌九貢九賦之貳以受其貨賄之入凡官府都鄙之吏及職事受財用焉禹貢所謂財賦者殆猶是也厎愼者所斂之財無濫用也豈但致謹其入而已又周禮均人職云凶札則無財賦咸則三壤蔡傳曰則品節之也九州穀土又皆品節之為上中下三等箋按爾雅曰則常也注謂常法也周禮春官五命賜則鄭氏曰則地未成國之名王莽時以二十五成為則方五十里孔氏曰二十五成與夏殷五十里之國同名為則周書作雒篇解云受則土于周室是也壤穀土也于穀又定為上中下三等之法纂要曰上中下謂之三壤成賦中邦蔡傳曰土賦或及于四夷而田賦則止于中國而已故曰成賦中邦箋按四夷有貢而無賦謂土賦及四夷者非是上財賦則取于任地與餘財此則九州中賦取于民所謂冀賦上上錯兖賦貞青賦中上徐賦中中揚賦下上上錯荆賦上下豫賦錯上中梁賦下中三錯雍賦中下皆有成法以輸于帝都故曰成賦中邦也錫土姓蔡傳曰錫之土以立國錫之姓以立宗箋按隱八年左傳公問族于衆仲對曰天子建徳因生以賜姓胙之土而命之氏諸侯以字為氏因以為族唐書張説曰古未有姓自炎帝之姜黄帝之姬始因所生地而為之姓黄帝二十五子得姓者十四徳同者姓同徳異者姓殊其後或以官或以國或以王父之字始為賜族久乃為姓又按國語曰帝胙禹以天下賜姓曰姒氏曰有夏林氏曰水土平可以封建諸侯有土有姓昔固有矣至是徧錫之也黄氏曰舊有土者功髙則加錫已有姓非大功大徳不别賜金氏曰水土既平田制既定於是修封建之法各使守之錫土者賞其功勞定其限制也錫姓者表其勲徳輯其分族也祇台徳先不距朕行蔡傳曰台我距違也當此之時惟敬徳以先天下則天下自不能違越我之所行也箋按鄭氏曰其敬悦天子之徳既先又不距違我天子政教所行曰台曰朕皆謂舜也五帝本紀曰十二牧行而九州之民無敢辟違舜十二牧也今按祇敬也祇台徳先即周書無逸皇自敬徳之意言天子先自敬其徳則天下無敢違距禹之告舜曰安汝止惟幾惟康其弼直惟動丕應徯志盖天下大應我且有先意承志者誰敢不讓敢不敬應其尚有距違朕行者哉五百里甸服蔡傳曰甸服畿内之地也甸田服事也以皆田賦之事故謂之甸服五百里者王城之外四面皆五百里也箋按孔傳曰甸服去王城四面五百里大抵服以甸名者蓋皆為天子治田者也井田之制始自黄帝虞夏以來當未之或改其時八家同井則中為公田夏小正曰農及雪澤初服于公田畿内為天子治田故有公田亦曰甸服自是而後禹之甸法綿歴于殷周詩奕奕梁山維禹甸之襄王謂晉文公曰昔我先王之有天下也規方千里以為甸服祭公諫周穆王曰先王之制邦内甸服王制千里之内曰甸鄭氏曰服治田出穀税所行皆禹之甸法是也商易貢為助借民力以耕公田其實皆甸法也仲虺之誥所謂纘禹舊服也孟子所謂惟助有公田以勸滕文行助法故耳其實禹時已有公田也百里賦納總蔡傳曰禾本全曰總箋按孔傳曰甸服内之百里近王城者禾藁曰總入之供飼國馬据聘禮賓至于朝卿致館門外米芻皆二十車薪芻倍禾鄭氏曰禾藁並刈者也薪芻倍禾各四十車也由此推之則當時納總不止于供國馬也二百里納銍蔡傳曰刈禾曰銍半藁也箋按孔傳曰銍刈謂禾穗一詩臣工奄觀銍艾毛傳曰銍穫也三百里納秸服蔡傳曰半藁去皮曰秸謂之服者三百里内去王城為近非惟納總銍秸而又使之服輸將之事也獨於秸言之者總前二者而言也箋按史記索隱曰禮郊特牲云蒲越藁秸之美則秸是藁之類也秸言服者孔傳云服藁役孔疏云舉中以明上下朱子曰冀州三面距河其建都實取轉漕之利朝會之便故九州之中皆言達河以紀其帝都之道冀帝都亦曰入河者為北境絶逺者言之明海道亦可致也豈逺郊粟米不假船漕或行百里二百里徑使三百里之民代為轉輸而並無水路曲直之異同乎盖三百里言服者五百里皆為甸服而服役之事則自三百里止役不及于太逺也四百里粟五百里米蔡傳曰粟穀也内百里為最近故并禾本總賦之百里次之只刈禾半藁納也外百里又次之去藁麄皮納也外百里為逺去其穗而納穀外百里為尤逺去其穀而納米箋按周禮地官舂人掌凡米事倉人掌粟入之藏辨九穀之物以待邦用是粟與穀同與米别也金氏曰古人九數有粟米均輸二法蓋本諸此服役獨在三百里者蓋酌五百里之中為轉輸粟米之制也乃若四百里粟五百里米不言賦納蓋不逺納于帝都亦行百里或二百里而使三百里之民轉而輸之於都力若勞而賦則省又以見古者賦役不兩重五百里侯服蔡傳曰侯國之服甸服外四面又各五百里也箋按甸服外即為侯服甸為最近故伊訓侯甸羣后咸在是時猶沿夏制故特舉近者言之周職方王畿外五百里曰侯服侯服外乃為甸服與此異矣百里采蔡傳曰采者卿大夫邑地箋按馬融曰采事也各受王事者舜典亮采惠疇臯陶謨亮采有邦采皆訓事是也周官載師掌任土之法以家邑之田任稍地以小都之田任縣地注曰家邑之田謂大夫所食采邑三百里曰稍小都謂卿所食采邑四百里曰縣若依𫝊為卿大夫采地則采地在甸服五百里外矣不太逺乎周禮大行人職曰采服其貢服物則采服在五百里或以是耳周制男服之外為采服則去王畿二千五百里亦可謂采地乎二百里男邦三百里諸侯蔡傳曰先小國而後大國者大可以禦外侮小得以安内附也箋按周書洛誥曰侯甸男邦采衛言侯而不及伯酒誥曰越在外服侯甸男衞邦伯亦止言男而不及子作書者隨舉以成文也又帝都居中八方之地漸逺則漸廣諸侯受地倍于子男非地不足以容故諸侯建國逺在男邦之外非先小後大之謂至所謂三百里者第一之百里為采第二之百里為男邦是二百里也自三至五各得一百里以為諸侯是為百里者凡三總三百也吕氏曰言男則子在其間言侯則公伯在其間五百里綏服孔傳曰綏安也服王者政教箋按書有曰克綏厥猷惟后又撫綏萬邦天子之事也然地廣不可偏制民衆不能獨任故又以撫綏逺域之意寄之于列辟而甸服侯服之外是曰綏服三百里揆文教二百里奮武衛蔡傳曰文以治内武以治外箋按聘禮注曰四衛革路賈公彦曰革路以即戎以封四衛吕氏春秋曰堯戰于丹水之浦以服南蠻舜却苗民更易其俗禹攻曹魏屈驁以行其教皆揆文奮武事也揆文奮武皆所以安内治外不必分文為内武為外禹謨曰文命敷于四海又曰帝乃誕敷文徳舞干羽于兩階七旬有苗格文亦不止于治内可知周九服以衛服居中即禹貢綏服之奮武衛武成言邦甸侯衛康王之誥言侯甸男衛衛服之外聖人不强其來也綏之而已五百里要服蔡傳曰謂之要者取要約之義特羈縻之而已箋按國語曰蠻夷要服通典曰南蠻其在唐虞之時與之要質故曰要服周禮大行人職曰衛服外方五百里要服其制亦本於此皇侃孝經注曰春秋稱禹會諸侯執玉帛者萬國言禹要服之内地方七千里而置九州九州之中計有萬國也商頌殷武曰天命多辟設都于禹之績唐孔氏疏曰堯制五服服各五百里要服之内四千里曰九州其外荒服曰四海禹所弼五服之殘數亦毎服合五百里故有萬里之界焉又禹貢曰五百里甸服毎言五百里一服者是堯舊服每服之外又言三百里二百里者是禹所弼之殘數也堯之五服服五百里耳禹平水土之後每服更以五百里輔之是五服服别千里故一面而為差至于五千也若五服之廣猶是堯之舊制何弼成之有而稱述之以為功也凡言至于者皆從此到彼之辭明是自京師而至于四境為五千耳若其四面相距為五千則經文從何而往而言至于哉蔡傳以要為羈縻是乃唐宋以後之事也唐書蘇頲傳古稱荒服取荒忽之義非常奉職貢也故來則拒去則勿逐以禽獸畜之羈縻之而已此蔡傳之所本也虞夏之間恐未必然孔傳謂要束以文教也按所言七千里四千里有不同者言禹貢要服與周要服相當去王城三千五百里四面相距為七千里也要服之弼當周夷服去王城四千里也詳見臯陶謨注三百里夷二百里蔡蔡傳曰蔡放也左傳蔡蔡叔是也流放罪人于此箋按經曰夷孔傳曰夷守平常文教事王者而已蔡馬融曰蔡法也受王者刑法而已若如傳所云流放罪人聖王之世聲教四訖安得于五服之内四方各設一服流放罪人哉昭元年傳蔡蔡叔杜注蔡放也陸氏釋文上蔡字音素葛反説文作􅔁音同云􅔁散之也孔氏曰􅔁為散之義故訓為放也竊意上蔡字當讀如攃謂揮散之耳蓋置之于閒散之地也羅苹注路史曰流共工蔡蔡叔此五宅三宅之二亦見其必然也五百里荒服蔡傳曰以其荒野故謂之荒服箋按爾雅曰荒大也山海經大荒之中大荒之隅言荒而必曰大荒是也詩遂荒大東太王荒之荒皆訓大益稷篇禹曰惟荒度土功弼成五服至于五千州十有二師外薄四海咸建五長各迪有功則是時荒服君長皆上所建言光天之下至于海隅蒼生萬邦黎獻共惟帝臣其荒大廣逺為何如也荒服之命名自當以此馬融曰政教荒忽因其故俗而治之與蔡傳荒野之説恐非先王時建萬國親諸侯意也三百里蠻二百里流蔡傳曰流流放罪人之地蔡與流皆所以處罪人而罪有重輕故地有逺近之别也箋按舜典曰蠻夷率服吕氏春秋曰堯有丹水之戰以服南蠻于荒服三百里中命之曰蠻者所以志武功也又二百里曰流王制千里之外曰流鄭氏曰謂九州之外也夷狄流移或貢或不貢無常處也馬融曰蠻慢也禮簡怠慢來不距去不禁流流行無城郭常居未有以為流放罪人者商頌長𤼵曰洪水芒芒禹敷下土方外大國是疆周書立政曰其克詰爾戎兵以陟禹之迹方行天下至于海表罔有不服淮南子曰禹所治四海内地東西二萬八千里南北二萬六千里豈弼成五服東西南北相距五千里遂為窮荒蠻貊哉故知其制服之義必不然也又周禮大行人職侯服歲壹見其貢祀物甸服二歲壹見其貢嬪物男服三歲壹見其貢器服采服四歲壹見貢服物衛服五歲壹見其貢材物要服六嵗壹見其貢貨物九州之外謂之蕃國世壹見各以其所貴寳為贄也想禹時要服荒服亦必有所貢但王者不貴逺物雖各有土貢而不及致詳也蔡傳曰堯都冀州冀之北境并雲中涿易亦恐無二千五百里藉使有之亦皆沙漠不毛之地而東南財賦所出則反棄于要荒以地勢考之殊未可曉箋按舜分冀東北為幽并二州則冀北地廣可知堯典宅朔方禹時朔南暨則冀北地廣可知蔡傳疑冀北之地并雲中涿易亦恐無二千五百里者蓋冀北之地自石晉棄幽薊十六州以賂契丹不𨽻中土者六百餘年生平足跡所未至其疑冀北之地恐不及二千五百里者又何怪也東漸于海西被于流沙朔南暨蔡傳曰漸漬被覆暨及也地有逺近故言有淺深也箋按趙氏吳越春秋曰禹使大章步東西豎亥步南北山海經曰自東極至于西極五億十萬九千八百步又堯典光被蔡傳曰被及此因暨及而改曰被覆遂謂地有逺近故言有淺深非是蓋東境遼東地皆隔海若但言暨被則至海而止故曰東漸流沙在西極之表故曰西被朔南暨朔即朔方南即南交見堯典非東西言地朔南不言地之謂聲教訖于四海孔傳曰此言五服之外皆與王者聲教而朝見箋按畢命曰樹之風聲子思子曰聲名洋溢乎中國施及蠻貊孟子曰徳教溢乎四海即禹貢東漸西被朔南暨聲教意也漢唐注疏以朔南暨聲教句四海有二義漢魏以來凡言四海者皆以東夷西戎南蠻北狄為四海禹貢東漸西被朔南暨聲教訖于四海當主是言劉宋元嘉時何承天纂文專以四海為海水禹貢東為中江入于海東為北江入于海當主是言山海經有海内東經海内南經西經北經又有海外東經海外西經南經北經豈虚也哉禹錫𤣥圭告厥成功蔡傳曰錫與師錫之錫同水土既平禹以𤣥圭為贄而告成功于舜箋按竹書紀年帝堯八十六年司空入覲贄用𤣥圭山海經峚山是生𤣥玉宋書符瑞志水泉流通則𤣥圭出資治通鑑帝堯七十有二載命禹平水土八十載禹功告成禹本紀帝錫禹𤣥圭正義曰帝堯也皆以為堯時事傳言舜誤蓋禹功告成因以𤣥圭為贄錫與于堯即舜典修五玉三帛之義也禹貢會箋卷十二
