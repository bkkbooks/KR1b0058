front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1b0058_WYG_003-1a, image: WYG0068/WYG0068-0297a.png}
body:
  text: 禹貢㑹箋卷三翰林院檢討徐文靖撰海岱惟青州蔡𫝊曰青州之域東北至海西南距岱箋按蔡冀州𫝊中引程氏日記云冀之北境則遼東西右北平是矣於舜典𫝊中仍用孔氏分青州為營州之説至此易據海為至海仍無所歸一也据爾雅九州齊曰營州有營而無青并青於營也兩河間曰冀州燕曰幽州分幽於冀也安得以幽營皆冀地乎周禮幽州其川曰河泲而不及海河内曰冀州而不及海獨禹貢謂海岱惟青州安得謂青州直至海而不跨海乎且舜營州即遼東商改青州為營州則遼東屬青可知周時以青兼徐則青州地大故分青之遼東以屬幽孔𫝊曰東北據海西南距岱無可疑也歐陽忞輿地廣記載禹貢九州疆域以遼東營州屬冀與蔡𫝊以青東北至海皆非蔡𫝊曰岱泰山也今在襲慶府奉符縣西北三十里箋按山海經泰山泰水出於其陽漢官儀及泰山記曰盤道屈曲而上凡五十餘盤經小天門自下至古封禪處凡四十里郭璞注山海經曰泰山從下至頭四十八里二百步周禮正東曰青州其山鎮曰沂山河東曰兗州其山鎮曰岱山禹貢時青州地廣際周職方兗界也嵎夷既略五帝本紀嵎作郁蔡𫝊曰嵎夷薛氏曰今登州之地畧經畧為之封畛也即堯典之嵎夷箋按堯典宅嵎夷曰暘谷史記作郁夷郁音嵎水經注朐山東北有大洲謂之郁洲山海經曰郁山在海中者也史記索隱曰嵎夷今文尚書及帝命驗並作禺䥫䥫古夷字据異物志夷州土無銅䥫取磨礪青石以作弓矢有夷字又有䥫字䥫即鐵耳元和志萊州掖縣北有渤海則已入東萊郡界過碣石二百餘里元人又以鐵山為碣石于欽齊乗曰青州東北跨海跨小海也海限塞山有此一曲北自平州碣石南至登州沙門島是為渤海之口胡氏曰于氏所謂碣石葢即鐵山也鐵山南對沙門島北與旅順口相接正當渤海之口是古所謂嵎鐵者即此定四年𫝊曰封畛土略杜注曰畛塗所經也畧界也𫝊又曰天子經畧諸侯正封古之制也封畧之内無非君土是矣是既畧言正其經畧使無侵越也孔𫝊用功少曰畧嵎夷近海何有事於用功之多哉濰淄其道漢書作惟甾史作既道蔡𫝊曰濰水地志出瑯琊郡箕縣今密州莒縣東北濰山也北至都昌入海箋按地理志濰出琅邪箕屋山葢箕縣之屋山也水經注濰自箕縣北逕東武縣西北流合扶淇之水又北右合盧水即久台水也地志久台水出瑯邪横縣横山東南至東武入濰尚書所謂濰淄其道矣今屋山在莒州西北九十里濰水至膠州高密入海括地志云宻州莒縣山濰水所出是也蔡𫝊曰淄水地志出泰山郡萊蕪縣原山今淄州淄川縣東北七十里原山也東至博昌入濟又東北入海箋按水經注淄水入馬車瀆亂流漢志齊郡鉅定縣有馬車瀆東北逕琅槐故城南又東北至皮丘坑入於海蓋漢志但言淄水入濟蔡𫝊東北入海乃据酈注而補也今淄水出原山在泰安州萊蕪縣東二十里至青州壽光縣入濟與濟歴濵州蒲臺利津諸界入海葢淄至博昌入濟而東北至齊郡鉅定縣馬車瀆水以下又濟入海之處也淄水入海之道與濟同非謂濰乃入海淄但入濟也日記疑漢書本濟或誤非是厥土白墳集解曰平地之土色白而性墳箋按青土色白與冀畧同但青土白而墳起較冀土白而柔軟㣲有分也周官草人職墳壤用麋其性相似可知也海濱廣斥史記作廣瀉蔡𫝊曰海涯之地廣漠而斥鹵許慎曰東方謂之斥西方謂之鹵斥鹵鹹地可煮為鹽者也箋按爾雅十藪齊有海隅郭注曰海濵廣斥鄭氏曰斥謂地鹹鹵夏本紀海濵廣瀉厥曰斥鹵周禮草人職鹹潟用貆易緯乾鑿度坤有八色東鹹西淡是也史記相如𫝊除邊闗闗益斥張揖曰斥廣也齊世家齊自泰山屬之瑯琊北被於海膏壤三千里是青地廣漠而斥鹵也厥田惟上下厥賦中上孔𫝊曰田第三賦第四箋按周職方曰其榖宜稻麥厥貢鹽絺蔡𫝊曰鹽斥地所出箋按爾雅曰中有岱岳與其五榖魚鹽生焉周禮鹽人掌鹽之政令以共百事之鹽祭祀共其苦鹽散鹽賈疏曰散鹽煮水為之出於東海管子曰海王之國謹正鹽筴青州近海煮海為鹽是也若斥地雖醎猶可耕種草人土化之法鹹潟則用貆是也蔡𫝊曰絺細葛也箋按周書文𫝊解礫石不可榖植之葛木以為絺綌以為材用周禮掌葛有葛征以徴絺綌之材於山農書有曰逺邇畢獻方物惟服食器用若青州之貢鹽絺惟服食也或以絺為益稷篇絺繡之絺淮南齊俗訓有詭文繁繡据周禮司服職云王祭社稷五祀則希冕鄭注冕服九章皆希以為繡釋文曰希本作絺賈氏疏曰希繡者孔君以細葛上為繡鄭讀希為黹黹紩也謂刺繪為繡海物惟錯蔡𫝊曰錯雜也海物非一種故曰錯林氏曰既總謂之海物則固非一物矣錯葢别為一物如錫貢磬錯之錯理或然也箋按周官太宰掌九貢九曰物貢海物惟錯若職方正東青州其利魚蒲之𩔖是也何得以磬錯例之岱畎絲枲蔡傳曰畎谷也岱山之谷也枲麻也箋按周官太宰九貢有嬪貢鄭注嬪貢絲枲也其屬有典絲典枲孔傳曰畎谷也爾雅水注川曰谿注谿曰谷豈必岱山之谷始有是貢乎觀書益稷篇濬畎澮距川梓材若稽田為厥疆畎考工記匠人為溝洫一耦之伐深尺廣尺為之􅍒鄭注曰􅍒畎也班固西都賦農服先疇之畎畝趙過曰后稷始畎田畎亦何當専指畎谷也孔傳枲麻也周禮籩人職朝事之籩其實䵄蕡注曰蕡枲實儀禮有司徹䵄蕡坐設於豆西注曰蕡􅆈枲實也賈公彦曰案喪服傳云菹者麻之有蕡者也牡麻者枲麻也若然蕡麻有實枲麻無實鄭云蕡為枲實者舉其類耳其實枲是雄麻無實鉛松怪石蔡傳曰怪石怪異之石也林氏曰怪石之貢誠為可疑意其必須以為器用之飾非特貢其怪異之石以為玩好也箋按管子曰山上有緑石者下有鉛錫蘇頌曰鉛一名黑錫周禮丱人掌金玉錫石之地鄭注錫鈏也書疏曰錫所以柔金也考工記攻金之工掌執金錫之齊故也貢松者大司徒職曰制其畿疆設其社稷之壝而樹之各以其野之所宜木遂以名其社鄭注所宜木謂若松栢栗也若以松為社者則名松社之野是夏社宜松故貢松也孔傳曰怪石怪異好石似玉者山海經茍牀之山多怪石郭注怪石似玉書曰鉛松怪石也今萊州掖縣出五色石青州所貢殆此類歟萊夷作牧史作為牧蔡傳曰萊夷顔師古曰萊山之夷齊有萊侯萊人即今萊州之地作牧者言可牧放萊人以畜牧為生也箋按水經注萊蕪禹貢所謂萊夷也余按太蕪萊柞並山名也郡縣取目焉左傳辭以無山與之萊柞晉志東萊黄縣有萊山是也作牧既可耕作兼可畜牧也匪但放牧而已厥篚檿絲史記作酓絲蔡傳曰檿山桑也山桑之絲其韌中琴瑟之絃蘇氏曰惟東萊為有此絲以之為繒其堅韌異常萊人謂之山繭箋按爾雅檿山桑詩皇矣其檿其柘漢五行志檿弧注檿山桑之有㸃文者禹貢所謂檿也爾雅又有蟓桑繭殆所謂檿絲也蟓或謂蠶之别名王盤農書注魯桑之類宜飼大蠶荆桑宜飼小蠶禹貢檿絲則是以檿桑飼蠶而吐絲也山東志檿絲出棲霞縣正禹貢萊夷之故墟也朱子曰萊夷及揚之島夷間於厥篚或時貢土物以見來王之意後人誤㑹其㫖遂謂萊夷放牧之處有檿絲因以為貢夫九州惟梁雍有貢無篚他州皆有豈必出於夷也浮于汶達于濟史作通濟漢書作泲蔡傳曰汶水出泰山郡萊蕪縣原山西南入濟在今鄆州中都縣也箋按漢地志泰山萊蕪禹貢汶水出西南入泲桑欽所言又琅琊朱虚東泰山汶水所出東至安丘入維師古曰前言汶水出萊蕪入濟今此又言出朱虚入維將桑欽所説有異或者有二汶水乎曽氏曰出萊蕪縣原山入濟者徐州之汶也出朱虚縣泰山北又東北入濰者責州之汶也然禹貢浮汶達濟皆指青州則謂青州之汶入濰者濰乃入海何由達河至帝都乎馬之貞曰汶水東出原山西流過萊蕪奉髙汶陽之南剛城之北又西至龍山南分為四派其南河至陽城南梁山東匯為大澤其一過壽良北其一經郈亭南其北曰坎河同流至壽張安民亭與北濟合故青州貢道浮汶達濟禹貢㑹箋卷三
