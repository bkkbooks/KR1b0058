  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1b0058_WYG_004-1a, image: WYG0068/WYG0068-0302a.png}
body:
  text: 禹貢㑹箋卷四翰林院檢討徐文靖撰海岱及淮惟徐州周合其地于青州蔡傳曰徐州之域東至海南至淮北至岱而西不言濟者岱之陽濟東為徐岱之北濟東為青言濟不足以辨故畧之也箋按爾雅濟東曰徐州注云自濟東至海若言濟不足以辨此何以單言濟也故知言淮以别於青不事并言濟也葢海岱青徐所同淮海徐揚所同海岱及淮乃徐耳淮沂其乂乂史作治蔡傳曰淮見導水曾氏曰淮之源出於豫之境至揚徐之間始大其泛濫為患尤在於徐故淮之治於徐言之也沂水地志出泰山郡葢縣艾山今沂州沂水縣也南至於下邳西南而入於泗箋按金氏曰淮出今唐州桐栢山行千七百里至海州入海水經注曰鄭氏云沂出沂山或云臨樂山水有二源南源所導世謂之柞泉北水所𤼵俗謂之窮魚泉俱東南合成一川至下邳縣北西流分為二水一水於城北西南入泗一水逕城東屈從縣南亦注泗謂之小沂水左傳隱六年公㑹齊侯盟於艾杜注泰山牟縣東南有艾山沂水所出即是山也鄭氏曰沂出沂山今青州沂水縣山沂水出其西接臨朐縣界蔡傳曰曾氏云徐州水以沂名者非一酈道元謂水出尼丘山西北過魯之雩門亦謂之沂水出太公武陽之冠石山太公誤當是太山亦謂之沂水而沂水之大則出於泰山也箋按昭二十五年左傳平子請待於沂上杜氏曰魯城南自有沂水此小沂也地理志沂水出泰山葢縣臨樂子山南至下邳入泗過郡五行六百里此大沂水也郡國志琅邪臨沂縣有洛水注之水出太山南武陽之冠石山是出冠石者洛水非沂水也世以其注沂亦或謂之小沂水是徐州之水以沂名者非一也唐孔氏曰乂訓治也淮出桐栢山𤼵源逺矣於此州言之者淮水至此而大為害尤甚喜得其治故於此記之蔡傳曰徐之水有泗有汶有汴有漷而獨以淮沂言者徐之川莫大於淮淮乂則自泗而下凡為川者可知矣徐之浸莫大於沂沂乂則自沭而下凡為浸者可知矣箋按日記曰汴水出滎陽縣大周山合京索須鄭四水東南至中牟縣北入於黄河泗水出泗水縣陪尾山其水四源並𤼵循城北八里始合為一西流至曲阜經嵫陽城東五里與沂水合漷水在滕縣東北七十里出東海合鄉西南經魯國至高平湖陸縣入泗沭水源出沂山自莒州西北流入州境㑹諸澗水南經馬陵山入郯城縣注於淮泗徐士彰曰日記所録乃兗州之泉而非徐州之水其所謂泗則今泗水縣之泗而非泗州之泗也然地志謂東莞術水即沭水也至下邳入泗郭璞謂泗水至下相入淮水經謂漷水至湖陸縣入泗獲水出汴水至彭城縣北東入泗東莞今青州臨朐下邳今邳州下相今宿遷湖陸故城今徐州沛縣烏在盡為兗州之水而非徐州之水也蒙羽其藝蔡傳曰蒙山地志在泰山郡䝉隂縣西南今沂州費縣也羽山地志在東海郡祝其縣南今海州朐山縣也藝者言可種藝也箋按哀十七年公㑹齊侯盟於蒙杜預曰蒙在東莞蒙隂縣西今蒙山在蒙隂縣南四十里其陽為費縣隂為蒙隂縣也連山易曰有崇伯鯀伏於羽山之野寰宇記曰羽山俗呼懲父山漢志在祝其唐武德八年省祝其入懷仁金大定七年改懷仁縣為贛榆今屬淮安府海州其藝孔傳曰二山已可種藝正義曰詩云藝之荏菽故藝為種也大野既豬史記豬作都蔡傳曰大野澤名地志在山陽郡鉅野縣北今濟州鉅野縣也鉅即大也水蓄而復流者謂之豬箋按左傳哀十七年西狩於大野杜預曰鉅野縣東北大澤是也鉅野界徐之西兗之東南北三百里東西百餘里故周禮職方兗州澤藪曰大野王順渠曰南旺湖在汶上縣西南縈洄計百十餘里而㑹通漕河貫乎其中湖界為二西湖廣衍倍於東湖是南旺即古大野無疑一統志湖在汶上縣西南二十里蔡傳曰何承天曰鉅野廣大南導洙泗北連清濟徐之有濟於是乎見又鄆州中都西南亦有大野陂中都今東平州汶上縣或皆古大野之地也箋按春秋莊公十八年夏公追戎於濟西左傳僖三十一年分曹地東傅於濟則徐之有濟可知孔傳水所停曰豬馬云水所停止深者曰豬東原厎平蔡傳曰東原在徐之西北而謂之東者以在濟東故也東平國在景帝亦謂濟東國云益知大野東原所以志濟也箋按漢宣帝甘露二年為東平國景帝中六年濟東國也水經濟水故瀆又北右合洪水酈注曰上承鉅野薛訓渚厯澤西北渚又北逕闞鄉城西郡國志東平陸有闞亭又北濟瀆合自渚迄於北口一百二十里名曰洪水故張華博物志曰兗州東平郡即尚書之東原也今東平州也孔傳曰致功而地平言可耕也厥土赤埴墳蔡傳曰土黏曰埴埴膩也周有搏埴之工老氏言埏埴以為器惟土性黏膩細密故可搏可埏也箋按周禮草人職赤緹用羊埴壚用豕考工記用土為瓦謂之搏埴之工注曰埴土黏也草木漸包蔡傳曰漸進長也如易所謂木漸包叢生也如詩所云如竹包矣言其叢生而積也箋按周禮閭師任圃以樹事貢草木草木之貢虞夏已有故禹貢特記其漸包也孔傳漸進長包叢生如易彖曰漸進也説卦傳曰巽為木為長為高是也又按木漸蔡傳曰如易所謂木漸象曰山上有木漸漸自為句今讀為木漸可乎爾雅包稹孫炎曰物叢生曰苞齊人名曰稹蔡傳叢生而積積當是稹之譌厥田惟上中厥賦中中孔傳曰田第二賦第五箋按周職方青州其川淮泗其浸沂沭其榖宜稻麥即禹貢之徐州也周分禹青州東北為幽并禹徐州於青也厥貢惟土五色蔡傳曰徐州之土雖赤而五色之土亦間有之故制以為貢周書作雒曰諸侯受命於周乃建大社於國中其壝東青土南赤土西白土北驪土中央舋以黄土將建諸侯鑿取其方面之土周書方下有一字包以黄土苴以白茅以為土封周書曰以土封之謂之裂土故曰受削土於周室此貢土五色意亦為是用也箋按太康地記曰城陽姑幕有五色土封諸侯錫之茅土用為社禹時徐州所貢當即是土也京相璠曰琅邪郡姑幕縣南四十里員亭故魯鄆邑今莒州有姑幕城是也又按周書作雒解受則土於周室則法也蔡傳云削土誤羽畎夏翟蔡傳曰羽畎羽山之谷也夏翟雉具五色染人之職秋染夏鄭氏曰染夏者染五色也曽氏曰山雉具五色出於羽山之畎則其名山以羽者以此歟箋按孔傳曰翟雉名羽中旌旄羽山之谷有之今淮安府贛榆縣山也西界鳯陽府虹縣即漢夏丘縣北齊夏丘郡輿地志堯封禹為夏伯邑於此即位徙陽翟周禮内司服掌王后之六服有揄狄闕狄鄭氏曰狄當為翟翟雉名江淮而南青質五色皆備曰揄是羽畎正夏后受封之地也夏邑在江淮間産此雉故曰夏翟天官夏采注徐州貢夏翟之羽有虞氏以為緌後世或無故染鳥羽象而用之春官服車五乗孤乗夏篆卿乗夏縵皆畫五采以為夏注讀夏為假非也染人染夏即以翟産於夏邑名之非以夏為染采之名也鄭氏曰染五采謂之夏者其色以夏翟為飾染者擬以為深淺之度是以放而名焉則得之矣嶧陽孤桐蔡傳曰地志東海郡下邳縣有葛嶧山古文以為嶧山今淮陽軍下邳縣也陽者山南也孤桐特生之桐其材中琴瑟箋按詩魯頌保有鳬繹遂荒徐宅毛傳曰鳬山也繹山也禹貢嶧陽孤桐孔傳曰孤特也郡國志下邳葛嶧山出名桐一統志山在今邳州城西北六里詩椅桐梓漆爰伐琴瑟陸璣疏桐有青桐赤桐白桐白桐宜琴瑟孤桐殆如龍門之桐百尺無枝者故曰孤桐若以為特生之桐所生無幾焉可定為常貢乎泗濱浮磬蔡傳曰泗水名出魯國卞縣桃墟西北陪尾山西南過彭城又東南過下邳入淮卞縣今襲慶府泗水縣也濵水旁也箋按水經注泗水逕下邳縣故城西東南流又東南逕淮陽城北臨泗水又東南逕魏陽城北城枕泗州又東逕角城北而東南流注於淮胡三省曰角城在淮水之陽梁後於角城置淮陽郡謂之泗口泗口在今宿遷縣界蔡傳曰浮磬石露水濵若浮於水然或曰非也泗濱非必水中泗水之旁近浮者石浮生土中不根著者也今下邳有石磬山或以為古取磬之地箋按左傳隱八年公及莒人盟於浮來杜預曰浮來紀邑東莞縣北有邳鄉邳鄉西有公來山號曰邳來間後漢郡國志琅邪東莞有邳鄉有公來山或曰古浮來元和郡縣志下邳縣有沂水水經注沂水又東逕浮來之山在邳鄉西故號曰邳來之間也浮來之水注之是古者讀邳為浮浮磬即邳磬矣葢當時泗水之濱有浮來之山産此磬石故曰浮磬胡三省注通鑑曰濠州東九十里有浮山山下有穴名浮山洞九域志泗州西至濠州一百七十五里水經淮水自鍾離縣又東逕浮山今泗州盱眙亦有浮山若以浮生土中為浮磬則浮山亦可謂浮生者乎明堂位叔之離磬世本無句作磬皇氏曰無句叔之别名淮夷蠙珠暨魚史記作臮魚蔡傳曰淮夷淮之夷也箋按孔傳曰淮夷二水王肅亦以淮夷為水名鄭氏曰淮夷淮水之夷民也後漢東夷傳武乙衰敝東夷寖盛遂分遷淮岱為淮夷所由始今禹貢徐州已有淮夷則淮之有夷乆矣魯頌憬彼淮夷來獻其琛毛傳曰淮夷東國在淮浦而夷行也徐州之稱淮夷者殆以此耳詩記曰徐州在淮北徐州有淮夷夷之在北者也詩有曰率彼淮浦省此徐土是淮北之夷也若在淮南則徐土非聯接之地矣蔡傳曰蠙蚌之别名也暨及也珠為服飾魚用祭祀今濠泗楚皆貢淮白魚亦古之遺制歟箋按周官太宰九貢有游貢鄭曰游貢燕好珠璣也又有物貢鄭曰雜物魚鹽也賈疏曰珠即蠙珠魚即暨魚徐州所貢詩傳曰佩玉上有葱衡下有雙璜衡牙蠙珠以納其間賈公彦曰蠙蜯也珠出於蜯故言蠙珠鹽鐵論綴以朱蠙是蠙珠並為服飾也蠙説文作班云夏書從賓從虫蠙亦作班宋𢎞曰淮水出班珠珠之有聲者也夏小正二月祭鮪傳曰鮪也者魚之先至者也月令季冬始漁乃嘗魚先薦寢廟周禮䱷人職凡祭祀賓客共其魚之鱻薧故貢魚也後周太祖本紀曰其沿淮州郡淮白魚今後不須進奉是淮白魚之不貢久矣宋志楚州貢苧布泗州貢絹濠州貢糟魚蔡傳以為今濠泗楚皆貢淮白魚不知何据厥篚𤣥纎縞蔡傳曰𤣥赤黑色幣也纎縞皆繒也禮曰素縞麻衣􅎭而纎記曰縞衣而養老則知纎縞皆繒之名也曽氏曰白經赤緯曰縞黑經白緯曰纎纎也縞也皆去凶即吉之服也箋按孔氏曰𤣥黑繒縞白繒纎細也蔡傳以𤣥為赤黑幣而不以𤣥為色者書有曰篚厥𤣥黄𤣥用篚則直以為幣焉可也然𤣥纁璣組何嘗不以𤣥為色也禮雜記曰委武𤣥縞而后㽔鄭注委武冠卷也𤣥𤣥冠也縞縞冠也小爾雅繒之精者曰縞詩毛傳縞薄繒不染故色白是𤣥與纎縞為二色也郝氏曰最細曰纎粗白曰縞葢𤣥白二色而纎縞二種祥而縞􅎭而纎雖據檀弓以為説然當時制為貢篚豈必以去凶即吉之服為常篚乎浮于淮泗達于河河説文作菏蔡傳曰汳水受陳留浚儀隂溝至蒙為灉水東入於泗則淮泗之達河者以灉至於泗也慎又曰泗受泲水東入淮葢泗水至大野而合泲然則泗之上源自泲亦可以通河也箋按説文作達於菏水經菏水又東過胡陸縣南東入於泗水注曰澤水所鍾也尚書浮於淮泗達於河是也日記曰淮入海泗入淮淮泗不與河通由泗而遡灉即汴水也由灉而達河此一道也由灉達河是東路由泗之上源以遡泲由泲而達河此又一道也由泲達河是西路是皆逆流而上者也張洎曰禹於滎澤下分大河為隂溝引注東南以通淮泗至大梁浚儀縣西北復分為二渠漢明帝時王景始作浚儀渠循河溝故瀆故縣氏之一渠元經陽武中牟臺下為官渡水官渡在今中牟縣曹操與袁紹相持於官渡口即此一渠始皇疏鑿以灌魏郡謂之鴻溝通考曰世言煬帝開汴渠以幸揚州隋大業三年詔𤼵河南男女萬丁開汴水起滎澤入淮千餘里考禹貢言堯都冀州居河下流而入都貢賦重於用民力故每州必記入河之水獨淮與河無相通之道求之故迹而不得乃疑汴渠自禹以來有之不起於隋世既久逺或名鴻溝或名汴渠鴻溝在今鄭州滎陽縣大概皆自河入淮故淮河引江湖之舟以達於冀也今據後漢書則平帝時已有汴渠曰河汴决壞則謂輸受之所也官渡直黄河也故袁曹相距沮授曰悠悠黄河吾其濟乎汴渠自禹來有之此不易之論也又國䇿蘇子説魏王曰大王之地東有鴻溝陳汝南則鴻溝之名亦不自秦始也禹貢㑹箋卷四
