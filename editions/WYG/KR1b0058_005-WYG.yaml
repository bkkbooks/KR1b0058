body:
  text: 禹貢㑹箋卷五翰林院檢討徐文靖撰淮海惟揚州蔡傳曰揚州之域北至淮東南至於海箋按釋名曰淮圍也圍繞揚州北界東至海也孔傳但云北據淮南距海蔡傳以東南至海為是杜佑曰自晉以下厯代皆云五嶺之南至於海並禹貢揚州之地按荆州南境至衡山之陽若五嶺之南在九州封域則以隣接壤宜屬荆州豈有舍荆而屬揚又熊氏曰禹嘗至會稽並越地屬揚州亦甚矣若㑹稽東南郡縣及粤東八閩唐虞時聲教未通貢賦不及此皆秦漢後開闢之地烏可以揚州概之今按堯典宅南交山海經甌閩皆在海中桂林八樹在番禺東則南粤交廣禹時已通聲教者可知國䇿呉起為楚悼南攻揚越史南越尉佗傳秦時已併夫下畧定揚越張晏曰揚越揚州之南越也正義曰夏禹九州本屬揚州故曰揚越觀禹貢揚州貢賦沿於江海而荆州但云江沱潛漢其封域不及海可知矣彭蠡既豬蔡傳曰彭蠡地志在豫章郡彭澤縣東合江西江東諸水跨豫章饒州南康軍三州之地三州䖍州洪州饒州也所謂鄱陽湖者是也箋按地理志豫章彭澤縣彭蠡澤在西郡國志彭蠡湖周四百五十里荆州記曰宫亭即彭蠡澤也謂之彭澤湖一名滙澤張勃呉録曰彭蠡今名洞庭湖案在今九江郡界正義曰彭蠡是江漢合處元和志曰揚瀾湖一曰左里今都昌縣西南九十里有左里城彭蠡又呼為左蠡是皆湖之異名也史記秦伐楚取番置番陽縣以在鄱水之陽也隋始以鄱陽名湖金仁山曰彭蠡今鄱陽湖自洪宫亭受江西嶺北江東諸水在江饒南康興國之間至池州湖口入江漢志所謂湖漢九水者是也陽鳥攸居蔡傳曰陽鳥隨陽之鳥謂鴈也今惟彭蠡洲渚之間千百為羣記陽鳥所居猶夏小正記鴈北鄉也箋按孔傳曰冬月所居於此澤正義曰日之行也夏至漸南冬至漸北鴻鴈之屬九月而南正月而北左思蜀都賦所云木落南翔氷泮北徂是也日陽也此鳥南北與日進退故曰陽鳥夏小正曰正月鴈北鄉戴傳曰鄉者何也鄉其居也鴈以北方為居何以謂之居生且長焉耳九月遰鴻鴈何不謂南鄉也曰非其居也今禹貢彭蠡攸居則又實指南鄉而言葢是時水土既平洲渚之間羣相聚處晞陽自得一若其生且長於是焉故謂之攸居也三江既入蔡傳曰庾仲初呉都賦註松江下七十里分流東北入海者為婁江東南流者為東江併松江為三江其地今亦名三江口呉越春秋所謂范蠡乗舟出三江之口者是也箋按地理志南江從會稽呉縣南東入海今蘇州呉縣中江從丹陽蕪湖縣今屬太平府東北至㑹稽陽羡東入海今常州府宜興縣北江從㑹稽毗陵北東入海今常州府江隂縣故導水東為北江東為中江孔傳曰有北有中南可知也葢三江既入入海之道有三非謂入震澤也蔡傳以松江婁江東江當之周公環曰宋人三江口江面濶九里地𫝑低於震澤三丈蘇子瞻曰三呉之水瀦為太湖湖之水溢為松江以入海然則三江皆震澤之委又近在數十里内合為一江以入海無所謂三江既入者也安得據以為禹貢三江蔡傳曰蘇氏謂岷山之江為中江嶓冢之江為北江豫章之江為南江似可依據然江漢㑹於漢陽合流數百里至湖口而後與豫章江㑹又合流千餘里而後入海不可復指為三矣箋按國語子胥曰呉之與越三江環之民無所移固非一呉縣南之三江遂可以環呉越矣周職方揚州其澤藪曰具區其川三江其浸五湖呉地記云五湖太湖東岸五灣也然職方藪具區注云即震澤安得又以太湖為浸而兩記之也呉越春秋曰范蠡既滅呉乃乗扁舟出三江入五湖若震澤即五湖三江即震澤之委何言出三江又何言去呉而辭越也應劭曰范蠡出三江入五湖今廬江臨丹陽蕪湖縣是也据漢志以禹貢中江在蕪湖則廬江即為三江之一從可知矣蘇氏謂漢水自北而來至大别入江是為北江然江漢並為大川不應没漢之名改為北江也竊意山海經曰廬江出三天子都入江彭澤西郭璞注曰江出岷山東南至廬江南界今廬江正在江北彭澤正在江南而大江行乎其中合為三江自尋陽而東直趨於海其東北至常州宜興入海者是為中江又一股至松江江隂入海者是為北江呉縣南東入海者為南江入海之道有三也漢志廬江出陵陽東南北入江則入江為北江何疑也蘇傳曰蘇氏知其説不通遂有味别之説禹之治水本為民去害豈如陸羽輩辨味烹茶為口腹計耶箋按易緯河圖曰九州殊題水泉剛柔各異青徐泉酸以鹹荆揚泉酸以苦梁州泉苦以辛兗豫泉甘以苦雍冀泉辛以鹹唐書許敬宗傳古者五行皆有官水官不失職則能辨味與色潛而出合而更分皆能識之豈謂如陸羽輩為口腹計耶震澤厎定蔡傳曰震澤太湖也地志在呉縣西南五十里今蘇州呉縣也曾氏曰震如三川震之震若今湖翻是也具區之水多震而難定故謂之震澤厎定者言厎於定而不震動也箋按郡國志呉郡呉縣震澤在西劉昭注曰越絶書云湖周三萬六千頃又有大雷山小雷山山海經曰雷澤有雷神鼓其腹在呉西楊脩五湖賦曰頭首無錫足蹄松江負烏程於背上懷大呉以當胸岝㟧崔嵬穹窿紆曲大雷小雷湍波相逐皆以雷澤為震澤易曰震為雷故名湖為震也若三川震記異也豈可以震澤例之端臨馬氏曰太湖跨蘇湖常三境宣歙以東富陽以北水俱從荆溪之百瀆長興之二十四瀆湖州之三十六瀆呉江之七十二漊吐納焉揚州記太湖一名震澤一名笠澤一名洞庭此厎定所以難也故經言震澤厎定以見揚功之告成豈從前震蕩難定至是乃厎於定哉篠簜既敷蔡傳曰篠箭竹簜大竹郭璞曰竹濶節曰簜敷布也箋按爾雅東南之美㑹稽之竹箭在禹跡為揚州故特記篠簜也爾雅疏云李巡曰竹節相去一丈曰簜孫炎曰竹濶節者曰簜竹紀曰小篠大簜竹之通稱朱子曰簜小節竹也不知何据敷布也孔傳曰水去布生如易説卦傳震為旉為蒼筤竹旉亦敷也氣盛而敷布森列厥草惟夭厥木惟喬蔡傳曰少長曰夭喬髙也箋按孔傳少長曰夭喬髙也正義曰詩云桃之夭夭南有喬木是也周書大聚解旦聞禹之禁春三月山林不登斧以成草木之長此夭喬所由來也厥土惟塗泥蔡傳曰塗泥水泉濕也下地多水其土淖箋按孔傳地泉濕蔡傳易地為水水與泉豈有二乎又按夏小正曰滌凍塗戴傳曰凍塗者凍下而澤上多也尸子曰行塗以楯史記曰泥行乗橇荆揚塗泥禹施功為尤多矣厥田惟下下厥賦下上上錯孔傳曰田第九賦第七雜出第六箋按周職方曰揚州榖宜稻援神契曰泍泉宜種稻金氏曰古人尚黍稷田雜五種黍稷麥菽稻故雖旱潦而各有所收塗泥之土其田獨宜稻不利他種故第為最下下上上錯者錯在下上之上厥貢惟金三品蔡傳曰三品金銀銅也箋按周職方揚州其利金錫考工記曰呉粤之金錫越世家注曰賈逵説云虞夏商周金幣三等或赤或白或黄黄為上幣銅錢為下幣釋器云黄金謂之璗白金謂之銀三品之來古已然矣瑶琨篠簜馬融本琨作瑻韋昭音貫蔡傳曰瑶琨玉石名詩曰何以舟之惟玉及瑶琨説文石之美似玉者取之可以為禮器篠之材中於矢之笴簜之材中於樂之管簜亦可為符節周官掌節有英簜箋按周禮内宰職大祭祀則贊瑤爵鄭注曰其爵以瑶為飾説文琨石似玉者山海經曰㑹稽之山多金玉下多砆石殆琨之類也經又曰竹山多竹箭郭璞曰箭篠也是篠中矢笴也儀禮大射禮簜在建鼔之間鄭注曰簜竹也謂笙簫之屬又乃管新宫注曰管謂吹簜以播新宫之樂是簜中樂之管也周官掌節凡邦國之使節皆金也以英簜輔之鄭注曰英飾也簜竹也以竹為函加以畫飾而盛其節也干寳曰英刻書簜竹箭也刻而書其所使之事以助三節之信未有以英簜為符節者惟朱子曰古人符節多以玉為之又有竹符又有英簜符簜小節竹使者謂之簜節也蔡傳簜可為符節本此齒革羽毛惟木史記無惟木二字蔡傳曰象有齒犀兕有革鳥有羽獸有毛木楩梓豫章之屬箋按孔傳曰齒象牙革犀皮羽鳥羽毛旄牛尾据周禮掌皮冬斂革共其毳毛為氈以待邦事司服掌王之衣服祀四望山川則毳冕鄭氏曰毳罽衣也正義曰爾雅云毛釐謂之罽則續毛為之若今之毛布是也當是時洪水泛濫草木暢茂鳥獸蹄迒之迹交錯於原野聖人因制為齒革羽毛之貢若周官冥氏攻猛獸則獻其皮革齒須翨氏攻猛鳥以時獻其羽翮使自為驅除而不之覺角人掌以時徴齒角於山澤之農羽人掌以時徴羽翮之政于山澤之農皆祖述禹貢之遺制也至於惟木之貢不言何木者殆即為厥木惟喬者也前此巢居穴處至是易之以宫室上棟下宇葢取諸大壯則需於喬木者殊廣也若必為楩梓豫章之屬何荆州言杶榦栝栢而此但言惟木也周禮太宰九貢五曰材貢木材也是矣島夷卉服蔡傳曰島夷東南海島之夷卉草也葛越木棉之屬箋按史記注海州東海縣有島山去岸八十里括地志百濟國西南海中有大島十五所皆置邑有人居島夷之屬大率類此卉服孔傳曰草服葛越後漢書世祖勅㑹稽獻越布文選孫楚書葛越布於朔土注葛即葛藟越即蕉苧黄草之屬蔡傳以為木棉之屬非厥篚織貝蔡傳曰織貝錦名織為貝文詩曰貝錦是也今南夷木棉之精好者亦謂之吉貝海島之夷以卉服來貢而織貝之精者則入篚焉箋按初學記堯懸貝於撝宫則大貝亦當時所重或然也朱仲相貝經有黄貝紫貝餘泉餘蚳黄白文之異當時島夷布帛織為黄白青黒之貝文因曰織貝傳以木棉之精好者亦謂之吉貝據宋書蠻夷傳云悉蘭池國産吉貝布闍婆國獻吉貝織雜色等布呵羅單國遣使致天竺白疊古貝葉波國古貝等物古貝即吉貝也李東璧曰古貝是木棉自劉宋始入中國禹時安得有之又小雅巷伯萋兮斐兮成是貝錦錦亦謂貝之文耳傳以織貝為錦名亦非厥包橘柚錫貢蔡傳曰包裹也小曰橘大曰柚錫者必待錫命而後貢非嵗貢之常也箋按周官太宰九貢有物貢鄭注曰物貢雜物魚鹽橘柚也吕氏春秋曰果之美者江南之橘雲夢之柚崔寔政論曰橘柚之實堯舜所不常御故禹貢亦錫命而後貢考工記橘踰淮而北為枳故淮海貢之王肅曰錫其命而後貢之不常入㳂于江海達于淮泗史記㳂作均達作通蔡傳曰順流而下曰㳂㳂江入海自海而入淮泗不言達於河者因於徐也禹時江淮未通故㳂於海至呉始開䢴溝隋人廣之而江淮舟船始通也孟子言排淮泗而注之江記者之誤也箋按孔傳曰㳂江入海自海入淮自淮入泗正義曰文十年左傳㳂漢泝江泝是逆㳂是順㳂江入海順也自海入淮自淮入泗逆也水經注曰昔呉將伐齊北霸中國自廣陵城東南築䢴城城下掘深溝謂之䢴江亦曰韓溟溝左傳哀五年呉城䢴溝通江淮杜預曰于䢴江築城穿溝東北通射陽湖西至末口入淮今末口在淮安府北五里哀十三年㑹晉侯及呉子於黄池呉語曰夫差起師北征闕為溝於商魯之間北屬之沂西屬之濟以㑹晉公午於黄池是呉之通水有二不獨江淮之始通己也隋大業三年詔𤼵淮南兵夫十餘萬開䢴溝自山陽淮至於揚子江三百餘里水面濶四十步傳謂隋人廣之者也禹貢㑹箋卷五
