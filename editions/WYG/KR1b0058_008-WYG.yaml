  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1b0058_WYG_008-1a, image: WYG0068/WYG0068-0331a.png}
body:
  text: 禹貢會箋卷八翰林院檢討徐文靖撰華陽黑水惟梁州蔡傳曰東距華山之南西據黑水華山即太華見導山黑水見導水箋按孔傳東據華山之南西距黑水蔡氏曰雍梁二州皆西據黑水以黑水之見于導水者至于三危入于南海總𤼵于雍西經于梁西故不應言西距黑水也穆天子傳天子至于重氏黑水之阿爰有采石之山晉書地道記梁州南至桓水西底黑水東限捍闗山海經黑水出張掖雞山南流至燉煌過三危而南流入于南海是黑水綿歴二州西界蔡易西距為西據是也岷嶓既藝史記作汶嶓蔡傳曰岷山地志在蜀郡湔氐道西徼外在今茂州汶山縣江水所出也箋按郝京山曰岷山在今成都府茂州江水所經也江源出今松潘衞西二百三十里大分水嶺北流入陜西洮河南流入甘松嶺經松潘城而岷山又在城東三十里自分水嶺至成都凡九百九十里水尚小自成都東流千五百里至瀘州以東馬湖嘉陵江涪江巴江等水合而江始大蔡傳曰嶓冢在隴西氐道漾水所出又云在西縣今興元府西縣三泉縣也箋按孔傳曰漾水出嶓冢在梁州正義曰梁州云嶓冢既藝是嶓冢在梁州也唐六典山南道名山曰嶓冢嶓冢縣故城在今漢中府沔縣南四十里西南接寧羌州界嶓冢山在州北九十里既藝言水土既平樹藝五穀也唐志興元府有西縣三泉縣武徳三年以西縣置褒州尋廢四年析利州之綿谷縣置三泉縣又以縣置南安州尋廢宋志有西縣無三泉縣元又省西縣入略陽也沱潛既道史作沱涔漢沱􅏦蔡傳曰江漢别流之在梁州者地志禹貢江沱在蜀郡郫縣西東入大江又地志汶江縣江沱在西南東入江今永康軍導江縣也箋按爾雅郭氏音義曰沱水出蜀郡都水縣湔山與江别而更流所謂水出自江為沱也徐士彰曰江漢二水源出梁州夾蜀山而行江在山之南漢在山之北自梁至荆山行數千里凡山南谿谷之水皆自江而出山北谿谷之水皆自漢而出其水衆多不足盡録故南總為沱北總為潛蓋當時之方言猶今言谿谷云爾後之讀爾雅者誤以江漢為沱潛所出之源不知其為沱潛所出之路也禹貢言岷山導江東别為沱沱猶它也盖江之𤼵源在岷山極西處自江源而東凡别水之來會者皆為此江之沱不得自為一水也今蜀江沿岸溪水合處猶有鑑沱勾流沱明月沱歸鄉沱之名尚可想見當時命名之意云蔡傳曰地志巴郡宕渠縣潛水西南入江今渠州流江縣也酈道元謂宕渠有大穴潛水入焉通岡山下西南潛出南入于江又地志漢中郡安陽縣灊谷水出西南入漢灊音潛今洋州眞符縣也箋按爾雅郭氏音義曰有水從漢中沔陽南流至梓潼漢夀入大穴中通岡山下西南潛出又蜀都賦注潛水從犍為郡江陽縣今叙州府富順縣南流至漢嘉縣漢嘉疑漢夀之譌入大穴中通岡山下西南潛出今名復出水是大穴在漢夀不在宕渠也蔡傳引酈注謂宕渠有大穴疑誤漢夀晉改為晉夀庾仲雍曰墊江有别江出晉夀縣即潛水也其南源取巴西是西漢水也足證漢嘉之誤蔡蒙旅平蔡傳曰蔡山輿地記在今雅州嚴道縣蒙山地志蜀郡靑衣縣今雅州名山縣也箋按鄭氏曰地理志蔡蒙在漢嘉縣應劭曰蔡山不知所在史記索隱曰蒙在蜀郡靑衣縣靑衣後改為漢嘉蔡山不知所在也寰宇記周公山在嚴道縣東南山勢屹然上有龍穴輿地記所謂蔡山盖周公山果若是則自漢迄唐何謂不知所在也漢地志禹貢蒙山谿在蜀郡靑衣縣東應劭曰順帝改漢嘉縣今蒙山在雅州名山縣西十五里即禹貢之蒙山也水經注沫水出岷山西東流過漢嘉南流衝一髙山山即蒙山也是矣旅平旅當訓序燕禮士旅酌鄭注曰士以次序自酌此蔡蒙以次序而就故謂之旅平也孔傳曰旅平言治功畢明一統志曰有地名旅平在雅州東十里是殆附會之言也和夷厎績蔡傳曰和夷地名嚴道以西有和川有夷道或其地也又按晁氏曰和夷二水名和水今雅州榮經縣北和川水自蠻界羅嵒州東西來逕蒙山所謂靑衣水而入岷江者也夷水出巴郡魚復縣東東南過佷山縣南又東過夷道縣北東入于江今詳二説皆未可必箋按和夷陸氏釋文曰鄭云和讀曰洹今説禹貢者皆不知有此音唐志雅州盧山郡有和川城今天全司南古和川地現有和水在雅州之西榮經之北蔡傳以嚴道西之和川為地榮經北之和川為水其實一水也唐于和川上立城禹時蓋未有也劉昫曰眉州靑神縣臨靑衣羌靑衣水出盧山徼外晁氏以為即和水非也地理志夷水出南郡巫縣東過夷道入江後漢書廩君乃乘土船從夷水至鹽陽則夷亦水名也或曰和夷謂和川上之夷也果若為和川之夷何以云底績乎底績者前此績用弗成至是乃能致績也厥土靑黎蔡傳曰黎黑也箋按孔傳曰色靑黑而沃壤李尤七嘆曰梁土靑黎盧橘是生亦因禹貢而云蔡傳訓黎為黒如兖土黑墳向使黎専訓黑何不竟言青黑乎馬融王肅訓黎為小疎董氏酉曰考黎無疏訓大抵黎當為蒼黑色如今人言蒼黎者是也厥田惟下上厥賦下中三錯孔氏曰田第七賦第八雜出第七第九三等箋按日記曰梁田下上似優於揚然多山而少田人功亦劣故賦之等退在下中而又以七九二等為之上下間出調劑可謂宻矣無錯者其等已定有錯者其等難定時進退以通節之也蔡傳曰按賦雜出他等者或以為歲有豐凶或以為户有增減皆非也意者地力有上下年分不同如周官田一易再易之類故賦之等第亦有上下年分箋按龍子之言曰貢校數歲之中以為常豐歲粒米狼戾多取之而不為虐則寡取之凶年糞其田而不足則必取盈焉是梁賦下中三錯與冀賦惟上上錯揚賦下上上錯豫賦錯上中雖所錯有不同而要皆調劑斟酌於先制為一定之貢恐無復有上下年分之殊也厥貢璆鐵銀鏤砮磬蔡傳曰璆玉磬鐵柔鐵鏤剛鐵可以鏤刻者也磬石磬也箋按爾雅璆琳美玉也孔傳曰璆玉名是也書戛擊鳴球球與璆同説文璆玉磬是也蔡傳以璆為磬据晉語文公問八疾胥臣對曰蘧除蒙璆注云璆是玉磬使擊之是也但下有砮磬似應依孔傳為璆玉然砮為石磬璆為玉磬自不同也山海經曰少華之山其隂多磬石其陽多㻬琈之玉故華陽之梁貢璆與磬經又曰符禺之山其陽多銅其隂多鐵符禺之水出焉北流注于渭故入渭亂河之梁兼貢鐵也又傳以鏤為剛鐵亦非爾雅金謂之鏤詩虎韔鏤膺鄭箋鏤膺有刻金飾也禮雜記管仲鏤簋鄭注刻為蟲獸也明堂位玉琖仍雕夏后氏以琖則雕鏤以為飾可知也彛器欵式夏后氏雕戈鈿紫金為文是也若以為剛鐵似當總名為鐵如金三品概名為金也蔡傳曰言鐵而先於銀者鐵之利多於銀也後世蜀之卓氏程氏卓王孫程鄭以鐵冶富擬封君則梁之利尤在於鐵也箋按郡國志巴郡宕渠出鐵蜀郡臨卭有鐵越雋郡會無出鐵永昌郡不韋出鐵故貢鐵也地理志朱提縣山出銀句町縣山出銀賁古縣西羊山出銀故貢銀也華陽國志登臺有孫水一曰白沙江山有砮火燒成鐵故貢砮也凡此皆梁州所産因以制貢初何先後之分熊羆狐狸織皮蔡傳曰織皮者梁州之地山林為多獸之所走熊羆狐狸四獸之皮可以為裘其毳毛織之可以為罽也箋按爾雅羆如熊黄白文爾雅翼羆則熊之雌者陶隱居曰江東無狐皆出北方形似狸而黄詩奕奕梁山維禹甸之孔樂韓土有熊有羆獻其貔皮赤豹黄羆陸璣疏貔似虎或曰似熊一名白狐遼東人謂之白羆陸氏釋文羆如熊而黄又豳風取彼狐狸為公子裘小雅大東舟人之子熊羆是裘是四獸之皮製之可為裘也周官太宰九貢有幣貢鄭注幣貢玉馬皮帛也賈疏曰皮即熊羆狐狸也王制西方曰戎被髮衣皮孔傳曰貢四獸之皮織金罽也後漢西域傳織成金縷罽是也西傾因桓是來蔡傳曰西傾山名地志在隴西郡臨洮縣西今洮州臨潭縣西南箋按唐地志洮州臨潭縣西百六十里有西傾山沙州記洮水出嵹臺山即西郡之異名也山在今陜西臨洮府西南四百五十里蔡傳曰桓水名水經曰西傾之南桓水出焉箋按沙州記桓水出嵹臺山南墊江之上源也又一名白水郭璞曰白水源從臨洮之西西傾山經㳫中漢金城郡河關縣西東流通隂平至漢夀縣本葭萌劉先主改曰漢夀入潛是西傾貢道直與潛通故因桓是來即繼以浮于潛也浮于潛逾于沔入于渭亂于河蔡傳曰蘇氏曰漢始出為漾東南流為􅃆至漢中東行為漢沔酈道元曰自西傾而至葭萌浮于西漢西漢即潛水也自西漢遡流而屆於晉夀界本漢夀晉太康中改阻漾支津南歴岡北迤邐接漢􅃆歴漢川至于褒水逾褒而屆于衙嶺之南衙嶺在今郿縣西南三十里溪灌于斜屆于武功而北以入于潛箋按水經注南歴岡穴迤邐而接漢沿此入漾書所謂浮潛而逾􅃆矣又按爾雅疏有水從􅃆陽流至漢夀縣入大穴中通岡山下西南潛出一名􅃆水則酈注南歴岡穴邢疏通岡山西南潛出安得在岡北乎蔡傳岡北乃岡穴之譌酈注迤邐而接漢沿此入漾蔡傳迤邐接漢􅃆當又沿歴漢川譌沿為􅃆矣􅃆一名沮水出武都沮縣東狼谷南注至沮口與漾水合漾於是兼有􅃆稱蔡傳曰漢武帝時人有上書欲通褒斜道及漕事下張湯問之云褒水通􅃆斜水通渭皆可以漕從南陽上􅃆入褒褒絶水至斜間百餘里以車轉從斜下渭如此則漢中穀可致箋按梁州記萬石城泝漢上有褒谷南口曰褒北口曰斜長四百五十里此言褒絶水至斜間百餘里盖褒水出太白山至南鄭入􅃆斜水出衙嶺山至郿入渭其水道則褒絶水至斜僅間百餘里也倪氏粲曰漢水不與渭通其相隔處祗隔一大散闗括地志大散闗在岐州陳倉縣東五十里正棧道處其地陳倉在東南為褒西為河北為鳳與郿從洋入褒鳳出者為今連雲棧道漢王之南鄭由之連雲棧道在今漢中府褒城縣舊有棧閣二千九百八十九間從郿入從城固洋縣出者為斜谷道武侯屯渭上由之大散闗之水北流為渭南流為漢其間又有二江白水江入渭黑龍江入漢故梁州貢道南歴漢􅃆登陸以車轉北而後乃入於渭也蔡傳曰經文當曰逾于渭今曰逾于􅃆未可曉也箋按地理志褒水出太白山至南鄭入􅃆斜水出衙嶺山北至郿入渭渭與河通􅃆不與渭通若逾渭入􅃆則無由亂于河矣蔡傳乃以為當日逾渭何也從渭水漕糧東南入河乃雍之水道爾禹貢會箋卷八
