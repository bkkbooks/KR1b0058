body:
  text: 禹貢會箋卷九翰林院檢討徐文靖撰黑水西河惟雍州蔡傳曰西據黑水東距西河謂之西河者主冀都而言也箋按孔傳曰西距黑水東據河王肅曰西據黑水東距西河蔡傳從王説也河在雍東而曰西河者成四百家曰河自積石東北流入雍州在其西故曰西河穆天子傳乃封長肱于黑水之西河是惟昆侖鴻鷺之上以為周室主水經黑水出張掖雞山今在肅州衛城之西北即雍州之黑水也鳯翔府城西北有雍山雍水出焉雍州之名以此弱水既西蔡傳曰柳宗元曰西海之山有水焉散渙無力不能負芥投之則委靡墊没及底而後止故名曰弱既西者導之西流也箋按山海經隂山北五十里曰勞山弱水出焉而西流注于洛淮南子曰弱水出窮石地理志曰張掖刪丹縣桑欽以為導弱水自此至酒泉合黎通鑑秦征西將軍孔子胡三省注孔子亦乞伏氏也討吐谷渾覔地于弱水南覔地降于秦拜弱水䕶軍今西寧衛西三百里有弱水在甘州界盖即為禹貢之弱水也鄭氏曰衆水皆東此獨西流據漢書西域傳云于闐以西水皆西流是禹之導水盖亦順水之性也括地志曰弱水有二源俱出女國北阿耨達山一名建末逹山即昆侖山也又南歴岡北東去一里深丈餘濶六十步非毛舟不可濟南流入海此柳州所謂不能負芥故名弱水者也且南流入海何從導之西流也以為即禹貢弱水非矣涇屬渭汭蔡傳曰涇渭汭三水名涇水地志出安定郡涇陽縣西今原州百泉縣岍頭山也東南至馮翊陽陵縣入渭今永興軍今西安府髙陵縣也箋按西山經髙山涇水出焉而東流注于渭易氏曰开頭山一名空同連亘原州髙平百泉平涼三縣涇水東南流至涇州臨涇縣保定縣邠州宜禄縣永夀縣又東北流至京兆醴泉縣九擾山東唐志醴泉縣有九􅉄山擾當作􅉄仲山西當水出山處故漢名谷口縣白渠溉田在此又自池陽東今乾州流至涇陽縣南七里東南流至髙陵縣東北流至雲陽縣西一十五里即鄭國鑿渠處又東流而入渭洛入河處謂之洛汭渭入河處謂之渭汭涇至雲陽縣而入渭又至華州華隂之永豐倉而入河此二百八十里間涇與渭相連故云説文水相入曰汭蔡傳曰渭水地志出隴西郡首陽縣西南今渭州渭源縣鳥鼠山西北南谷山也東至京兆船司空縣入河今華州華隂縣也箋按水經注渭水出首陽山渭首亭南谷句山在鳥鼠山西北渭水三源合注東北流逕首陽縣西與别源合水出南鳥鼠山渭水出谷此盖以渭水出首陽山南谷其谷在鳥鼠西非别有南谷山也觀地志云恒水出恒山北谷豈别有北谷山乎山海經涇水出長城北山山在郁郅長垣北北入渭戲北郭璞曰今涇水出安定朝那縣東南至京兆髙陵縣入渭戲地名今新豐縣也蔡傳曰汭水地志作芮扶風汧縣弦蒲藪芮水出其西北東入涇今隴州汧源縣弦蒲藪有汭水焉周職方雍州其川涇汭詩云芮鞫之即皆謂是也箋按水經渭水東入于河注曰春秋之渭汭也左傳閔公二年虢公敗犬戎于渭隊隊今本作汭服䖍曰隊謂汭也杜預曰水之隈曲曰汭王肅曰汭入也詩芮鞫之即毛傳曰芮水涯也鄭箋曰汭之言内也據此則渭汭之汭不得為水名矣周禮職方氏其川涇汭鄭注曰汭在豳地易彦祥曰汭非禹貢之汭禹貢言汭皆水内此川名是也蔡傳引詩芮鞫與職方涇汭以證禹貢渭汭為水名殊混孔傳曰屬逮也水北曰汭言治涇水入于渭也蔡傳易之曰屬連屬也涇水連屬渭汭二水也皆非漆沮既從蔡傳曰漆水寰宇記自耀州同官縣東北界來經華原縣合沮水沮水自坊州昇平縣北子午嶺出俗號子午水下合榆谷慈馬等川遂為沮水至耀州華原縣合漆水至同州朝邑縣東南入渭箋按孔傳曰漆沮二水名亦曰洛水出馮翊北前漢匈奴傳涇洛之北顔師古曰此洛即漆沮水也水出上郡雕隂泰冒山而東南入于渭延安洛記曰洛水出慶陽府環縣經延安府甘泉縣經鄜州宜君縣子午嶺至中部縣入西安府界經耀州及同官縣至富平縣合沮水歴蒲城同州至朝邑東南入渭寰宇記曰漆水自同官界來蔡傳據之不知禹貢漆沮自有二水但云自同官界來是洛水也一統志遂言同官之漆出自鳳翔不知漆水為涇汭所間其能飛渡至同官耶圖書編於延安洛記中辨之詳矣蔡傳曰地志謂漆水出扶風縣西􅄯氏曰此豳之漆也水經漆水出扶風杜陽縣程氏曰杜陽縣今岐山普潤縣之地亦漢漆縣之境其水入渭在灃水之上與經序渭水節次不合非禹貢之漆水也箋按水經注昔韓欲令秦無東伐使水工鄭國間秦鑿涇引水謂之鄭渠渠水上承涇水於仲山西􅉚口所謂􅉚中也鄭渠又東逕捨車宫南絶治谷水鄭渠故瀆又東逕嶻嶭山南又東絶清水又東逕北原下濁水注焉又東逕南原中北屈逕原東與沮水合宋白曰苻堅于嶻嶭山北置三原䕶軍以其地南有酆原西有孟侯原北有白鹿原為三原後魏太平眞君七年罷䕶軍置縣分為二水一水東南出至白渠與澤泉合俗謂之漆水又謂之為漆沮水絶白渠東逕萬年縣故城北今咸寧縣為櫟陽渠其水又南屈更名石川水又西南逕郭􅚄城西與白渠枝渠合又南入于渭水也長安志曰漆水經華原縣界十五里南流入沮水入富平縣界俗名石川河據此則渭水東會于涇又東過漆沮其先後莫此之詳悉也程氏雍録曰雍境漆水凡四出而實三派雍州萬年縣石川河一也邠州新平縣漆水二也鳳翔府普潤縣漆水三也鄭白渠一名漆沮四也四水之中惟石川河當為禹貢漆沮而緜詩謂自土漆沮者在岐不在邠也灃水攸同漢書作酆水逌同史記作所同蔡氏曰灃水地志作酆出扶風鄠縣終南山今永興軍鄠縣也東至咸陽入渭箋按詩豐水東注維禹之績集傳曰灃水東北流經豐邑之東入渭而注于河括地志灃水源在雍州長安縣西南山灃谷蘇氏曰灃渭相若故言同荆岐既旅蔡傳曰荆山即北條之荆地志在馮翊懐徳縣南今耀州富平縣掘陵原也箋按水經注渭水之陽即懐徳縣界也城在渭水之北沙苑之南唐志同州馮翊縣有沙苑地理志禹貢北條荆山在南山下有荆渠夏后鑄九鼎處也括地志荆山在雍州富平縣今名掘陵原按富平西北有定陵元陵章陵簡陵東南有豐陵世謂之為掘陵原孔傳曰荆在岐東非荆州之荆蔡傳曰岐山地志在扶風美陽縣西北今鳳翔府岐山縣東北十里也箋按師古曰荆在岐東言二山治畢已旅祭也玉海曰岐山在鳳翔府東北十里一名天柱山今按山有兩岐故名曰岐山周語曰周之興也鸑鷟鳴于岐山土人謂之鳳凰堆終南惇物至于鳥鼠蔡傳曰終南地志古文以太一山為終南山在扶風武功縣今永興軍萬年縣南五十里也箋按五經要義曰太一山在扶風武功縣與終南山相連福地記曰終南山北去長安城八十里終南南山之總名太一一山之别號終南山在西安城南灃水所出太一山在終南之南滈水所出蔡傳曰惇物地志以垂山為惇物在扶風武功縣今永興軍武功縣也箋按金史志乾州武亭縣有惇物山山在今武功縣東南二百里蔡傳曰鳥鼠地志在隴西郡首陽縣西南今渭州渭源縣西也俗呼為靑雀山箋按唐地志渭州渭源縣有鳥鼠同穴山一名靑雀山山在今臨洮府渭源西二十里渭水源在縣西七十六里原隰厎績至于豬野史記作都野蔡傳曰廣平曰原下濕曰隰詩曰度其隰原即指此也鄭氏曰其地在豳今邠州也箋按周禮大司徒辨五地之物生五曰原隰邍司注遙掌畿外邦國之原隰如禹貢冀之太原徐之東原雍之原隰是也鄭云其地在豳以詩篤公劉度其原隰豳居允荒故也蔡云今邠州周應賓識小編曰唐明皇以豳近幽改為邠也蔡傳曰豬野地志武威縣東北有休屠澤古文以為豬野今涼州姑臧縣也箋按括地志都野澤在涼州姑臧縣東北二百八十里水經注曰地理志谷水出姑臧南山北至武威入海屆此水流兩分一水北入休屠澤俗謂之為西海一水又東逕一百五十里世謂之為東海通謂之都野矣底績而云至于者兼豬野言魏太武伐涼謂姑臧城東西門外湧泉合于城北其大如河其間乃無燥地此禹所以底績為難也三危既宅三苗丕叙三危古文作三宅史作度丕叙史作大序蔡傳曰三危即舜竄三苗之地或以為燉煌未詳其地三苗之竄在洪水未平之前及是三危已既可居三苗於是大有功叙箋按舜典竄三苗于三危孔傳曰三苗縉雲氏之後為諸侯號饕餮三危西裔山海經三危之山員廣百里郭注今在燉煌郡唐地志燉煌縣東四十里有三危山傳以為未詳其地何也蔡舜典傳曰三苗之竄在洪水未平之前据通鑑竄三苗在堯七十六載時禹平水土已五年矣亦不是洪水未平之前既宅之宅當即為舜典五流有宅五宅三居之宅不得以降丘宅土例也益稷篇禹曰外薄四海咸建五長各迪有功苗頑弗即工帝其念哉帝曰臯陶方欽厥叙方施象刑惟明則是向所頑不即叙者至是乃丕叙矣非大有功叙之謂蔡傳曰舜竄三苗既竄者已丕叙而居於舊都者尚桀驁不服盖三苗舊都山川險阻氣習使然今湖廣徭洞時猶竊𤼵俘而詢之多為苗姓豈其遺種與箋按水經注渭水東歴大利又東南流苗谷水注之地道記云有三危三苗所處故有苗谷又洛書甄耀度曰三危山在鳥鼠之西南上為天苑星此三危在雍州之境内當是舜竄之近地而不與沙州三危同科者也故舜典分北三苗北古别字孔傳曰三苗幽闇君臣善惡分北流之不令相從禹征有苗誓師曰三苗昏迷不恭君子在野小人在位韓非子曰三苗有成駒亡國之臣也則當日逺竄于𤓰沙者必是輩耳周書吕刑曰皇帝哀矜庶戮之不辜遏絶苗民無世在下孔傳曰使無世位在下國也則當日仍有遺種可知世因其頑梗不悛呼苗為猫厥土惟黄壤蔡傳曰黄者土之正色箋按易曰天𤣥而地黄故黄為土之正色辛氏三秦記長安地皆黑壤何也易坤鑿度曰坤有八色東下西上北黑南輕中殷甘滋厥土厚肌東鹹西淡南汚北荒其大較也厥田惟上上厥賦中下孔傳曰田第一賦第六人功少箋按貨殖傳闗中自汧雍以東至河華膏壤沃野千里自虞夏之間以為上田後漢虞詡曰禹貢雍州之域厥田惟上上且沃野千里穀稼殷積然則雍賦第六大抵山多而田少非但為人功少也厥貢惟球琳琅玕蔡傳曰球琳美玉也琅玕石之似珠者爾雅西北方之美者有昆侖虚之球琳琅玕箋按玉藻曰笏天子以球玉注球美玉書顧命天球河圖在東序唐孔氏曰天球雍州所貢之玉色如天爾雅球琳美玉也琳亦玉名又璆與球同蔡傳以梁州之璆為磬雍州之球為玉不知何所分也説文琅玕石似玉徐氏總龜曰琅玕生南海石厓上狀如筍質似玉荀子琅玕龍兹注云琅玕似珠可為冠冕之飾山海經槐江之山其上多藏琅玕黄金珍玩考曰琅玕樹生海底丹柯碧葉與珊瑚略同出水紅潤旋變為青擊之作金石聲浮于積石蔡傳曰積石地志在金城郡河闗縣西南羌中今鄯州龍支縣界也箋按孔傳曰積石山在金城西南河所經也宋楊允恭曰自環州入積石抵靈武七日程易氏曰河自廓州積石軍北唐志廓州達化縣有積石軍西至青海一百餘里東北流一百五十里至化成縣南八十步東流一百四十里至鄯州龍支縣西南六十里劉昫曰龍支漢伊吾縣地積石山在縣西九十八里又三百九十里至河州枹罕縣南五十里積石在縣西北七十里一名唐述山水經注河北有層山山甚靈秀每時見神人往還彼羌目鬼曰唐述因復名之為唐述山今人目龍支縣山為大積石此名小積石蔡傳曰李復奏復徽宗時人黄河過會州入韋精山石峽險窄自上垂流直下髙數十丈船豈可過至西安州之東宋志西安州元符二年建大河分為六七道散流渭之南山逆流數十里方再合逆溜水淺灘磧不勝舟載然此言貢賦之路亦曰浮于積石至于龍門西河則古來此處河道固通舟楫矣而復之言乃如此何也箋按宋史徐興傳太宗詔督轉靈武芻糧道積石漢溝洫志闗中有湋渠引諸川溉田如淳曰水出韋谷即韋精也復説非至于龍門西河蔡傳曰龍門山地志在馮翊夏陽縣今河中府龍門縣也西河冀之西河也箋按漢馮翊今西安府同州也龍門山在同州韓城縣東北八十里宋河中府本漢河東郡今山西平陽府也其龍門縣乃今蒲州河津縣夏陽今韓城不得以夏陽之龍門山指為龍門縣也史淮隂傳涉西河正義曰即同州龍河從夏陽渡者是也會于渭汭蔡傳曰雍之貢道有二其東北境則自積石至于西河其西南境則會于渭汭言渭汭不言河者蒙梁州之文也箋按積石在今河州衛為古西羌地乃雍州西境也積石又在其西至龍門西河則雍之東境其東北貢道自當徑自入河何煩轉從積石傳以為東北自積石誤經明言至于西河以為不言河者蒙梁州之文亦誤織皮崐崘析支渠搜蔡傳曰三國皆貢皮衣故以織皮冠之崐崙即河源所出在臨羌箋按孔傳曰織皮毛布今按晉載記有罽唐志有交梭彌牟布元史有青速夫皆所謂毛布也吳氏曰織皮獸皮熟之去毛削令至薄裁令極細如縷以金傅之織而為布若皮衣何用織為又按漢地志金城臨羌縣有昆侖山祠燉煌廣至縣治昆侖障皆即今肅州之昆侖也竹書紀年穆王十七年西征于昆侖丘見西王母穆天子傳至宗周至昆侖合八千一百里後漢書竇固出燉煌擊昆侖塞注昆侖山名因以為塞在今酒泉縣西南是也此為小昆侖蔡傳云河源所出非也爾雅河出昆侖虚括地志昆侖山在雍州西南一萬五千三百七十里今在土畨朶甘思西鄙世謂之大昆侖也蔡傳曰析支在河闗西千餘里箋按司馬彪曰西羌者自析支以西濱于河首在右居也河水屈而東北流逕于析支之地是為河曲矣馬伯循曰寧夏東北河水遇山析為二枝處有析支城大戴禮鮮支渠搜後漢西羌傳濱于賜支鄒歸軒以為即析支也蔡傳曰渠搜水經曰河自朔方東轉逕渠搜縣故城北盖近朔方之地也箋按臣瓚曰孔子三朝記云北𤼵渠搜南撫交阯此渠搜在朔方禹貢渠搜在雍州西周書王會解渠搜以鼩犬隋書西域傳撥汗國都葱嶺之西五百餘里古渠搜國也東去疏勒千里去瓜州五千五百里蔡傳据水經以為渠搜近朔方非也西戎即叙蔡傳曰皆西方戎落故以西戎總之箋按王制曰西方曰戎被髪衣皮有不粒食者矣杜氏通典曰西戎出自三苗盖羌姓也今按舜竄三苗去禹未逺而禹貢作于堯時已云西戎即叙豈有出自三苗並為羌姓之理山海經苗民釐姓顓頊後其非羌姓可知孔安國以析支昆侖渠搜西戎為四國据殷時伊尹四方獻令正西昆侖狗國鬼親枳已闟耳貫胸雕題離丘漆齒史記匈奴傳夏道衰公劉失其稷官變于西戎邑于豳竹書殷太戊十六年西戎來賓王使王孟聘西戎則西戎甚衆不得以一國盡之鄭氏以衣皮之人居昆侖析支渠搜三山皆在西戎蔡傳因之故謂以西戎總之禹貢會箋卷九
