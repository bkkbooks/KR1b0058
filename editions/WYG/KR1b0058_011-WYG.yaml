body:
  text: 禹貢會箋卷十一翰林院檢討徐文靖撰導弱水至于合黎漢書作合藜蔡傳曰弱水見雍州合黎山名隋地志在張掖縣西北亦名羌谷箋按孔傳曰合黎水名在流沙東史記正義曰合黎水岀臨路松山東而北流歴張掖故城下括地志云漢居延縣故城在甘州張掖縣東北一千五百三十里又北流經張掖縣三十三里又北流經合黎山折而北流經流沙磧之西入居延海行千五百里山海經廣注淮南子云弱水出窮石窮石在今之西郡那冉蓋其泒别之源耳通鑑唐紀行方討茂州叛羌黄郎弄窮其餘黨西至乞習山臨弱水而歸即是水也統志弱水在今甘州衛城西地有甘浚山故名合􅀺山在今行都司城西北四十里蔡傳曰禹叙山叙水皆自西北而東南導山則先岍岐導水則先弱水也箋按朱子曰導水凡九條弱水最西北又西流不經中國故首言之黑水從雍梁西界入南海亦不經中國故次之河為四瀆宗且𤼵源西北故中國之水以河為先漢𤼵源于西在江之北故次于河江在漢南故次于漢濟雖北而𤼵源近故次于江淮在濟南故次于濟渭水所經止于雍州于一州為大于九州為小故後及之洛水所經止于豫州自渭而言又在南故居末按弱水己下皆言禹導水循行之次第也餘波入于流沙蔡傳曰流沙杜佑云在沙州西八十里其沙隨風流行故曰流沙箋按山海經流沙出鍾山西行又南行昆侖之墟西南入海黑水之山地理志張掖居延縣西北有居延澤古文以為流沙括地志居延澤在甘州張掖縣東北六十四里据後西被于流沙居延澤在張掖縣東北不得言西被矣管子曰桓公西伐大夏涉流沙杜佑通典曰燉煌即古流沙深有合于西被之説矣段國沙州記洮河西南一百七十里有黄沙南北一百二十里東西七十里西極大楊川望黄沙猶若人委干糒于地干古乾字也都不生草木蕩然黄沙周迴數百里沙州於是取號焉五代史晉天福三年髙居晦使于闐還記其山川云自靈州過黄河三十里始涉沙入党項界曰細腰沙神樹沙至三公沙自此沙行四百餘里至黑堡沙沙尤廣自甘州始涉磧磧無水西百五十里至肅州渡金河出玉門闗至瓜州沙州州南十里鳴沙山冬夏殷殷有聲如雷云禹貢流沙也徐退山曰出玉門以西都是沙磧魏太武自玉門度流沙是也沙則水滲而下餘波盡消故不言入海導黑水至于三危入于南海蔡傳曰地志黑水出犍為郡南廣縣汾闗山水經出張掖雞山唐樊綽云西夷之水南流入于南海者凡四曰區江曰西洱河曰麗水曰瀰渃江皆入于南海其曰麗水者即古之黑水也三危山臨峙其上程氏曰樊綽以麗水為黑水者恐其狹小不足為界其所稱西洱河者廣處可二十里既足以界别二州其流又正趨南海箋按天問曰黑水𤣥趾三危安在山海經黑水出張掖雞山南至于燉煌過三危山而南流入于南海孔傳曰黑水自北而南過梁州入南海括地志曰黑水源出伊州伊吾縣北百二十里南流絶于三危山山在沙州燉煌縣東南四十里西河舊事曰三危山俗亦謂昇雨山史記注作卑羽山字之譌也錐指仍之亦誤韓苑洛曰在今肅州衛城西一十五里水南流去積石河㡬及三百里故入南海不與河通正義謂河水自積石以西皆多洑流故得越河而南其説非也南海交阯之海倪氏粲曰交阯水之大者為富良江分為左右江至南寧方合為一入廣西至廣東廣州府入海其間亦有三峽春夏之間水髙百丈史記注謂揚州東大海非矣導河積石至于龍門蔡傳曰張騫窮河源云有兩源一出葱嶺一出于闐唐薛元鼎使吐蕃得河源於莫賀延磧尾曰悶摩黎山所謂崑崙也二説恐薛氏為是箋按唐史契丹傳長慶元年以大理卿劉元鼎為盟會使元鼎踰湟水至龍泉谷河之上流繇洪濟梁西南行二千里又南三百里三山中髙而四下虜曰悶摩黎山元鼎劉姓傳云薛非循吏傳有薛大鼎當記誤耳又唐史吐谷渾傳慕容伏允耄不治事其相天柱王用事拘天子行人貞觀九年詔行軍大總管侯君集積石道任城王道宗等率兵擊之伏允謀入磧疲唐兵道宗曰柏海近河源古未有至者伏允西走未知所在方馬癯糧乏不如按兵鄯州君集曰北海雖逺可鼓而致也行軍趣南登漢哭山戰烏海又行空荒之地二千里盛夏降雪乏水草士糜冰馬秣雪閲月次星宿川元朱思本曰河源在中州西南直雲南麗江宣撫司之西北千五百餘里水從地涌出如井其井百餘東北流百餘里匯為大澤望積石山觀覽河源則唐之探河源者不始劉元鼎也蔡傳曰河自積石三千里而後至于龍門經但一書積石不言方向荒逺在所畧也箋按元史地理志河源附錄至元十七年命都實為招討使往求河源都實既受命是歲至河州州之東六十里有寧河驛驛西南六十里有山曰殺馬闗林麓穹隘舉足浸髙行一日至巔西去愈髙四閲月始抵河源河源在土蕃朶甘思西鄙有泉百餘泓沮洳散渙弗可逼視方可七八十里􅂂髙山下瞰燦若列星以故名鄂端諾爾火敦譯言星宿也羣流奔輳近五七里匯二巨澤名阿拉克諾爾自西而東連屬吞噬行一日迤邐東騖成川號赤賓河又二三日水西南來名恰爾楚與赤賓河合又三四日水南來名呼喇又水東南來名雅爾楚合流入赤賓其流浸大始名黄河然水猶清人可涉又一二日岐為八九股名伊遜鄂羅木譯言九渡通廣五七里可度馬又四五日水渾濁土人抱革囊騎過之聚落糾木幹象舟傅髦革以濟僅容兩人自是兩山峽束廣可一里二里或半里其深叵測朶甘思東北有大雪山名伊拉瑪博囉其山最髙譯言騰格哩哈逹此即崑崙也山腹至頂皆雪冬夏不消土人言逺年成冰時六月見之自八九股水至崑崙行二十日河行崑崙南半日又四五日至地名庫濟及庫徳二地相屬又三日地名哈喇博勒齊爾四達之衝也多宼盜有官兵鎭之近北二日河水過之崑崙以西人簡少多處山南山皆不穹峻水亦散漫獸有髦牛野馬狼狍羱羊之類其東山益髙地益漸下岸狹隘有狐可一躍而越之處行五六日有水西南來名納琳哈喇譯言細黄河也又兩日水南來名恰爾瑪爾楚二水合流入河河水北行轉西流過崑崙北一向東北流約行半月至貴徳州地名博勒齊爾始有州治官府州𨽻吐蕃等處宣慰司司治河州又四五日至積石州即禹貢積石五日至河州安鄉闗一日至打羅坑東北行一日洮河水南來入河又一日至蘭州過北卜渡至鳴沙河過應吉里州正東行至寧夏府南東行即東勝州𨽻大同路自𤼵源至漢地南北澗溪細流傍貫莫知紀極爾雅河出崑崙墟色白所渠并千七百一川色黄山皆草石至積石方林木暢茂世言河九折彼地有二折盖恰爾瑪爾楚及貴徳博勒齊爾也元學士潘昂霄録宋易氏彥祥曰河自廓州積石軍北東北流一百五十里至化成縣南八十步東流一百四十里至鄯州龍支縣西南六十里積石山在縣西九十八里又三百九十里至河州枹罕縣南五十里積石在縣西北七十里亦名唐述山今人目龍支縣山為大積石此山名小積石又三百里至蘭州五泉縣北二十里東北流三百八十里至會州之會寧縣西北有黄河堰又五百三十里至靈州之迴樂縣枕黄河後魏刁雍開富平東南艾山舊渠通河溉田之地又經靈武縣又一千餘里至西受降城一統志城在古豐州西北八十里開元初為河所圮張説于城東别置新城東流一百八十里至天徳軍今大同府朔州西北有天徳山唐天徳軍城在焉又二百里至中受降城三百里至東受降城三城皆唐張仁愿所築並在河岸以遏突厥河轉南流三百五十里至朔州之鄯陽縣西三十里又三百七十四里至嵐州樓煩郡今大同府界之合河縣西二里北有合河闗又七十里至石州之臨泉縣二十里又經定胡縣西二百步孟門闗在縣西一百步又經平夷縣西五十里今石州寧鄉縣又四百二十里至隰州之永和縣北六十里唐志縣北有永和闗又經大寧縣又二百里慈州之吉昌縣北六十里又經文城縣孟門山又縣西南三十六里河中有山如槽水流懸注七十餘尺俗名石槽與龍門相對即龍門之上口為河之巨阨又一百八十里至河中府之龍門縣北二十五里乃龍門口河自積石至龍門計四千七百二十餘里傳云三千里非辛氏三秦記河津一名龍門巨靈迹猶在蔡傳曰李復謂受降以東至于龍門皆是禹新開鑿箋按魏土地記曰梁山北有龍門山大禹所􅥎古鑿字通孟津河口廣八十步則禹所鑿者不過如此吕氏春秋曰古龍門未闢吕梁未鑿河出孟門之上大溢逆流唐志慈州文城縣有孟門山在今延安府宜川縣黄河之中名曰洪水禹乃決流疏河為彭蠡之障所活者千八百國則禹未鑿時河之故道可知南至于華隂東至于厎柱又東至于孟津史記作盟津蔡傳曰華隂華山之北也孟地名津渡處也箋按易氏曰龍門口又二百里至陜州之西北對河為華州華隂縣河經太華之北故曰華隂河至此東流左傳注華隂縣東潼闗闗西一里有潼水因以名闗通典本名衝闗河自龍門南流衝激華山東因以為名經陜州之芮城縣又五十里至硤石縣有厎柱山在河中又三百五十里至河南府王屋縣南五十里又至河陽縣後為孟州南城四面臨河謂之富平津古謂之孟津武王㑹諸侯處亦曰武津亦曰河陽津水經云小平津東過洛汭至于大伾史記作大邳蔡傳曰洛汭洛水交流之内大伾張揖以為在成臯成臯之山西去洛汭既已太近東距洚水大陸又為絶逺當以黎陽者為是箋按昭元年天王使劉定公館趙孟于洛汭杜預曰洛汭在河南鞏縣南水曲流為汭易氏曰孟津東百里過今鞏縣有五社渡建武初朱鮪遣賈彊蘇茂將兵三萬人從五社渡攻温即此洛水入河謂之洛口亦名什谷張儀所謂下兵三川塞什谷之口者也又經汜水縣本漢成臯縣一名虎牢三百九十里至衛州汲縣南五十里謂之棘津亦謂之石濟津東北流至黎陽縣今大名府濬縣大伾山在縣南七里俗號為黎山鄭𤣥以大岯在脩武武徳界臣瓚以為脩武武徳無此山今黎陽縣山豈不是大岯乎北過洚水至于大陸洚史記作降漢志作絳鄭𤣥洚讀為降下江反蔡傳曰洚水今冀州信都枯洚渠也箋按正義曰地理志降水在信都縣班固漢書以襄國為信都在大陸之南或洚水𤼵源在此下尾至今之信都故得先過洚水乃至大陸若其不爾則洚水不可知也張洎曰洚水即濁漳也字或作絳地理志上黨屯留縣桑欽言絳水出西南東入海酈注引此作入漳云絳水𤼵源屯留下亂流漳津與漳俱得通稱也金史地理志衡水縣有長蘆河蓋即是洚水也据酈注漳水逕南宫縣故城西其水與隅醴通為衡津又有長蘆淫水之名淫當作洚字之譌也金史之所據也今洚水出屯留縣西南方山東北流經冀州入海與枯洚異又按易氏曰大伾二百五十里至相州臨河縣南五里又八十里至澶州頓丘縣南二十五里北流一百二十里至魏州之貴鄉縣今大名府元城縣大河故瀆在縣西三里俗云王莽河河渠書禹釃二渠以引河一出貝丘一出漯川王莽時廢塞故俗謂之王莽河又北流二百一十里至冀州南宫縣洚水故瀆在縣東南六里又北二三百里至趙州之隆平縣舊為大陸縣書所謂北過洚水至于大陸者也徐氏常吉曰導河北過洚水至于大陸漢志冀州信都有洚水夫既過冀州信都則已越邢趙而之北矣又安得求二州之境或曰大陸即鹿城縣鹿與陸通但鹿城縣在洚水西北此處水已將入海不應又折而西北也唐割鹿城置陸渾則大陸之在其地者亦有可據今按山海經敦與之山溹水出于其陽而東流注于泰陸之水夫以大陸為水名則不必專指一地以求之矣又北播為九河同為逆河入于海蔡傳曰九河既淪于海則逆河在其下流固不復有矣程氏曰周時河徙砱礫至漢又改向頓丘東南流與禹河迹大相背戾洚水大陸九河逆河皆難實指然上求大伾下得碣石因其方向辨其故迹可考也箋按漢馮竣曰禹非不愛民力以地形有勢故穿九河今既滅難明宋趙偁曰禹之治水自冀抵滄景始播為九河以其近海無患也所謂既滅難明者以九河故迹雖存久經湮塞難以按循若淪海又何謂難明也春秋緯寳乾圖曰移河為界在齊吕塡閼八流以自廣鄭𤣥曰齊桓公塞九河為一河今河間弓髙以東至平原鬲津往往有其遺處蓋淤塞八河廣拓齊地塞其東流八支并使歸于徒駭也其故跡往往可循至漢以河間名郡其命義可知矣安在盡淪于海也周譜定王五年大河南徙戰國時燕王謂蘇代曰齊有清濟濁河以為固賈讓曰齊與趙魏以河為竟則定王五年所徙之河是也至漢文帝時河決酸棗武帝而後則決於瓠子決於館陶分為屯氏河東北入海至元成時河始決東郡分流於博州又決平原決渤海決信都皆東北出青冀之境以達于海自東漢歴魏晉隋唐以及宋初並鮮河患迨仁宗至和間河始決大名神宗熙寧始決于澶村北流斷絶河道南徙此蔡傳謂東南流與河大相背戾者也吕氏春秋曰鉅陸之北分為九河又合為一河以入海孔傳曰同合為一大河名逆河入于渤海臣瓚曰武帝元光二年河徙東郡更注渤海禹之時不注渤海也余謂逆當訓迎如周書逆子釗于南門之外春秋如齊逆女之逆言九河其實迎逆大河之水以注海也漢許商謂自鬲津以北至徒駭間相去二百餘里如必又開通合為一河以入海何禹之不憚煩也孟子禹疏九河注之海則九河各自注海可知鄭𤣥以為下尾合名為逆河言相向迎逆是也嶓冢導漾東流為漢史作導瀁蔡傳曰水經漾水出隴西郡氐道縣嶓冢山東至武都常璩曰漢水有兩源此東源也即禹貢所謂嶓冢導漾者其西源出嶓冢山會泉始源曰􅃆逕葭萌入漢箋按巴漢志漢水二源東源出氐道縣之養山名瀁郡國志氐道養水出即漾水也西源出隴西嶓冢山會白水逕嘉萌入漢始源曰􅃆水經漾水東至武都沮縣為漢水又東至廣漢白水縣西蔡傳引常璩之説不審白水為二字誤作會泉又易始源曰沔句於逕葭萌入漢之上馮嗣宗曰漢至沮縣即為漢水􅃆水自出沮縣蓋别為一水也古言􅃆漢二水者多混為一又按山海經漢水出鮒鰅之山帝顓頊葬于陽九嬪葬于隂郭璞曰書云嶓冢導漾東流為漢禹貢錐指曰按尚書嶓冢導漾東流為漢山海經所謂漢出鮒鰅山也殊不審經言漢出鮒鰅漢乃濮譌顓頊都濮陽葬鮒鰅山水經注濮水枝津東逕浚城南而北去濮陽三十五里其不為漢水明矣安得為隴西之嶓冢乎景純妄注之而胡氏据以釋經疎矣蔡傳曰酈道元謂東西兩川俱出嶓冢而同為漢水箋按祝穆曰天下之大川以漢名者二東漢則禹貢之導漾自嶓冢山逕梁洋金房均襄郢復至漢陽入江者也西漢則蘇代所謂漢中之甲輕舟出于巴乘夏水而下四日而至五渚者其源出于西和州徼外今岷州衛界逕階沔與嘉陵水合又逕懷安利劍果合與涪水合入于江又東為滄浪之水史作蒼浪蔡傳曰酈道元云武當縣北四十里漢水中有洲曰滄浪洲水曰滄浪水箋按庾仲雍漢水記云武當縣西四十里有滄浪洲荆州圖經武當縣西北有滄浪洲長四里廣十三里水經注亦曰西北今但云縣北似遺西字過三澨至于大别南入于江蔡傳曰三澨水名今郢州長夀縣磨石山𤼵源東南者名澨水至復州景陵縣界來又名􅆜水疑即三澨之一然據左傳漳澨薳澨則為水際未可曉也箋按水經荆州沲水在南郡枝江縣三澨地之南在即縣之北注云尚書曰道漢水過三澨合流觸大别山陂故馬融鄭玄王肅孔安國等咸以為三澨水名也劉澄之云在竟陵蔡邕漢津賦窮滄浪乎三澨史記索隱曰今竟陵有三參水參去聲俗云是三澨水即蔡傳云出磨石山者蓋即三澨之一承天府志今安陸府以司馬河為一澨即出磨石山者馬溪河為一澨石家河為一澨自京山合流入景陵界謂之三􅆜水即索隱所稱三參水也左傳宣四年楚令尹子越師于漳澨昭二十三年司馬薳越縊于薳澨皆水際及邉地名與此無涉蔡傳曰大别見導山入江在今漢陽軍漢陽縣箋按日記曰漢水至漢陽軍大别山而南入江是名沔口自嶓冢至此凡二千四百二十里易氏曰漢水東流百八十里經興元之南鄭縣至此名漢水興元今漢中府又七十三里至城固縣北二里又三百里至洋州興道縣百步今洋縣又經金州之漢隂縣南二里金州今興安州又五百里至金州西城縣北百步今平利縣又經洵陽縣又經均州之豐利鄖鄉二縣又六百八十里至均州武當縣西北四十里至此名滄浪水東南流經襄陽府之樂鄉宜城二縣又三百六十里至襄陽府襄陽縣又三百二十里至郢州長夀縣十步今安陸府鍾祥縣又三百里至復州景陵縣南縣有三㲼水即三澨也又經沔州漢川縣至漢陽府大别山之東北入江漢自嶓冢至此二千四百二十里大别定四年左傳蔡侯吳子唐侯伐楚舍舟于淮汭自豫章與楚夾漢左司馬戌謂子常曰子必速戰乃濟漢而陳自小别至于大别寰宇記二别相去一百二十餘里吳氏曰鄂北對漢陽軍大别山漢水自北來入江東匯澤為彭蠡東為北江入于海彭蠡古作彭麗蔡傳曰彭蠡見揚州北江未詳入海在今通州靜海縣箋按水經曰沔水東至石城縣分為二其一東北流其一又過毗陵縣北為北江注曰毗陵舊會稽之屬縣今丹徒縣也舊去江三里江即北江也然漢雖入江不應改漢為江今廬江自北入江謂之北江宜也蔡傳曰彭蠡古今記載皆謂之番陽然其澤在江之南去漢水入江之處已七百餘里既在大江之南於經則宜曰北為北江不應曰東為北江箋按唐地志江州尋陽縣有廬山有彭蠡湖有彭澤縣不曰南匯而曰東匯者漢志豫章彭澤縣禹貢彭蠡澤在西則彭澤在彭蠡之東矣東匯澤者謂東匯彭澤為彭蠡也蠡亦古螺字水盤漩如螺紋也不曰北為北江而曰東為北江者海内東經曰廬江出三天子都入江彭澤西一統志引經曰三天子山在率東率山今在休寧縣俗名張公山黄省曾廬山吟云少讀神禹經昔為天子都以廬山為天子都誤也郭璞注經曰今江出汶山郡升遷縣岷山東南至廬江南界東北經淮南下邳至廣陵入海是廬江入江在大江東迤北也江自西而東至此迤邪而北與北江會故曰東為北江也若漢水入江久在彭澤之西又何有東為北江者乎山海經又曰贑水又北過彭澤西北入于江是湖漢九水在大江之南至此而東北入江謂之南江南北二江皆匯于彭蠡而岷江始得謂之中江周職方揚州其川三江荆州其川江漢則漢水不在三江之數可知地理志曰禹貢中江在丹陽蕪湖江水自蜀來歴數千里而至此始言中者以南北二江既入始可以言中也孔傳曰自彭蠡江分為三入震澤此大謬也若三江並入震澤則震澤益助其驕何由而致定乎蔡傳曰洪水之患惟河為甚意當日龍門九河等處事急民困勢重役煩禹親莅而身督之若江淮則地偏水急不待疏鑿固已通行或分遣官屬往視亦可況洞庭彭蠡之間乃三苗所居彼方負其險阻頑不即工即官屬之往亦未必遽敢深入但意如巢湖江水之淤而不知彭蠡之源為甚衆也以此致誤謂之為匯謂之北江無足怪者然則番陽之為彭蠡信矣箋按通鑑魏任城王澄表稱蕭衍頻斷東闗欲令漅湖汎溢以灌淮南湖在今廬州巢縣之西周迴四百餘里南出于東闗口東南有石渠世傳為夏禹所鑿謂江淮地偏水急不待疏鑿或分遣官屬往視可乎禹貢彭蠡既豬禹苟未至其地乃懸揣以立言乎吳起對魏武侯曰三苗之國左洞庭右彭蠡亦言其地勢險阻云爾岳州三苗故地洞庭其所據豈彭蠡亦所據乎山海經廬江出三天子都入江彭澤西尚書禹徂征有苗奉辭伐罪三旬苗民逆命倘不知彭蠡之源甚廣而官屬未敢深入將徂征者非禹乎誓衆而衆不行乎輿地志廬山紫霄峯下石室中有禹刻篆文凡七十餘字只有洪荒漾余乃􅞬六字可辨餘叵識設禹未至其地篆何由刻乎岷山導江蔡傳曰岷山即瀆山也又謂之汶阜山在徼外江水所導也箋按雲南志金沙江源出于吐蕃之犁石南流漸廣至于武定之金沙巡司麗江鶴慶又東過四川之㑹川建昌等衛以達于馬湖叙南然後合于岷江四川志岷山在茂州之列鵝村其跗曰羊膊山江水所出水利志江源在羊膊嶺分為二派一西南流為大渡河一名羊山江一正南流謂之南江明末江隂徐弘祖出闗至昆侖歸作溯江紀源云河自昆侖之北江亦自昆侖之南其龍脈與金沙江相並南下環滇池以達五嶺江之所以大于河也東别為沱蔡傳曰沱江之别流於梁者也箋按宋􅄯氏曰今永康軍導江縣西北二十里有沱江水經所志之沱其源岷江是也水經江水自彭天闗東逕汶闗氐道縣北東别為沱自導江東南流至彭州永昌縣西為都江者杜佑所志之沱也杜氏通典沱水在濛陽郡唐昌縣唐地志儀鳳二年析九隴導江郫三縣置自都江至天勑山分而為二一名瀘水自天勑山十五里復合于都江一名廣濟江自天勑山東流至彭州九隴縣復合于都江自永昌之都江東南流至成都府郫縣北為郫江者漢志所謂禹貢沱江者也漢地志蜀郡郫縣禹貢沱江在西東入江江賦玉壘作東别之標亦謂沱也又東至于澧虞喜志林澧是江源之别流蔡傳曰澧水名水經出武陵充縣西至長沙下雋西北入江鄭氏曰經言至者或山或澤也澧宜山澤之名按下分九江澧水既與其一則非水明矣箋按孔傳曰澧水名疏曰楚辭云濯余佩兮澧浦則澧自水名也地理志武陵充縣澧水所出東至下雋入沅水經注澧水出武陵充縣西歴山東過其縣南又東過零陽縣之北又東過作唐縣北又東過長沙下雋縣西北東入于江郭璞曰江湘沅水共會巴陵頭故號為三江之口澧又去之七八十里而入江焉范致明岳陽風土記曰水經澧水上承孱陵縣澹氷王仲宣曰悠悠澹澧口下會赤沙湖東南注于沅水謂之澧江口沅水注于洞庭謂之鼎江口若以洞庭為九江則澧水入沅同沅入湖澧水即九江之一不得東至于澧乃過九江也蔡傳疑下言九江澧水既與其一則澧非水名總由泥洞庭為九江耳若依漢志九江在尋陽則澧為水名又何嘗與九江之一乎過九江至于東陵蔡傳曰東陵巴陵也今岳州巴陵縣也地志在廬江西北者非是箋按漢地志廬江郡金蘭西北有東陵鄉水經江水東過下雉縣北利水從東陵西南注之又東左得靑林口酈道元注云水出廬江郡之東陵鄉江夏有西陵縣故是言東矣書云過九江至于東陵者也水經灌水導源廬江金蘭縣西北東陵鄉大蘇山許愼曰灌水出雩婁縣則東陵在江灌之間可知也通鑑梁韋叡攻魏至合肥諸軍進至東陵晉書卞壺傳峻至東陵口壺與戰于陵西成帝紀作西陵括地志西陵在黄州黄山西二里此二陵相為東西史記楚世家秦拔我西陵即是地也蔡傳乃以巴陵為東陵據岳陽風土記曰巴丘本漢下雋縣之邱漢志下雋屬長沙今鄂州蒲圻縣界此其地耳水經所謂本吳之巴丘邸閣城也晉太康元年立巴丘縣于此沈約宋書州郡志夷陵漢舊縣吳改曰西陵是西陵之名乃起于吳安得以二陵相為東西而遂以巴陵為禹貢東陵耶朱子以為經言過九江至于東陵則自今江州城下至湖口縣纔四十里不知東陵的在何處按通典尋陽舊縣在今江北蘄州界今黄州府蘄州也晉温嶠移尋陽于江南梁改江州今江州去湖口四十里實非古九江地也班志廬江郡金蘭西北有東陵鄉貨殖傳注九江江南豫章是南楚也正義曰九江郡都隂陵隂陵故城在濠州定逺縣西六十五里疑隂陵即為東陵乃欲于今之江州求之宜不知其的在何處矣東迤北會于匯東為北江入于海蔡傳曰彭蠡既在大江之南於導江則宜曰南會于匯不應曰北會于匯箋按括地志彭蠡湖在江州尋陽東南五十二里廬山記畧山在尋陽南南濵宫亭湖北對小江山去小江三十餘里荆州記曰宫亭湖即彭蠡湖也亦曰彭澤湖一曰匯澤蒙前匯澤為彭蠡故于此但言匯也上文東為北江者以廬江北來入江是為北江而大江自西來而匯之故曰東也至此而彭澤諸水北來入江是大江受廬江之先入在彭蠡西此則彭澤之繼入又在其東故曰東迤北會于匯也孔傳曰迤溢也正義曰迤靡迤邪出之言故為溢也鄭氏曰漢與江鬭轉東成澤然漢自大别入江至此七百餘里何由别其所匯者為漢水耶故知廬江在北彭澤在南至此與大江交會皆揚州川也又按山謙之南徐州記京江禹貢北江也傳以為北江未詳易氏曰考唐志岷山近在茂州而江源逺出西徼松州交川縣古西羌地江源鎭在縣西北三十里江南流二百四十里至翼州翼水縣二百步禹貢解引此作冀州冀水縣誤又六十里至茂州汶山縣汶山即岷山禹導江始此又經蜀州之靑城縣彭州之導江縣又三百七十里至成都縣南七里縣有沱江鎭以沱水名即東别為沱者也又二百里至眉州通義縣東三里又經陵州之籍縣嘉州犍為縣又五百六十里至戎州僰道縣東北十步東流五十里經南溪縣又經瀘州之綿水江安二縣又三百一十里至瀘州瀘川縣南三十步東北流渝州之萬夀縣七百里至渝州巴縣南又三百四十里至涪州涪陵縣東流三百五十里至忠州臨江縣南百步又二百六十里至萬州南浦縣又經夔州之雲安縣南百步又三百一十里至夔州魚復縣瞿塘峽在縣東二里又一百里至巫山縣江水南去縣一里波流峻急或有冒險朝𤼵白帝暮宿荆渚其間千二百里又經歸州之巴東縣南百步又三百三十里至歸州秭歸縣有空舲峽在縣東百二十里又經峽州之宜都縣南二百步又二百里至峽州夷陵縣自蜀至此五千餘里下水五日上水百日縣西北有西陵山自縣折泝江二十里又峽口名為西陵峽峽長二十里所謂三峽此其一也一統志巫峽西陵峽歸峽並稱三峽連山七百里畧無斷處東南流入夷道縣百步又三百三十里至江陵郡江陵縣東流經公安石首二縣東南至澧州界即東至于澧也易氏以澧州為即禹貢東至于灃大謬東流五百七里至岳州巴陵縣北五里洞庭湖在縣西南五十步周迴二百六十里巴陵與夷陵相為東西夷陵亦名西陵則巴陵為東陵可知江水過九江而後至于東陵自巴陵東迤北經臨湘縣北又經鄂州之蒲圻縣五百一十里至鄂州江夏東流經武昌北又經興國軍六百里至江州徳化縣又六十里有水自南來入江合流其澤名彭蠡所謂匯澤為彭蠡也下至蕪湖為中江班史志之易氏以澧為澧州又以巴陵為東陵皆與蔡傳同譌舛假若澧在今湖廣澧州之境與大江相去四五百里何由與大江會為一乎至以巴陵為東陵之誤己見前東陵下導沇水東流為濟入于河蔡傳曰沇水濟水也地志濟水出河東郡垣曲縣王屋山始𤼵源山頂崖下曰沇水既見而伏東出于孟州濟源縣二源東源周迴七百步其深不測西源周迴六百八十五步其深一丈合流至温縣是為濟水歴虢公臺西南入于河箋按山海經王屋之山㶌水出焉㶌音輦而西流注于泰澤郭璞曰即沇水也水經注濟水東逕原城南分為二水一水東南流俗謂之為衍水即沇水也衍沇聲相近傳呼失實也其一水枝津南流注于溴水即春秋溴梁俗謂之白澗水吳氏曰沇水之伏而見也近見于河北之濟源者終于入河是為北濟逺見于河南之滎澤者終于入海是為南濟溢為滎史記溢為滎作泆漢作軼蔡傳曰溢滿也復出河之南溢而為滎滎即滎波之滎見豫州箋按水經注濟水當王莽之世川瀆枯竭其後水流徑通津渠勢改尋梁脈水不與昔同蔡傳謂滎澤濟河雖枯而濟水未嘗絶流蓋以此也又按古滎澤有二水經濟水又東逕滎澤北故滎水所都也左傳宣十二年楚潘黨逐魏錡及滎預注縣東滎澤也此滎澤在河南閔二年衛侯及狄人戰于滎澤左傳作熒澤預注此滎澤在河北時衛都河北狄來伐而禦之既敗而渡河在河北明矣蓋沇水所溢被河南北故也東出于陶丘北蔡傳曰陶丘地名再成曰陶在今廣濟軍西箋按水經濟水又東北逕定陶縣故城南又屈從縣東北流南濟也注曰地理志禹貢定陶西南有陶丘陶丘亭在南墨子以為釡丘也竹書紀年魏襄王十九年薛侯來會王于釡丘者也尚書所謂導菏水自陶丘北謂此也唐書許敬宗傳髙宗問曰書稱浮于濟漯今濟與漯斷不相入何故而然敬宗對曰夏禹導沇水東流為濟入于河今自漯至温而入河水自此洑地過河而南出為滎又洑而至曹濮散出于地合而東汶水自南入之所謂溢為滎東出于陶丘北又東會于汶是也又東至于菏蔡傳曰菏即菏澤見豫州謂之至者濟隂縣自有菏泒濟流至其地爾箋按易氏曰沇水出王屋縣王屋山南行九十里至濟源縣境方名濟水南流一百二十里而入于河自入河處東南三百三十里至鄭州之滎澤縣有古滎澤東五十里至鄭州又一百里至汴州東北二百四十里至曹州濟隂縣有定陶鎭後以為縣屬廣濟軍又東北九十里至菏澤陶丘在廣濟軍之西菏澤在廣濟軍之北凡古濟所經之地自河至此七百餘里又曹州圖志濟隂縣南三里有菏水俗謂五丈河今名廣濟河又東北會于汶又北東入于海蔡傳曰汶北汶也見靑州又東北至于東平府夀張縣安民亭合汶水至今靑州博興縣入海箋按水經濟水故瀆又東北過夀張縣西界安民亭南汶水從東北來注之汶凡有五北汶嬴汶柴汶浯汶洠汶也此為北汶易氏曰濟會于汶北流一百里至須城縣西二里又經齊州之長淸縣東北流經豐齊縣西二十六里三百里至臨邑縣西四里又經全節章丘臨濟三縣唐志武徳二年置譚州并置平陵貞觀十七年齊王祐反平陵人不從因更名全節元和十五年省全節入歴城又經淄州之鄒平縣南三十里又經濟陽又一百九十里至髙苑縣七十步東流一百四十里至靑州博興縣北百步東北流入海蔡傳曰本朝樂史謂今東平濟南淄川北海界中有水流入海謂之淸河箋按國策燕王謂蘇代曰齊有淸濟濁河以為防郭緣生曰淸河首受洪水北流濟酈道元曰濟水通受淸之目矣今兖州府汶上縣有大淸河以為即濟水入海之故道云又有小淸河在歴城北即古濼水春秋桓公十八年㑹齊侯于濼即此也導淮自桐柏蔡傳曰水經淮水出南陽平氏縣胎簪山禹只自桐柏導之耳箋按郎氏仁寳曰淮源當依禹貢出桐柏山胎簪低于桐柏百餘丈源又小荆州記桐柏淮源湧𤼵其中潛流三十里東出大復山南漢地志復陽縣注應劭曰在桐柏下復山之陽則大復亦桐柏支山東㑹于泗沂東入于海蔡傳曰沂入于泗泗入于淮此言會者以二水相敵故也入海在今淮浦箋按易氏曰淮自桐柏縣東流經蔡州之朗山縣又三百八十里經眞陽縣南八十里北至蔡州一百里又經褒信縣又經新息縣南五里又三百里西南流經潁州汝隂縣南五里東流二百二十里經下蔡縣後為夀春府又五里至宿州蘄縣南七十里又經虹縣又經濠州之招義縣即漢睢陵地漢志所謂泗水至睢陵入淮者也東北經泗州之徐城縣又二百四十里至泗州臨淮縣東流經宿遷縣東北流經漣水縣又二百七十里入海胡朏明曰漢志淮水出桐柏至睢陵入海行三千二百四十里疑太逺金氏曰淮自桐柏至海凡千七百里此説近是漢志至睢陵入海乃淮隂之譌三千字亦謬今据易氏疆理考淮入海行二千七百一十里則漢志三千乃二千之譌金氏之説亦未足據導渭自鳥鼠同穴蔡傳曰同穴山名地志云鳥鼠山者同穴之枝山也孔傳曰鳥鼠共為雌雄同穴而處其説怪誕不經不足信也箋按山海經鳥鼠同穴之山渭水出焉而東流注于河爾雅鳥鼠同穴其鳥為鵌其鼠為鼵河圖括地象鳥鼠同穴山地之幹也沈約宋書曰沙州廿谷嶺有雀鼠同穴雀色白鼠色黄唐志渭州渭源縣有烏鼠同穴山一名靑雀山伽藍記赤嶺不生草木其山有鳥鼠同穴鳥雄鼠雌共為隂陽甘肅志涼州之地有兀兒鼠有鳥曰本周兒同穴而處傳以為怪誕不經殊失考也又同穴山名亦誤此蓋言鳥鼠同穴本是一山而同穴止宿之處又髙且大故鳥鼠為同穴之枝幹傳以鳥鼠同穴為不經則同穴之山何所取以為名也楊用修曰鳥鼠同穴修撰岳正戍邊時親見之書傳乃以鳥鼠為一山同穴為一山非也東㑹于灃又東㑹于涇又東過漆沮入于河陳氏曰灃涇大與渭竝故曰會既得灃涇渭愈大漆沮皆小故曰過前分言于雍而自源溯流言于此也箋按易氏曰鳥鼠在渭州渭源縣西七十六里舊屬雍州禹導渭始此有三源正東微南流至襄武縣東流五十里至隴西縣縣後為鞏州又至秦州之伏羌縣一里又三百里至秦州上邽縣北三十里又一百二十里至階州之南由縣南四十里縣後并入吳山又三百二十里至鳳翔府之岐山縣南二十里又經京兆府之渭南同官咸陽三縣又二百七十里至萬年縣北五里又二百六十里至華州華隂縣東北流二十五里有永豐倉入河謂之渭丘按唐志隴州吳山縣本長蛇貞觀元年更名吳山階州領縣三將利福津盤隄無吳山縣也易氏階州誤當作隴州導洛自熊耳蔡傳曰熊耳盧氏之熊耳也餘並見豫州洛水出冢嶺山禹只自熊耳導之箋按山海經讙舉之山洛水出焉而東北流注于𤣥扈之水洛南縣有元扈山有洛河水經洛水出上洛縣讙舉山又東逕熊耳山北東北過盧氏縣南又東北過宜陽縣南注曰洛水之北有熊耳山此自别山不與禹貢導洛自熊耳同也邵堯夫詩曰昔禹别九州導洛自熊耳熊耳自有兩未審孰為是東者近成周西者隔丹水書傳稱上洛斯言得之矣蔡傳又安見禹所導之熊耳在盧氏而不在上洛耶東北㑹于澗瀍又東㑹于伊又東北入于河鄭氏曰洛水其上源不逺不及渭漢其流之所經不過涇沔其行僅千餘里而入河箋按易氏曰洛水出冢嶺山東流七十里至上洛縣東北流九十里至洛南四十里乃在熊耳山之西浮梁之水出焉浮梁誤當作浮濠山海經熊耳之山浮濠之水出焉而西流注于洛又四百六十里至虢州盧氏縣熊耳山在縣南五十里東流經河南府之福昌縣東北流經夀安縣又四百五十里至河南府河南縣四里洛陽西南三里自苑内上陽之西東都苑内有上陽宫瀰漫東流六十三里至緱氏縣東北流七十里至鞏縣會伊瀍澗之水一百四十里而入河据此洛自冢嶺至入河一千六百九十里今按水經注洛水自河南縣南又東逕洛陽縣南伊水從西來注之經於㑹澗瀍之下又言㑹伊者謂此禹貢會箋卷十一
